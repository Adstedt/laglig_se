      refs: ['app/api/cron/enrich-amendment-summaries/route.ts:188-220']
    - action: 'Reconcile AC #1 with actual hourly schedule (update story OR revert cron)'
      refs: ['vercel.json:17-19', 'docs/stories/8.8.ai-change-summaries.md:37']
    - action: 'Complete Task 3.3 manual verification on 5 real 2026 amendments before first prod cron'
      refs: ['docs/stories/8.8.ai-change-summaries.md:110']
  future:
