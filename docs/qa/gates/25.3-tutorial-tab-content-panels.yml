nfr_validation:
  security:
    status: PASS
    notes: 'Static content; no user input flows; no server actions; no env vars. The decorative <button type="button"> elements are non-functional and have no handlers — zero attack surface beyond static JSX rendering.'
  performance:
    status: PASS
    notes: 'No network calls. Six small components (~150-220 lines each) loaded as part of the modal bundle. Tab body re-mounts on activeTab change (different component instance) — cheap given the static JSX. No useEffect, no useState, no hooks in any of the 6 tab components.'
  reliability:
    status: PASS
    notes: 'Zero runtime branches inside the tab components (pure-presentation). Lookup map runtime fallback covered by the barrel contract test (catches accidental undefined exports). No async, no error states. Per accept-risk note in Dev Notes: no ErrorBoundary wrap — accepted because the panels are static JSX with zero logic.'
  maintainability:
    status: PASS
    notes: 'TypeScript strict throughout (no any). Lookup map keyed by the exported TutorialTabId union — adding a 7th tab (B.5 feedback) requires a 1-line union extension + 1-line map entry + 1 new file. Tab files are co-located under tutorial-tabs/ per arch §6.1. Per-tab test files mirror the source structure. DRIFT-NOTES.md captures the grounding decisions for future re-grounding stories.'

