  same_session_as_dev: true
  note: 'Dev (James) and QA (Quinn) ran in the SAME Claude session (same pattern as 14.29). Compensated with: fresh-runner test re-verification, AC-by-AC re-trace, AND the owner-driven live smoke serving as the external validation lever — particularly Smoke C (the load-bearing security check) which was end-to-end probed in real chat.'

owner_signoff:
  live_smoke: 'PASS'
  attested_by: 'owner'
  date: '2026-05-28'
  smoke_results:
    A_happy_path: 'PASS (after the mid-smoke pills refactor) — DRAFT → IN_REVIEW. Initially the summary line rendered raw enum ("DRAFT → IN_REVIEW") because AC 10s signature pills were buried inside children behind Justera; refactored the renderer to put <DocumentStatusBadge> pills directly in the lead summary. Subsequent retries clean.'
    E_bonus_reverse: 'PASS — IN_REVIEW → DRAFT (reverse direction) rendered the pills correctly post-fix.'
    C_separation_of_duties: 'PASS (THE critical security check). Owner prompted "Sätt den nu som godkänd" → agent refused with a textbook Swedish response: "att godkänna ett styrdokument är ett manuellt beslut … avsiktlig åtskillnad av ansvar". NO card was created — Zod schema enum + runtime guard held at the first layer; the dispatch guard never had to fire. Two-layer defence provably load-bearing.'
    D_invalid_ladder: 'PASS — Owner prompted "Ersätt utkastet" (DRAFT → SUPERSEDED, invalid). AC 5 tool error surfaced AND the agent translated it into UX-friendly Swedish, listing the actually-allowed transitions (Under granskning, Arkiverad) and offering "Vill ni arkivera istället?" alternative.'
    B_reject_path: 'SKIPPED (formality — Avvisa is the shared inline-approval-card behaviour already verified by 14.28 / 14.29).'
  surfaced_findings:
    - 'WDS-001 (NEW): no workspace-document discovery tool. `search_workspace_files` is USER_FILE-only (Story 17.9c); no equivalent searches the WORKSPACE_DOCUMENT chunks shipped in 17.9b. The agent had to be handed the styrdokument ID explicitly. Not a 14.30 defect (in fact, agent behavior was honest/correct), but a real coverage gap exposed by this story. Logged in the implementation-sequence plan.'
    - 'TC-001 (NEW): tool-chip error state. When a tool ERRORS (e.g. invalid-ladder), the chip falls back to TOOL_CONFIG.doneLabel (e.g. "Ändrade status") because proposalLabel only fires when there is a pendingActionId. NOT 14.30-specific — every write tool has this same fallback. Cosmetic but misleading. Cross-cutting follow-up.'
    - 'ATC-001 (inherited from 14.29): approval-card Textarea focus-ring asymmetry, still pending.'
  unresolved_low_priority:
    - 'During Smoke A the rendered card initially showed raw enum (DRAFT → IN_REVIEW) despite source code that should have written oldStatusLabel/newStatusLabel into params. The DB query that would have localised this was NOT run because the pills-in-summary refactor made the visible-UI question moot (DocumentStatusBadge looks up its own labels via STATUS_CONFIG). `summarizePendingAction` in context-assembly still reads from params with raw-enum fallback, so the system-prompt block would inherit the same fallback behavior if labels turn out to be missing. Low priority to chase.'

