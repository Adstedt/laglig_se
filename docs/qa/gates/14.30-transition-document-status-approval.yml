status_reason: 'Surgical, behaviour-preserving expansion (11th PendingAgentActionType) on the 14.28 / 14.23 / 14.29 inline-approval pattern. All 20 ACs traced; **three-layer separation-of-duties defence** (Zod schema enum exclusion + tool runtime guard + dispatch authoritative gate) provably refuses APPROVED at all entry points. Owner live smoke A/C/D/E all PASS — including the critical Smoke C where the agent textbook-refused "Sätt den nu som godkänd" with explicit separation-of-duties reasoning. Mid-smoke UX refactor moved AC 10 pills into the lead summary. Three cross-cutting follow-ups surfaced (WDS-001 / TC-001 / ATC-001 inherited).'
