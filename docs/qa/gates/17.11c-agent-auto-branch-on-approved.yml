schema: 1
story: '17.11c'
story_title: 'Agent Auto-Branch on APPROVED — One Approval, Branch + Write'
gate: PASS
status_reason: |
  All 14 ACs traced to passing tests; 201 tests green across 7 affected suites
  with 24 net new tests (7 server-action + 4 tool-guard + 8 dispatch + 7 renderer
  + budget re-run). Full 861-test non-regression sweep clean — 17.11/17.11b/17.16/
  17.17/17.18 all untouched. The load-bearing alias-freeze invariant from 17.16
  AC 4 is preserved verbatim by the new `createDraftFromApprovedWithEdit` server
  action — current_version_id, status, approved_by, approved_at all explicitly
  NOT touched (verified by test + code read at lines 1316-1323). Two-Version
  Problem solved as designed: ONE new version row per agent edit, containing the
  edited content directly. Race-on-fell-through semantics work correctly: when
  the user manually branches between propose and approve, the autoBranchEligible
  flag flips to false → dispatch falls through to plain saveDocumentVersion
  against the now-existing draft. AC 8 + AC 14 dual-stamp lets audit consumers
  distinguish agent-initiated branches from user-initiated ones.
reviewer: 'Quinn (Test Architect)'
updated: '2026-06-06T21:05:00Z'

quality_score: 95
expires: '2026-06-20T21:05:00Z'

