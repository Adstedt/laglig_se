nfr_validation:
  security:
    status: PASS
    notes: |
      Three-layer defense:
        1. Tool-time guard in update-document.ts / add-document-section.ts
           (widened writeable predicate; SUPERSEDED/ARCHIVED still refuse).
        2. Dispatch-time guard in pending-agent-actions.ts (re-asserts the
           widened writeable predicate against the LIVE re-read doc).
        3. Server-action-internal guard in createDraftFromApprovedWithEdit
           (defense-in-depth: refuses if status≠APPROVED at the very last
           moment, handles the extreme race where the doc transitioned
           between dispatch read and server action call).
      All three layers wrap in `withWorkspace` for workspace scoping. AUDITOR
      `tasks:edit` denial inherited via the dispatch's existing gate (no change
      needed for 17.11c).
  performance:
    status: PASS
    notes: |
      Auto-branch path: one $transaction with 1 version create + 1 doc update +
      2 log creates (vs the existing plain-save path's 1 + 1 + 1 = +1 log row
      and same scale). Plus one extra activityLog.findFirst + .update for the
      AC 14 paired stamp (negligible — same shape as the AC 8 stamp). No new
      hot paths. The `after()` reindex matches the existing saveDocumentVersion
      pattern (line 832); 17.18 indexer auto-handles the new draft tier.
  reliability:
    status: CONCERNS
    notes: |
      REL-001 (inherited from 17.11 → 17.11b → now 17.11c): the AC 8 stamp AND
      the new AC 14 stamp are both fire-and-forget (try/catch + console.error).
      A missed stamp doesn't roll back the new version; downstream audit
      consumers may see `document_version_saved` and/or `document_draft_created`
      rows without the agent-author enrichment.

      17.11c extends the scope of REL-001 — now THREE log rows could miss the
      stamp instead of one. The recommended future hardening (fold the stamp
      into the server actions themselves via a typed `agentAuthor?:` param)
      would flip 17.11 + 17.11b + 17.11c all together when implemented.

      NOT a blocker. Same trade-off the team has accepted three times now.
  maintainability:
    status: PASS
    notes: |
      `createDraftFromApprovedWithEdit` co-locates with `createDraftFromApproved`
      (mirror shape, same `withWorkspace` + `$transaction` + `after()` skeleton).
      The `autoBranchEligible` + `shouldAutoBranch` flag pattern in dispatch is
      clean — a single boolean derives both the writeable check and the routing
      decision. The widened predicate is a small additive disjunction (3 shapes
      instead of 2). AC 8 + AC 14 stamps share 99% of their structure (same
      try/catch + findFirst + update pattern, different JSONB-path keys) —
      not extracted, accepted as duplication for readability.

top_issues:
  - id: 'REL-001-extended'
    severity: low
    summary: |
      Fire-and-forget stamp pattern (inherited from 17.11/17.11b) now extends
      to a second log row (AC 14 stamp on document_draft_created). Future
      hardening should fold the stamp into saveDocumentVersion +
      createDraftFromApprovedWithEdit as typed agentAuthor? params.
    refs:
      - 'app/actions/pending-agent-actions.ts:637-677'  # AC 8 stamp
      - 'app/actions/pending-agent-actions.ts:679-724'  # AC 14 stamp
    suggested_owner: 'dev'

recommendations:
  immediate: []
  future:
    - action: |
        REL-001 atomicity hardening (cross-story): fold the agent-author +
        operation discriminator stamps into saveDocumentVersion AND
        createDraftFromApprovedWithEdit as typed `agentAuthor?: { pendingActionId,
        operation }` params. Server actions stamp the rows inside the same
        $transaction. Flips 17.11 + 17.11b + 17.11c all together.
      refs:
        - 'app/actions/documents.ts:724  # saveDocumentVersion'
        - 'app/actions/documents.ts:1253 # createDraftFromApprovedWithEdit'
        - 'app/actions/pending-agent-actions.ts (UPDATE_DOCUMENT + ADD_DOCUMENT_SECTION dispatch branches)'
    - action: |
        When 14.31 (staleness retrofit, currently Approved-not-built) ships,
        the race-on-fell-through path becomes more interesting: the
        entity_version snapshot the tool captured at propose-time can be
        compared against the live updated_at at approve-time. If the user
        edited the draft between propose and approve, surface a 14.31-style
        stale-entity refusal instead of silently applying the agent's edit
        on top of the user's intermediate state. Out of scope for 17.11c —
        flagged as natural follow-up once 14.31 lands.
      refs:
        - 'docs/stories/17.11c.agent-auto-branch-on-approved.md (AC 7)'
    - action: |
        UX polish (low priority): the renderer header copy "Skapar nytt utkast
        v{N+1}" uses the propose-time newVersionNumber snapshot. If the user
        manually branches between propose and approve (the fell-through race),
        the actual saved version will be N+2 not N+1 — the PENDING card shows
        a slightly stale number until approve commits and resultRef takes
        over. Acceptable per PO NTH-5 (self-corrects post-approval). If we
        ever want tighter copy, the renderer could subscribe to live doc state
        via a server-component refetch.
      refs:
        - 'components/features/ai-chat/agent-action-renderers/update-document-renderer.tsx:155-163'
        - 'components/features/ai-chat/agent-action-renderers/add-document-section-renderer.tsx (mirror block)'

