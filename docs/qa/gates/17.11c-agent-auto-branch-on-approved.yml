  out_of_scope_smoke_findings:
    - id: 'AGENT-001'
      severity: 'high (data integrity / agent quality)'
      summary: 'Agent hallucinates content for empty-approved documents'
      evidence: |
        During 17.11c smoke (2026-06-06), owner sent two empty-approved doc UUIDs
        and noted "är tom". The agent responded by asserting both docs had three
        sections each with specific content (e.g. "Tillämpningsområde,
        Diskrimineringsgrunder, HR-rutiner"; "Tillämpningsområde, Förbudet i 2
        kap. 12 §, Klagomålshantering") and deflected the user's claim with
        "Innehållet är kortfattat men inte tomt. Det är möjligt att dokumenten
        ser tomma ut i er ... grund av hur editorn renderar dem, men texten
        finns faktiskt där i systemet." The editor view (v1, Godkänd, 0 ord,
        Sparad) confirms the docs are genuinely empty — agent fabricated the
        section structure.
      relationship_to_17_11c: |
        NOT a regression introduced by 17.11c. The hallucination occurs on the
        read tools (get_workspace_document / search_workspace_documents /
        list_workspace_documents) which are Story 17.10 / 17.18 surfaces.
        17.11c added the auto-branch path on update_document /
        add_document_section, neither of which fired in this exchange. The
        chunk-staleness mitigation in 17.18 (self-healing legacy migration via
        `OR metadata->>'tier' IS NULL`) doesn't address the case where docs
        were created empty + approved empty.
      hypotheses_to_distinguish:
        - 'H1 (most likely): Pure agent hallucination — agent searched the workspace law list, found Diskrimineringslagen 2 kap. 12 §, synthesized a plausible policy structure, presented it as fact. The Swedish deflection phrasing is textbook hallucination cover-up.'
        - 'H2: Stale chunk metadata from a prior version of these docs that had content + got cleared without reindex. But chunks would carry body excerpts, not just heading names.'
        - 'H3: get_workspace_document reading wrong source. Less likely post-17.16/17.18 (read tools verified to use draft/approved pointers, never the alias).'
      confirming_probe: |
        Ask the agent: "Vad står ordagrant i 1. Tillämpningsområde-avsnittet i
        [bb2c1406...]?". If agent invents body text → H1 confirmed (pure
        hallucination). If agent says "avsnittet finns inte" → H2 or H3
        (something stale or wrong-source-read).
      recommended_action: |
        Spawn a separate finding/story owned by PO. Likely fix: system-prompt
        guardrail explicitly forbidding the agent from asserting content
        existence without a successful get_workspace_document call returning
        non-empty content_json. Could ride into 19.8's prompt sweep, or as a
        standalone hardening story (suggested id: 17.18b or AGENT-001-followup).
      gate_impact: NONE
      blocks_closure: false
