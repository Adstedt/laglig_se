# ============================================================================
# Top issues — non-blocking, both tracked for dev follow-up before completed/
# ============================================================================

top_issues:
  - id: 'CONCERN-001'
    severity: medium
    finding: |
      `restoreDocumentVersion` (app/actions/documents.ts:863-948) is NOT
      Model B-aware. It still advances `current_version_id` (the deprecated
      alias) when restoring an old version row. Under Model B's corrected
      alias-freeze semantics, this would break the load-bearing invariant
      if a user restores an old version while a dual-state draft is in
      progress — exact same class of bug as the autosaveDocument alias-leak
      that was caught during owner live smoke.
    impact: |
      Reachable via the existing version history UI's "Återställ" button
      (visible to all users with edit access). If triggered on a dual-state
      doc, the alias would be advanced to the restored version → 17.10b
      auto-reindex would chunk that content with metadata.status='APPROVED'
      → `[Källa:]` citations would silently reflect historical (not current
      approved) content. Compliance-correctness regression, but limited to
      docs where the user explicitly clicks restore during a draft window.
    suggested_action: |
      Refactor restoreDocumentVersion to be Model B-aware. Two equally
      valid options:
        (a) Refuse the restore if `current_draft_version_id IS NOT NULL`
            with Swedish error like "Förkasta utkastet innan ni återställer
            en tidigare version." (simplest, matches Path C defensive
            refusal pattern in saveDocumentVersion).
        (b) Route the restore through the draft pointer the same way
            saveDocumentVersion Path A does — create a new version, advance
            current_draft_version_id, do NOT touch the alias.
      Recommend (a) for clarity of UX; (b) is more flexible but increases
      surface area for the same class of bug.
    refs: ['app/actions/documents.ts:863-948']
    suggested_owner: dev

  - id: 'DOC-001'
    severity: low
    finding: |
      The smoke-found autosaveDocument bug fix (4 unit tests added in
      tests/unit/actions/documents-dual-version.test.ts + refactor of
      autosaveDocument in app/actions/documents.ts:540-663) was applied
      during owner live smoke but NOT reflected in the story's File List
      or Change Log v2.0 entry. The bookkeeping gap doesn't affect
      production behavior, but the audit trail is incomplete.
    impact: |
      Documentation hygiene only. Future devs reading the story to
      understand what changed in 17.16 would miss the autosave fix without
      reading the code directly. Doesn't surface as a bug or risk.
    suggested_action: |
      Add a v2.1 row to the story's Change Log table documenting the
      smoke-found bug + the fix + the 4 new regression tests. Extend the
      Dev Agent Record File List to include the autosaveDocument refactor
      block and the new test block. Five-minute job, owner = dev (James).
    refs:
      - 'docs/stories/17.16.dual-version-document-model.md'
      - 'app/actions/documents.ts:540-663'
      - 'tests/unit/actions/documents-dual-version.test.ts'
    suggested_owner: dev

