# ============================================================================
# Top issues — all LOW/INFO severity, all non-blocking, advisory
# ============================================================================

top_issues:
  - id: 'CONCERN-001'
    severity: low
    finding: |
      System-prompt token budget is now tight. The AC 7 dual-state guidance
      addition required trimming the existing 17.10b styrdokument example
      prose to fit within the 6500-token cap. First addition attempt landed
      at 6766 (+266 over); iterative trimming + tightening the prior example
      brought it back under cap. REF-002's "~4.5k tokens currently consumed"
      figure was stale by Story 17.17 time; actual baseline was much closer
      to the 6500 cap.
    impact: |
      Future stories adding to the system prompt will need to baseline the
      actual current consumption via the system-prompt token-budget test
      BEFORE writing the new content, rather than relying on the comment's
      stale figure. Risk is low — the test (`expect(estimatedTokens).
      toBeLessThan(6500)`) is the load-bearing assertion and would catch any
      runaway growth before merge. But the comment / story-spec drift could
      mislead dev into under-budgeting their additions.
    suggested_action: |
      Optional follow-up — a one-time bookkeeping pass to update the
      system-prompt.test.ts comment from "~4.5k tokens now" to a current
      figure (or a relative figure like "currently ~95% of cap, budget
      future additions carefully"). 2-minute job, owner = dev (any future
      story that touches the prompt).
    refs:
      - 'lib/agent/system-prompt.md'
      - 'tests/unit/agent/system-prompt.test.ts:608-624'
    suggested_owner: dev

  - id: 'CONCERN-002'
    severity: info
    finding: |
      The self-healing legacy migration via `OR metadata->>'tier' IS NULL`
      relies on each doc being touched by a future reindex (via save /
      promote / discardDraft / cron sweep) to clean up its untagged 17.10b
      chunks. Docs that never get touched again will retain untagged chunks
      indefinitely in the index.
    impact: |
      Documentation-only — the read tools already handle this correctly
      (legacy untagged chunks default to `tier: 'APPROVED'`, which is the
      compliance-correct fallback per Story 17.10b's pre-Model-B semantics).
      No functional impact on search relevance or citation routing. The only
      visible consequence is a (probably very small) population of legacy
      chunks that never get the new tier metadata.
    suggested_action: |
      Optional post-deploy observation — run a one-time enumeration query
      to surface the legacy chunk count:
        SELECT count(*) FROM content_chunks
        WHERE source_type = 'WORKSPACE_DOCUMENT'
          AND (metadata->>'tier' IS NULL);
      If the count is meaningfully large and not trending toward zero over
      the following weeks, consider a follow-up backfill script that runs
      `indexWorkspaceDocument` on each affected doc to force the tier-aware
      migration. Most likely the natural editing cadence will clear these
      within a sprint or two.
    refs:
      - 'lib/chunks/sync-workspace-chunks.ts:tierScopedDelete'
    suggested_owner: dev

  - id: 'CONCERN-003'
    severity: info
    finding: |
      Real-LLM model-layer DEC-2 hold test (a real LLM call against a
      seeded dual-state doc asking "Vad är vår officiella X-policy?") is
      deferred to owner-led live smoke. The 4 adversarial unit tests in
      `tests/unit/agent/dec-2-dual-state-hold.test.ts` cover the tool-level
      contract that makes the DEC-2 hold possible at the model layer.
    impact: |
      Precedent-aligned with Story 17.16 / 17.17 (where the owner smoke
      surfaced real coordination polish work that unit tests didn't catch).
      For 17.18 the model-layer test is the actual load-bearing verification
      — the LLM's natural tendency to summarize-and-blend is the exact risk
      vector DEC-2 guards against, and only a real LLM call can verify the
      hold under arbitrary phrasing. The deferral is precedent-correct but
      the smoke MUST happen before Done — without it, the load-bearing
      test of this story hasn't actually been executed.
    suggested_action: |
      Owner runs the live smoke. Recommended prompts: (a) "Vad är vår
      officiella Arbetsmiljöpolicy?" — should cite APPROVED tier only with
      [Källa:]; (b) "Vilken är den senaste policyn för X?" — adversarial
      framing that tempts the LLM to cite the draft as "latest"; (c)
      "Sammanfatta vår syn på Y" — open-ended framing where conflation
      would be easiest. Verify the response cites APPROVED authoritatively
      and mentions DRAFT explicitly with [Utkast: X (utkast vN)] + hedge
      framing ("ett pågående utkast föreslår…"), NEVER as if both are
      simultaneously gällande policy. If any prompt variation conflates,
      iterate on the system-prompt Dubbeltillstånd subsection until the
      test passes.
    refs:
      - 'tests/unit/agent/dec-2-dual-state-hold.test.ts'
      - 'lib/agent/system-prompt.md'
    suggested_owner: po

