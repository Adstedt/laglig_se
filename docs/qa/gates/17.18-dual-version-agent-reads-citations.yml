# ============================================================================
# NFR validation
# ============================================================================

nfr_validation:
  security:
    status: PASS
    notes: |
      All 3 read tools workspace-scoped via closure workspaceId + Prisma
      where clauses. Search tool's batched dualState lookup adds a second
      workspace_id filter (defence-in-depth). All 6 raw SQL call sites in
      sync-workspace-chunks.ts use Prisma tagged-template parameterization
      (no string concatenation, no injection vectors). Legacy fallback path
      preserves workspace isolation via existing syncWorkspaceChunks write-
      side invariant. NTH-2 dual_state_only filter exposed in Zod schema
      does not expand the agent's workspace boundary — narrows the result
      set only.
  performance:
    status: PASS
    notes: |
      Net positive — the embedWorkspaceChunks rewrite (Prisma findMany →
      $queryRaw with embedding IS NULL) cuts OpenAI embedding cost by ~50%
      on every dual-tier doc reindex. Indexing one tier no longer re-embeds
      the other tier's already-embedded chunks. Same change self-heals
      REL-001 (transient OpenAI failure NULL-embedded chunks) without
      special-casing. Search tool overhead: topK doubled to absorb tier
      dedup (modest), one batched dualState findMany regardless of result
      count. Tier-scoped raw SQL deletes are O(N tier chunks) — same cost
      shape as the original full-source delete.
  reliability:
    status: PASS
    notes: |
      Self-healing legacy migration via OR metadata->>'tier' IS NULL means
      no flag-day migration script + no risk of half-migrated state. REL-001
      self-heal preserved (and unified with the dual-tier path via NULL-
      only embed fetch). Backward-compat top-level fields on
      get_workspace_document default to EFFECTIVE tier (approved → draft →
      alias). Split delete + create (no $transaction wrap) is acceptable —
      window is microseconds, embedding already runs outside any
      transaction; dev documented the trade-off inline. DEC-2 contract
      holds via 4 adversarial unit tests + the regression sweep of all
      prior story suites.
  maintainability:
    status: PASS
    notes: |
      JSDoc on every new public surface explains Model B / Story 17.18
      invariants in domain terms. Story 17.18 AC numbers cited inline 35
      times across the 6 source files. FROZEN Swedish copy locked with
      explicit comments. Dev Agent Record File List is comprehensive (13
      files enumerated). The tier field semantic establishes a clear
      convention for future Model B extensions. Split-transaction trade-off
      documented inline so future maintainers won't be confused by the
      missing $transaction wrap.

