nfr_validation:
  security:
    status: PASS
    notes: |
      No new auth/authz attack surface. Quota check runs after the existing
      auth + workspace context resolution. HTTP 402 response shape is
      stable and structured for client-side branching. Migration is
      additive (new table, new FK) — no RLS implications.

      The X-AI-Usage-Warning header surfaces token usage figures to the
      client. These aren't sensitive (they're already visible in the
      billing dashboard) but document if response logging captures them
      for analytics — would mean per-workspace usage is in observability
      data alongside chat metadata.

  performance:
    status: CONCERNS
    notes: |
      Latency budget < 30ms p95 cache hit / < 250ms p99 cache miss is
      claimed in the story spec but NOT benchmarked. Per workflow note,
      vitest-bench complexity not worth blocking on — but the budget
      should be verified before promoting to production scale. Cold
      cache on a Vercel cold-start = 150-200ms Stripe call; if this fires
      on every cold-started function invocation (likely high under load),
      the p99 claim could slip.

      Add-on seat cache via Upstash Redis with graceful fallback (good).
      In-memory Map approach (parent spec original design) was correctly
      avoided per parent spec S1 fix — Redis gives true shared cache
      across serverless instances.

      The chat hot path now does: rate limit (Redis) + quota check (DB +
      Redis) + workspace lookup (DB, only on first turn) + transaction
      (2 writes) + cache invalidation. Most are <10ms. Net impact
      probably <50ms added latency on the chat path warmly cached.

  reliability:
    status: PASS
    notes: |
      TOKEN-002 resolved via Sentry alerting — drift-during-outage now
      observable to ops within seconds of failure. Same-transaction
      guarantee for ChatUsageEvent + WorkspaceUsage preserved at the DB
      level (both writes commit together OR both roll back).

      Webhook two-code-paths (use $transaction only on period advance)
      is correctly implemented. Both branches produce equivalent
      workspace state; only the counter reset differs.

      Redis cache gracefully falls back to direct Stripe call if Redis
      is unavailable — chat path doesn't fail catastrophically.

      Webhook reset's cache invalidation (`invalidateSeatCache`) runs
      AFTER the transaction commits, which is the right ordering — if
      the transaction fails, cache stays as-is and subsequent reads see
      consistent data with the (rolled-back) DB state.

  maintainability:
    status: PASS
    notes: |
      Code is well-structured. New module split (lib/usage/check.ts,
      lib/usage/seat-cache.ts, app/api/cron/reset-usage-safety/route.ts,
      components/features/billing/usage-widget.tsx) is clean. Inline
      comments reference parent spec C1/C2 fixes and Story 14.27
      transaction guarantee rationale. The webhook two-code-paths
      refactor is well-commented (line 142-145 in route.ts).

      Path test gap (TOKEN-001) closed in this fix-pass — gate wiring
      now locked in by tests, so future regressions surface immediately.

future_considerations:
  - 'TOKEN-003 (low): chat route fails CLOSED on quota-check error (DB outage during assertWithinTokenQuota → HTTP 500). Defensible margin protection but during sustained outages users see "Internal server error". Could fail open (let chat through if quota check fails) — bounded by outage duration. Defer the decision until production observability shows the failure mode firing.'
  - 'TOKEN-004 (low): latency benchmark deferred per workflow note. Add a vitest bench that measures assertWithinTokenQuota p50/p95/p99 under cold + warm cache before scaling production load. Story v1.2 spec mandated this; deferred is acceptable for v1 but should land before significant traffic.'
  - 'Drift detection cron: a periodic reconciliation between ChatUsageEvent and WorkspaceUsage.tokens_used_this_period would close the silent-counter-failure path entirely. Out of scope for v1 — addresses the residual after TOKEN-002 Sentry alerting.'
  - 'Stripe Subscription Items add-on shape (Story 5.6 dependency) flows through countActiveAddonSeats unchanged. Cache wrapper is transparent to the underlying shape.'

