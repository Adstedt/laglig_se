schema: 1
story: '5.5c'
story_title: 'AI Token Quota & Hard Cap'
gate: PASS
status_reason: |
  Re-review after Dev fix-pass on TOKEN-001 + TOKEN-002. Both addressed:

  - **TOKEN-001 RESOLVED**: 4 new chat-route POST tests added to
    `tests/unit/usage/chat-quota-enforcement.test.ts`. Coverage:
      1. POST returns 402 + AI_TOKEN_QUOTA_EXCEEDED + correct JSON body
         (usage/limit/hardCap/tier) when assertWithinTokenQuota throws
         TokenQuotaExceededError
      2. POST returns 200 + no X-AI-Usage-Warning header when quota check
         passes with no warning
      3. POST attaches X-AI-Usage-Warning header (parsed JSON shape) when
         quota check returns warning
      4. POST returns 500 (fails closed) when quota check throws non-quota
         error (DB outage simulation)
    Test 1 also asserts `streamText` was NOT called — the gate stops the
    request before any AI provider invocation. A dev removing line 138 of
    the chat route now fails 3 of the 4 tests. Same-pattern equivalent of
    the SEAT-004 / STORAGE-001 fixes from 5.5a / 5.5b.

  - **TOKEN-002 RESOLVED**: `Sentry.captureException` added to the
    `onFinish` error catch at `app/api/chat/route.ts:386`. Tags include
    `area: 'chat-usage'`, `event: 'usage_write_failed'`, and the workspace
    ID for downstream filtering. Semantics unchanged — still fails-safe
    (catch swallows the throw so chat response isn't disturbed) — but ops
    now gets paged immediately when the same-transaction telemetry path
    fails. Closes the silent-counter-failure observability gap.

  117/117 tests pass across 5.5a + 5.5b + 5.5c + 5.4 regression
  (was 113 — +4 chat-route POST tests). Typecheck clean.

  Future considerations TOKEN-003 (chat fails closed — defer until obs
  shows DB outage pattern) and TOKEN-004 (latency benchmark — defer per
  workflow note) remain open but non-blocking. Both are future iteration
  candidates, not 5.5c-blocking.

