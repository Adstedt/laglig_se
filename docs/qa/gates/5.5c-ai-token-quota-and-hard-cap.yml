    refs:
      - 'tests/unit/usage/chat-quota-enforcement.test.ts (POST /api/chat — token quota gate wiring describe block)'
      - 'app/api/chat/route.ts:131-162'

  - id: 'TOKEN-002'
    severity: 'medium'
    title: 'onFinish swallows ALL errors silently — counter can fail to update without alerting'
    resolution: |
      Resolved 2026-05-05T13:25:00Z. Sentry.captureException added at
      app/api/chat/route.ts:386 with tags { area: 'chat-usage', event:
      'usage_write_failed', workspace_id }. Pure additive — the catch
      still swallows the exception (preserves Story 14.27 fail-safety
      contract that telemetry must not break user-facing chat) — but
      ops now gets immediate alert when the same-transaction telemetry
      path silently fails during a DB outage. Closes the observability
      gap; the underlying drift-during-outage residual is bounded by
      outage duration and tracked as a future-consideration drift
      reconciliation cron.
    refs:
      - 'app/api/chat/route.ts:5 (Sentry import)'
      - 'app/api/chat/route.ts:386-405 (Sentry.captureException in catch)'

