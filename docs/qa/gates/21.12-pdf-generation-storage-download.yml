nfr_validation:
  security:
    status: PASS
    notes: >-
      Unchanged from initial review. Tenant isolation via workspace-scoped
      `findFirst` on cycle row blocks cross-workspace cycleId paths at the DB
      layer (404). Storage path includes `${workspaceId}` so Supabase RLS
      provides defence-in-depth. AUDITOR read-access via `activity:view OR
      tasks:edit` matches the report-read pattern. Zod validates UUID + enum
      kind on the route handler entry. HTML escape on every template
      placeholder. Cache-Control: private, no-store. New: dual-form Content-
      Disposition (FILENAME-001) preserves Swedish characters across all
      modern browsers without exposing additional attack surface — both forms
      are properly encoded (ASCII transliterated, UTF-8 percent-encoded).
  performance:
    status: CONCERNS
    notes: >-
      Unchanged. Puppeteer cold-start ~3-5s + warm render ~500ms-30s. PDF
      size budget (IV3 <10MB) reasoned-about but not asserted by automated
      test (NFR-001, deferred — requires real-Puppeteer integration test
      infra). Acknowledged as accepted technical debt with production-
      telemetry-on-byteLength as the practical mitigation. Two redundant
      `withWorkspace` calls per generation (PERF-001, deferred — wasteful
      but benign because the second call hits the request-scoped
      `cache()`).
  reliability:
    status: PASS
    notes: >-
      Upgraded from CONCERNS after the v0.4 fix pass. INVARIANT-001 closed:
      the SEALED defensive fallback that could have written a non-canonical
      manifest is now eliminated — SEALED writes are pure `update` with no
      `manifest` field anywhere, and a missing seal-row is explicitly
      refused. AUTH-001 closed: greppable telemetry on after()-eager-gen
      success + failure provides the operational signal that
      workspace-context propagation works on Vercel. Remaining: STORAGE-001
      (deferred — orphan accumulation on partial-failure paths and
      concurrent first-downloads) is real but low-frequency and addressable
      via Supabase lifecycle rules + a future advisory-lock pass; the new
      INVARIANT-001 guard introduces a minor sub-case where SEALED-with-
      missing-row uploads orphan files before refusing (since the existence
      check is post-upload), but this is part of the same STORAGE-001
      tracking and the underlying anomaly is rare. SF-3 revert-and-
      recomplete asserted by test. after() failure isolation asserted by
      test. SEALED manifest immutability asserted by test (now via the
      stronger pure-update shape).
  maintainability:
    status: PASS
    notes: >-
      Unchanged. Clean module boundaries; pure staleness logic in its own
      module; revisionsrapport-specific PDF wrapper is thin; tiptap-to-pdf
      delegation kept the Puppeteer extraction zero-risk. New JSDoc on the
      INVARIANT-001 fix explains why SEALED is split from COMPLETE and why
      the defensive fallback was removed — load-bearing comment for future
      maintainers. AUTH-001 telemetry has a justification comment + targeted
      eslint-disable rather than blanket lint suppression. FILENAME-001
      adds two trivial helper expressions (asciiFilename + utf8Filename)
      with an inline comment citing RFC 6266 / 5987 — readers can find the
      spec without grep-spelunking.

