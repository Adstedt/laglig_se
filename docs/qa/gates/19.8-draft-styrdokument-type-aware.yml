top_issues:
  - id: 'QA-19.8-3'
    severity: high
    finding: >-
      Empty text nodes ({type:'text',text:''}) the model emits for blank table cells make
      ProseMirror's nodeFromJSON throw on editor mount → the WHOLE document renders blank
      (B3 checklista: 54 empty text nodes, 100% reproducible, survived reload). Content was
      never lost (DB had all 18 blocks); the editor could not parse it. Latent across ALL
      agent-authoring tools (draft_styrdokument, update_document, add_document_section).
    suggested_action: >-
      FIXED — added shared stripEmptyTextNodes/stripEmptyTextNodesFromList sanitizer
      (update-document-section.ts) applied in all three tools; verified the real B3 content
      now parses (0 empty nodes, 18 blocks). 4 new tests. Owner must Avvisa the pre-fix B3
      doc and regenerate to confirm end-to-end.
    suggested_owner: dev
  - id: 'QA-19.8-4'
    severity: medium
    finding: >-
      Wide agent tables (8-col handlingsplan vs templates' max 5) overflowed every render
      path — editor bled past the 210mm sheet; PDF had no table-layout:fixed; DOCX set no
      table width (ran past the Word margin). Horizontal scroll is not a valid fix for a
      printed/exported document.
    suggested_action: >-
      FIXED — fit-to-page + wrap in all four paths (editor table-fixed, preview, PDF
      table-layout:fixed+word-break, DOCX 100% width + FIXED layout + equal columnWidths)
      plus agent guidance capping canonical columns. 2 new export regression tests.
    suggested_owner: dev
  - id: 'QA-19.8-5'
    severity: low
    finding: >-
      All 11 templates opened with a body H1 duplicating the title (editor renders the
      title field separately); CHECKLISTA stacked title + H1 + H2 "Checklista".
    suggested_action: 'FIXED — stripped leading H1 from all 11 templates; re-seeded --force.'
    suggested_owner: dev
  - id: 'QA-19.8-1'
    severity: low
    finding: >-
      CHECKLIST gate accepts a ≥3-item bulletList/orderedList ANYWHERE in the tree, so a
      1-item top-level list nesting a 3-item sublist passes. Acceptable floor (gate is a
      minimum-structure check, not a shape validator).
    suggested_action: 'Tighten only if real drafts abuse it; revisit with field data.'
    suggested_owner: dev
  - id: 'QA-19.8-2'
    severity: medium
    finding: >-
      System-prompt budget is near-critical. Ceiling re-baselined 6750→7100; after the
      card-position prose rule (QA-19.8-6) the prompt is ~6984 est. tokens → headroom only
      ~117. Root growth is in-flight branch WIP in system-prompt.md, not 19.8's content,
      but 19.8 added a skill line + a guardrail rule and there is now little room left.
    suggested_action: >-
      Land the structured-parts / prompt-caching v2 refactor (Story 14.26 note) BEFORE the
      next prompt-touching story — the next addition will breach 7100.
    suggested_owner: po
  - id: 'QA-19.8-6'
    severity: low
    finding: >-
      Agent closed a draft message with "Godkänn utkastet ovan…" but the card renders
      below the text (directional prose bug; also shouldn't narrate click-instructions).
    suggested_action: >-
      FIXED — system-prompt rule: never reference the card's position or write approve-
      instructions; the card has its own buttons.
    suggested_owner: dev
  - id: 'QA-19.8-7'
    severity: medium
    finding: >-
      Duplicate guard failed (probe C3): agent created a second "Riskbedömning –
      Truckkörning" though a DRAFT already existed. Root cause: the existing draft has 0
      chunks in content_chunks, and the PROCEDURE relied solely on search_workspace_documents
      (semantic search over the index), which cannot see an unindexed draft.
    suggested_action: >-
      PARTIALLY FIXED (19.8): PROCEDURE now calls list_workspace_documents (direct DB,
      returns drafts) FIRST for the existence check; search is secondary. Owner to re-run
      C3 to confirm. SEPARATE INFRA FOLLOW-UP REQUIRED (not 19.8): agent-created drafts are
      not indexed into content_chunks — file against the 17.10b draft-indexing / 14.16
      incremental-chunk-sync track (also blocks [Utkast:] citation of such drafts).
    suggested_owner: dev

