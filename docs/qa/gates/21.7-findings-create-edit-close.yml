story_title: 'Findings — create, edit, close (type + severity + root cause)'
gate: PASS
status_reason: 'Story ships clean at the scaffolding tier — 24/24 ACs + 4/4 IVs satisfied; 76 net-new tests; full regression 4449/4449 across 318 files with zero failures; tsc + build clean. Server-action module is a textbook sibling of Story 21.5''s compliance-audit-item.ts (same ActionResult shape, same TODO(21.10) markers, same FINDING_INCLUDE consolidation, same privacy pin). SF-1 hoist of the findings SWR cache to CycleDetailPage lands cleanly; tab + per-item drawer share the same array via prop-threading with onFindingMutation as the reconciler. Security surface verified across four defence layers (auth gate, tenant isolation, cross-laglista validation, generic not-found errors). One notable engineering judgment: AC 9''s literal spec would have tombstoned every row (resolver queries by ComplianceAuditItem.id but payload carries LawListItem.id) — dev correctly substituted `list_item` for the secondary-ref entity type. Five low-severity items captured: three test-coverage gaps (AC 13 drawer filtering, AC 14 chip text, AC 10 status filter), two dev-optional polish items (DEV-001 redundant cross-link check on no-op updates, DEV-002 severity not auto-cleared when type changes off AVVIKELSE), plus two PO-owned follow-ups (PROD-001 manual-override close-reason UI, PROD-002 AC 9 resolver entity-type deviation). None block PASS.'
reviewer: 'Quinn (Test Architect)'
updated: '2026-04-23T09:25:00Z'
story_status: 'Done' # flipped by owner after PASS review

waiver: { active: false }

top_issues:
  - id: 'TEST-001'
    severity: low
    finding: 'AC 13 (per-item drawer findings affordance) is only test-pinned via the empty-state assertion ("Inga findings för denna post ännu.") that replaced the old "Hanteras i Story 21.7" placeholder. Three sub-acceptances are NOT asserted: (a) row-scoped filtering via `findings.filter((f) => f.lawListItemId === row.lawListItemId)` — a fixture with two findings pointing at different `lawListItemId` values would verify the drawer shows only the matching one; (b) the "+ Lägg till finding" button''s `prefillLawListItemId` pass-through to the editor; (c) the button being hidden when `readOnly=true`. Implementation is straightforward and manifestly correct by inspection, but the tests do not pin the contracts.'
    suggested_action: 'Extend the existing `cycle-items-tab.test.tsx` with three fixture-driven cases for the AC 13 contract. Mock surface was already extended with `createFinding`/`updateFinding`/`closeFinding`/`reopenFinding` stubs, so no additional scaffolding needed. ~15 min.'
    suggested_owner: dev

  - id: 'TEST-002'
    severity: low
    finding: 'AC 14 header findings count chip renders but its Swedish text is never asserted. Component sets `data-testid="cycle-header-findings-chip"` and renders `Findings: {open} öppna · {closed} stängda` (or `Findings: inga` when both counts are 0), but no test reads the chip''s textContent. A label-copy change or a `findingCounts` prop-threading regression would slip past CI.'
    suggested_action: 'Add two assertions to `cycle-items-tab.test.tsx` (which already mounts CycleDetailPage → CycleDetailHeader): (a) with `initialFindings=[]`, chip text = "Findings: inga"; (b) with `initialFindings=[openFixture, closedFixture]`, chip text = "Findings: 1 öppna · 1 stängda". ~5 min.'
    suggested_owner: dev

  - id: 'TEST-003'
    severity: low
    finding: 'AC 10 status filter (All / Öppna / Stängda) is not exercised in `cycle-findings-tab.test.tsx`. Type filter + severity-visibility are tested; status toggle is not. The button group renders via `data-testid="finding-filter-status-{open|closed|all}"` but no test asserts the useMemo filter actually narrows the list on click.'
    suggested_action: 'Add one fixture-driven test: findings=[openFixture, closedFixture], click "Stängda" chip, assert only closed finding title is visible. Mirror the existing type-filter test at `cycle-findings-tab.test.tsx:~140`. ~5 min.'
    suggested_owner: dev

  - id: 'DEV-001'
    severity: low
    finding: '`updateFinding` runs the cross-link tenant-validation Prisma call (`lawListItem.findFirst`) even when `parsed.data.lawListItemId === existing.law_list_item_id` (a no-op caller passing the current value through). The idempotent-diff shortcut fires AFTER the cross-link check, so the redundant round-trip is paid. Cost: 1 extra findFirst per no-op save that includes the cross-link field. Not performance-critical at current scale but a Story 21.5-style DEBT-001 opportunity.'
    suggested_action: 'Gate the cross-link `findFirst` on the "value actually changed" predicate: only run it when `parsed.data.lawListItemId !== existing.law_list_item_id` (same shape for the requirement check). Dropping this eliminates one round-trip per no-op save of cross-linked findings. ~5 min.'
    suggested_owner: dev

  - id: 'DEV-002'
    severity: low
    finding: '`updateFinding` does not auto-clear `severity` when `type` changes away from AVVIKELSE. The editor dialog handles this client-side (clears severity on type-switch), but a direct API call could leave a stale `severity=MAJOR` on an OBSERVATION or FORBATTRING row. Formatter falls back gracefully (severity badge only renders when `type === AVVIKELSE && severity != null`), so no runtime break, but the row''s DB state is semantically inconsistent.'
    suggested_action: 'In the `type !== existing.type` branch of the diff builder, when `parsed.data.type !== AVVIKELSE` AND `existing.severity !== null`, also set `data.severity = null` and record the implicit clear in `oldValue.severity` / `newValue.severity`. Keeps server state self-consistent regardless of caller. ~5 min.'
    suggested_owner: dev

  - id: 'PROD-001'
    severity: low
    finding: 'The manual-override close-reason UI is minimal for 21.7. The row''s "Stäng" button sends `closeFinding({findingId})` with no reason; if the AVVIKELSE+incomplete-task gate rejects, the user sees the `FINDING_REQUIRES_TASK_CLOSURE:`-prefixed error toast but has no inline UI to supply the override reason. Server path is fully wired + tested (the close_reason activity-log crumb with manual_override=true is covered by a dedicated test), but the user has to mentally parse the error + retry via… the existing UI, which offers no reason input. Completion Note 5 flags this as intentional deferred scope.'
    suggested_action: 'Follow-up story (minimal 1-hour scope): add a reason-prompt modal that pops on the gate rejection, captures a textarea input, and re-submits `closeFinding({findingId, closeReason})`. Alternatively, a secondary "Stäng med anledning" action. Either lands atop the fully-tested server path without additional backend work.'
    suggested_owner: po

  - id: 'PROD-002'
    severity: low
    finding: 'AC 9 literally specified `{entity_type: "compliance_audit_item", entity_id: lawListItemId}` for `getSecondaryRef`, but the existing `compliance_audit_item` resolver branch (from Story 21.13) looks up by `ComplianceAuditItem.id` — not `LawListItem.id`. Dev correctly substituted `list_item` so the resolver actually finds the entity (documented in Completion Note 1 + in `entity-resolver.ts` inline comment). Net UX effect: activity-feed secondary link for finding rows goes to `/laglistor?document=X` instead of the cycle-scoped `/laglistor/kontroller/<cycleId>#items`. Primary ref is unaffected — finding rows still deep-link into the cycle. The right engineering call; flagged for PO visibility.'
    suggested_action: 'Accept as-is (recommended), OR in a Story 21.13 follow-up extend the resolver to batch-fetch ComplianceAuditItem by `law_list_item_id` + cycle context (de-dup required because one LawListItem can be in many cycles). The secondary-link URL change is cosmetic — users land on the law page with context, just not the specific cycle.'
    suggested_owner: po

