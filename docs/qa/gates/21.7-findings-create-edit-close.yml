nfr_validation:
  security:
    status: PASS
    notes: 'Four defence layers verified. (1) Authorisation: withWorkspace + tasks:edit for mutations; OR-gate (activity:view || tasks:edit) for the read action preserves the Story 21.14 AUDITOR regression pin. (2) Tenant isolation: every Prisma query joins through `cycle.workspace_id`; cross-link validation rejects items/requirements in other workspaces (`Den valda lagen tillhör inte arbetsytan` — NH-3 tenant pin, tested) and items/requirements in the same workspace but a different laglista (`Lagposten tillhör inte kontrollens laglista` — tested). (3) Write-suppression on SEALED/ARKIVERAD via `assertCycleEditableUi` on all four mutations, tested per mutation. (4) Generic `Kontrollen hittades inte` on cross-workspace cycle reads prevents existence leak. No hardcoded secrets, no new env vars, no new external APIs. Zod validates every action; `CloseFindingSchema.closeReason` transform-to-null (SF-2) pushes whitespace rejection to the business layer without the generic Zod "Too small" leak. Privacy pin: description + root_cause logged as length only, never raw text — enforced via test that asserts the secret string does NOT appear in logActivity mock call args.'
  performance:
    status: PASS
    notes: 'Page-level SWR hoist (SF-1 fix) materialises the findings cache once on mount via fallbackData, shared by tab + drawer via prop-threading — no second useSWR subscription in the drawer. Client-side filtering via useMemo (no refetch on chip click). Server-side sort (created_at desc, id desc), zero client sort. Virtualisation threshold 50 (tab) vs. 100 (items) — intentional since finding rows carry more vertical content. 150-finding jsdom microtest (IV3) completes well under the 1500ms ceiling. Activity-row resolver reuses the existing list_item batch for secondary refs — no additional findMany for finding → item lookups. DEV-001 notes a redundant cross-link findFirst on no-op updates (one extra round-trip per save that includes an unchanged cross-link field); minor, not perf-critical at current scale.'
  reliability:
    status: PASS
    notes: 'All 4 mutations idempotent: unchanged update → no DB write + no log row; already-closed close → no-op return; already-open reopen → no-op. Closed findings cannot be edited (forces the explicit reopen affordance for audit-trail clarity — tested). Fail-open for the RSC findings read: if `listFindingsForCycle` errors, initialFindings defaults to [] and the page still renders (mirrors the items-read fail-open). Toast-on-error pattern consistent with Story 21.5. Mutation + logActivity outside `$transaction` is inherited project-wide debt (not a 21.7 regression — same as Story 21.5 DEBT-003).'
  maintainability:
    status: PASS
    notes: 'File-header JSDoc on the new server-action module matches 21.5 convention verbatim. TODO(21.10) markers on every mutation for future grep by the Story 21.10 dev. Single `FINDING_INCLUDE` constant drives every read + mutation-return shape (no drift risk). `FINDING_TYPE_LABELS` / `FINDING_SEVERITY_LABELS` centralised in `finding-copy.ts` (mirrors `bedomning-copy.ts`). `FINDING_TYPE_LABELS_DEFINITE` for activity sentences lives in `format-activity.ts` alongside existing label maps. Centralised SWR keys module (`lib/swr-keys/compliance-audit.ts`) — new file as called for in architecture §8.1; Story 21.5''s items key was refactored into it at the same time (the optional refactor called out in Task 3.2). `getSecondaryRef` deviation documented inline in `entity-resolver.ts` with rationale. No `any` types; `as unknown as LoadedFinding` casts match the 21.5 idiom.'

