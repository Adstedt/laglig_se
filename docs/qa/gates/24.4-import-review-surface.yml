nfr_validation:
  security:
    status: PASS
    notes: |
      Workspace scoping on every action via `withWorkspace`. The
      `replaceRowMatch` action explicitly validates the chosen
      `candidateDocId` is in the row's `match_candidates` JSON — guards
      against arbitrary doc-id injection (AC 17 integration test verifies
      this rejection). `getImport` uses `'read'` permission (workspace-
      member-readable). All Prisma queries are workspace-scoped via
      `loadWorkspaceScopedRow` helper. Email send is fail-safe (try/catch +
      console.error; doesn't fail the commit). No new auth surface.
  performance:
    status: CONCERNS
    notes: |
      `getImport` is one Prisma query with includes — good. Bulk operations
      use `updateMany` / `createMany` — good. `commitImport` runs in a
      single transaction — good. **Concern: row-list virtualisation
      deferred** (PERF-001). At ~50-100 rows, the rendering is fine; at
      ~1000 rows (parser cap), interaction latency degrades because every
      filter chip click and every state update reconciles all 1000
      `<ImportRowCard>` instances. Mitigations: (a) wire `useVirtualizer`
      per AC 2; (b) client-side filtering already short-circuits — at
      filter !== 'all' the rendered count drops, so the worst-case is
      unfiltered "Alla" view of a 1000-row import. Real-world expected to
      hover ~50-300 rows; rare beyond that.
  reliability:
    status: PASS
    notes: |
      Idempotency throughout — every action's natural-key behavior is
      idempotent (re-accepting an already-accepted row succeeds; commit
      returns existing law_list_id; requestCatalogAdd returns existing
      request). Edge states (empty / MATCHING / FAILED / COMMITTED) are
      explicit pre-render branches in the page. Email send is fail-safe.
      Status state machine respects guards (cannot commit unless
      AWAITING_REVIEW; cannot accept unless MATCHED_*; etc.). The undo
      branch correctly handles each prior state including deleting the
      pending CatalogIngestRequest when undoing a CATALOG_REQUEST_PENDING.
  maintainability:
    status: PASS
    notes: |
      Server-action file is now 1316 lines but each action is independent
      and well-named with section banners. The `loadWorkspaceScopedRow`
      helper + `MatchCandidateJson` type + `isMatchCandidate` type guard
      keep the type narrowing clean. Component files are 480-530 lines —
      long but cohesive (page shell + per-row card are the natural
      boundaries). Activity-log integration follows the established 3-file
      pattern (action-constants + categories + format-activity). Email
      template mirrors `task-assigned.tsx` exactly. AC 8 schema correction
      is documented in dev Debug Log so future devs touching commitImport
      see the rationale. Test mocks are well-scoped (next/cache,
      email-service, matcher).

