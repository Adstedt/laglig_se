top_issues:
  - id: 'PERF-001'
    severity: medium
    finding: |
      AC 2 specifies "shadcn `<Table>`: rows virtualised via `TanStack Virtual`
      for >50 rows". Implementation in `import-review-page.tsx` renders a
      naive `filteredRows.map(...)` over `<ImportRowCard>` (each card ~150-
      200px tall) with no virtualisation. The dev's deferral note —
      "fixtures stay sub-100 rows" — is true for the dev fixtures, but
      `lib/import/parser.ts:MAX_ROWS = 1000` means real customer imports can
      legitimately produce 1000 rows. At that size, the page renders ~150-200K
      pixels of DOM (~1000 cards × ~180px) plus the per-row React reconciler
      cost on every state mutation. Browsers will cope but interaction
      latency degrades noticeably.
    suggested_action: |
      Wire `useVirtualizer` from `@tanstack/react-virtual` per the existing
      pattern at `components/features/compliance-audit/cycle-detail/cycle-items-tab.tsx`.
      Threshold of 100 rows (mirrors that file's `VIRTUALIZATION_THRESHOLD`)
      is conservative — below 100 rows the array .map is fine. ~30 lines.
      Pair with a per-row `estimateSize` of ~180px since `<ImportRowCard>` is
      the larger card (vs cycle-items' 72px row). Keep the existing
      filtered-array pipeline above the virtualizer; the virtualizer only
      changes the rendering layer.
    suggested_owner: dev
  - id: 'TEST-001'
    severity: low
    finding: |
      AC 18 says "first verify Playwright setup exists: check for
      `playwright.config.ts` at repo root + `tests/e2e/` directory. If neither
      exists, skip the E2E test entirely". Both DO exist in this repo
      (verified). The dev's Completion Notes substitute a manual smoke
      checklist instead, citing "Playwright config exists but the harness is
      heavy for a single happy-path". This is a strict-reading deviation
      from AC 18's escape hatch. The 34 component+integration tests give
      strong coverage — the missing E2E is a happy-path-confidence gap, not
      a logic gap.
    suggested_action: |
      Either (a) write the AC-mandated `tests/e2e/import-flow.spec.ts` happy-
      path: upload notisum fixture → wait for matching → click "Acceptera
      alla höga" → confirm → click commit → assert redirect to
      `/laglistor/{id}` → assert items present. Mocking the LLM in E2E means
      either pre-seeding rows directly into the DB OR running against the
      live Anthropic API (~$0.20 per CI run). Recommend (a) with pre-seeded
      rows. (b) the alternative — formally waive the AC by getting PO
      sign-off and updating AC 18 to drop the E2E requirement.
    suggested_owner: dev
  - id: 'TEST-002'
    severity: low
    finding: |
      Single test flake observed during parallel run (component + integration
      suites running concurrently): one of the integration tests intermittently
      failed with `expected false to be true` then passed on isolated re-run.
      Root cause likely vitest worker-pool DB-row contention — the integration
      tests share the test workspace via `TEST_PREFIX` and parallel workers
      can race during the row-state setup. Not a code defect; tests pass
      reliably when run alone OR when integration runs sequentially.
    suggested_action: |
      Add `pool: 'forks', poolOptions: { forks: { singleFork: true } }` to
      `vitest.config.mts` for the integration suite specifically (or move
      the integration tests to a separate config). Alternatively, gate
      cross-test fixtures with per-test prefixes (e.g. test name
      hashed-into-prefix). Defensible to defer — the flake is rare enough
      that the existing suite catches issues reliably in practice.
    suggested_owner: dev

