top_issues:
  - id: 'SPEC-001'
    severity: medium
    finding: |
      Action constants `law_list_import.created` and `law_list_import.committed`
      use dot notation, but every other entry in `lib/activity/action-constants.ts`
      KNOWN_ACTIONS array uses pure snake_case (e.g., `cycle_created`,
      `finding_created`, `task_linked`). Dev followed AC 11 verbatim (the AC
      explicitly shows the dotted form), so the convention break originates in
      the story spec, not the implementation. Currently no consumer parses the
      string by separator, so functional risk is zero — but it sets a precedent
      that downstream stories (24.2 + 24.4) will copy.
    suggested_action: |
      PO to ratify either (a) keep dots → update Epic 24 stories' AC text +
      add a one-line note in the new "Epic 24 — Import" comment block in
      action-constants.ts saying "Epic 24 uses dot notation as a deliberate
      namespace convention", OR (b) rename to `law_list_import_created` /
      `law_list_import_committed` and update Stories 24.2/24.4 AC text to
      match. Trivially cheap to flip now (only 2 strings + 4 references); cost
      grows once 24.2/24.4 introduce per-row event keys.
    suggested_owner: po
  - id: 'SPEC-002'
    severity: medium
    finding: |
      AC 7 specifies `CREATE POLICY ... USING (...)` blocks for the three new
      tables, citing `prisma/migrations/20260430120000_enable_rls_public_tables`
      as the canonical reference. That reference contains ZERO `CREATE POLICY`
      statements anywhere in the project (verified: `grep -rn "CREATE POLICY"
      prisma/migrations/` returns nothing). Its file-header docstring documents
      the actual project pattern: "RLS-enabled-no-policy = default deny for
      non-bypass roles. Prisma connects as the postgres role (BYPASSRLS)."
      Dev correctly applied ENABLE-only and documented the divergence in
      Completion Notes. Workspace isolation in this project is enforced at the
      application layer via `withWorkspace` + workspace_id filters in server
      actions — verified by the 18 integration tests in this story.
    suggested_action: |
      PO to either (a) update Epic 24 brief + AC 7 in 24.5 to match the actual
      project pattern (ENABLE-only + application-layer scoping), OR (b)
      coordinate with architect to introduce `CREATE POLICY` blocks across the
      project as a separate cross-cutting concern. Recommend (a) — the
      ENABLE-only pattern is project-wide and intentional. Without ratification,
      Story 24.5 (admin queue) review will surface the same question.
    suggested_owner: po
  - id: 'SPEC-003'
    severity: low
    finding: |
      AC 3/4/5 specify `@id @default(cuid())` but every existing model in
      `prisma/schema.prisma` uses `@default(uuid())`, including the canonical
      "Schema additive pattern" reference (`ComplianceFinding`,
      `OnboardingEvent`) cited in the story Dev Notes. Dev chose `uuid()` for
      project consistency. The Dev Notes guidance + project precedent both
      point at uuid; the AC text appears to be the outlier.
    suggested_action: |
      PO to update Epic 24 stories (24.1 → done; 24.2-24.6 if any introduce
      new models) to specify `uuid()`. No code change needed in 24.1; this is
      an AC-text reconciliation only.
    suggested_owner: po

