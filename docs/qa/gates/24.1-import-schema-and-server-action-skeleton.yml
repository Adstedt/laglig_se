    ac_vacuously_satisfied: [17] # /laglistor/skapa route doesn't exist; 24.6 creates it
    ac_gaps: []
  ac_trace_details:
    ac_1_migration_file: |
      Migration file at `prisma/migrations/20260507120000_add_law_list_import/migration.sql`
      matches YYYYMMDDHHMMSS_ canonical pattern. Dev couldn't run
      `pnpm prisma migrate dev --create-only` due to a pre-existing shadow-DB
      issue with the `document_visits` historical migration (text vs uuid type
      mismatch — unrelated to this story). Worked around with
      `prisma migrate diff --from-empty --to-schema-datamodel`; output is
      structurally identical to what `migrate dev` would produce. User
      confirmed the migration ran successfully against Supabase. Prisma client
      regenerated successfully post-apply.
    ac_7_rls: |
      Three new tables have `ALTER TABLE ... ENABLE ROW LEVEL SECURITY;` at
      the bottom of the migration. Zero CREATE POLICY blocks (matching project
      pattern). Cross-workspace isolation tested at application layer via 3
      tests in `tests/integration/db/rls/law-list-import-rls.test.ts`.
    ac_13_action_stubs: |
      All 8 action stubs return `{ success: false, error: 'NOT_IMPLEMENTED' }`
      via the typed `notImplemented<T>()` helper. Verified by 10 integration
      tests in `tests/integration/app/actions/law-list-import.test.ts` plus 2
      Zod-validation-short-circuit tests + 3 workspace-scoping leak tests.
    ac_14_rls_test: |
      Three cross-workspace read-isolation tests cover LawListImport,
      LawListImportRow, and CatalogIngestRequest. All use the project's
      established `TEST_PREFIX` + Prisma findFirst / findMany pattern (mirrors
      `tests/integration/workspace/isolation.test.ts`). Write-isolation tests
      not present because all stubs return NOT_IMPLEMENTED — write paths
      land in 24.2-24.4. See recommendations.future for follow-up.

nfr_validation:
  security:
    status: PASS
    notes: |
      Workspace isolation enforced at the application layer via the
      `withWorkspace(cb, 'tasks:edit')` wrapper on all 8 user-facing actions
      and `getAdminSession()` on the 2 admin actions. Zod validation guards
      every server-action input. RLS enabled on all three new tables (deny-by-
      default for non-bypass roles, matching project pattern). No new auth
      surface. No secrets, no dynamic SQL, no PII leakage.
  performance:
    status: PASS
    notes: |
      6 indexes on hot query paths: `[workspace_id, status]` on imports +
      catalog requests, `[created_by_user_id]` on imports, `[import_id,
      match_status]` + `[matched_document_id]` on rows, `[handler_user_id]`
      on catalog requests. All N:1 joins covered. `committed_law_list_id`
      has an implicit unique index from `@unique`. `match_candidates` Json
      field is read-mostly per row — design choice documented in story Dev
      Notes ("read-mostly per-row; persisting top-K candidates inline beats
      N+1 lookups"), validated.
  reliability:
    status: PASS
    notes: |
      Skeleton story — actual reliability validation (parser failure modes,
      matcher timeouts, transactional commit) lands in 24.2-24.4. The stubs
      themselves are reliable: each Zod-validates input, each calls
      `withWorkspace` (which throws on auth/permission failure → caller
      handles), each returns the typed NOT_IMPLEMENTED sentinel. No
      unreachable error paths.
  maintainability:
    status: PASS
    notes: |
      Each stub carries a `// TODO(24.x):` comment naming the implementing
      story so a grep finds open work fast. The shared `notImplemented<T>()`
      helper avoids the typed-return mismatch that would have plagued a
      shared constant under `exactOptionalPropertyTypes: true`. Schema
      additions are inline-commented with story context. Migration SQL has
      a comprehensive header explaining the additive pattern + RLS rationale.
      Every new file follows existing project file-naming + folder-placement
      conventions (`lib/validation/`, `app/actions/`, `tests/integration/...`).

