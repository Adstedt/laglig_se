  performance:
    status: PASS
    notes: 'One statute poll + per-candidate enrichment fetches bounded to signalled docs + timeout-buffer drain (idempotent across runs). Well within 300s.'
  reliability:
    status: PASS
    notes: 'Per-signal fail-soft, idempotent dedup (AC 5, proven live), CronJobRun start/complete/fail logging, drain-over-runs. Strong.'
  maintainability:
    status: PASS
    notes: 'Clean separation — pure classifier / projection / emitter / orchestration core; shared by route + runner; reuses the existing SFS crawler→enrich + notify/assess pipeline rather than forking it.'

