top_issues:
  - id: 'ARCH-001'
    severity: low
    finding: 'AC-4 deviation (documented + accepted): the in-cron AMENDMENT emit is NOT hash-gated. computeContentHash hashes post-Claude HTML so it cannot gate Claude pre-normalize; the guard was moved to the out-of-band re-ingest (Option 2). A spurious API ANDRINGSFORFATTNING signal would therefore emit a ChangeEvent + notification before any text-change confirmation.'
    suggested_action: 'Accept — Skolverket only publishes an ANDRINGSFORFATTNING for a real change, and the re-ingest hash guard suppresses redundant writes. Revisit only if false amendment notifications are observed.'
    suggested_owner: dev

  - id: 'OPS-001'
    severity: low
    finding: 'The live first-run was committed via the runner script (run-skolfs-detector-once.ts --commit), which does NOT log a SUCCESS CronJobRun. The real Vercel cron will therefore recompute firstRun=true on its first execution and re-process the 45 UPCOMING amendments (all deduped → 0 created, 45 dup). Harmless but a wasteful first cron run (45 enrichment fetches for already-existing events).'
    suggested_action: 'Optional: have the runner script log a CronJobRun, or accept the one-time wasted first cron run. Also confirm CRON_SECRET is set in prod (the auth guard is bypassed when the env var is unset — same pattern as discover-sfs-amendments).'
    suggested_owner: dev

resolved_issues:
  - id: 'TEST-001'
    resolution: 'RESOLVED (re-review). Added 3 cross-module chain-consistency tests (skolfs-change-detection.test.ts:375-408) that drive the REAL buildCurrentSnapshots projection against a 9.7-style baseline: (a) matching chains → zero signals (no false AMENDMENT), (b) a genuinely new VALID amendment in the statute → AMENDMENT(2026:99) [positive control], (c) VALID→EXPIRED → REPEAL. The AMENDMENT positive path is now automated. Residual (low, MON-001): a real-world Skolverket amendment still hasn’t been observed in production — monitoring item, not a code gap.'
  - id: 'TEST-002'
    resolution: 'RESOLVED (re-review). Added 5 tests (amendment-notifications.test.ts) incl. an end-to-end assertion that an AGENCY_REGULATION/UPCOMING_AMENDMENT ChangeEvent flows through createChangeNotifications → AMENDMENT_REMINDER notification per recipient (3 recipients/2 workspaces), plus the amendment_reminder_enabled preference-gate path. Confirmed AMENDMENT_REMINDER is mapped in NOTIFICATION_TYPE_TO_PREFERENCE (user opt-out wired). Residual (low): a real-DB seed integration test remains nice-to-have; the mocked end-to-end + the live notify-query match cover the behavior.'
  - id: 'TEST-003'
    resolution: 'RESOLVED. Added skolfs-detector.test.ts (3 tests, mocked prisma + injected fetch): dry-run (commit=false) writes nothing (changeEvent.create + legalDocument.update not called), commit emits one enriched AMENDMENT, and idempotency yields a duplicate with no create.'
  - id: 'BUILD-001'
    resolution: 'RESOLVED. Owner confirmed pnpm build is green (AC10 satisfied). Combined with clean typecheck + lint + 76/76 unit tests, the no-regression bar is met.'
  - id: 'VER-001'
    resolution: 'Live first-run (owner-approved) against the real DB: dry-run preview matched 9.7 exactly (45 UPCOMING, 0 AMENDMENT/REPEAL, 2 silent NEW_LAW); commit wrote 45 events, 0 failed; re-run proved dedup (0 created / 45 dup). DB query confirmed all 45 are AGENCY_REGULATION/notification_sent=false and matched by the notify query, with enriched Swedish ai_summary.'
  - id: 'MIG-001'
    resolution: 'ChangeType.UPCOMING_AMENDMENT migration authored as hand-off and applied by the owner; enum fan-out across notify (NOTIFIABLE_CHANGE_TYPES + AMENDMENT_REMINDER) + 6 UI Record<ChangeType> maps + reader-utils, typecheck clean. Runtime consumers verified safe (generate-summaries excludes our events via ai_summary:null).'

