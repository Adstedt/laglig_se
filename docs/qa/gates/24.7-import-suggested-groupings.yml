top_issues:
  - id: 'FORMAT-001'
    severity: low
    finding: >
      Activity-log copy in `lib/activity/format-activity.ts:732` reads
      `${tier1} från Område` where `tier1Count` is the number of GROUPS, not
      rows. Reads ambiguously to a user — "8 från Område" parses naturally as
      "8 rows" rather than "8 groups".
    suggested_action: >
      Either reword to `${tier1Count} grupper från Område, ${tier2Count} från AI`
      OR rename the payload fields to `tier1GroupCount` / `tier2GroupCount` for
      clarity. Cosmetic; can ship as-is and be polished after first ops review
      of the activity feed.
    suggested_owner: dev
  - id: 'LLM-001'
    severity: low
    finding: >
      `lib/import/grouping-llm.ts:99` defines `clusters: z.array(...).min(1)`.
      A genuine empty-clusters response from the model would trip Zod and
      cascade through the failure path as `schema_violation`, displayed to
      users as "AI inte tillgänglig" — misleading.
    suggested_action: >
      Drop the `.min(1)` requirement and let the existing all-singletons
      fallback path (already tested in `grouping-proposer.test.ts:Tier 2
      all-singletons`) handle the empty case naturally.
    suggested_owner: dev
  - id: 'TEST-001'
    severity: low
    finding: >
      Manual UI smoke (AC 24's 6-step checklist) was deferred to a follow-up
      local pass. Procedure is documented in story Completion Notes;
      automated coverage exercises the equivalent code paths.
    suggested_action: >
      Run the documented manual smoke before the next release cut. Not
      blocking — 86 automated tests cover the unit/integration/component
      surfaces including all four LLM failure modes and dialog-close
      mid-call.
    suggested_owner: dev

