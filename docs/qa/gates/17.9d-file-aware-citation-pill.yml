top_issues:
  - id: 'DOM-001'
    severity: medium
    status: resolved
    finding: 'QuickPreview (block-level <div>/<p> modal) rendered inside the markdown <p> wrapping the citation pill → "In HTML, <div> cannot be a descendant of <p>" + "<p> cannot be a descendant of <p>" — 4 hydration/validateDOMNesting console errors on modal open. Worked visually (fixed-position) but invalid HTML.'
    suggested_action: 'RESOLVED in review: wrapped the QuickPreview mount in createPortal(..., document.body) so the modal escapes the <p>. No visual change (modal is position:fixed). Regression test added: pill rendered inside a <p>, modal asserted to have no <p> ancestor.'
    refs: ['components/features/ai-chat/citation-pill.tsx', 'tests/unit/components/features/ai-chat/citation-pill.test.tsx']
    ac_refs: [5]
  - id: 'REL-001'
    severity: low
    finding: 'handleOpenFile silently does nothing when getFileById returns success:false (file deleted, moved, or cross-tenant). The user clicks a file pill and gets no modal and no feedback.'
    suggested_action: 'Surface a Swedish error toast (or inline state) on the failure branch so a stale/inaccessible citation is not a silent dead-click.'
    refs: ['components/features/ai-chat/citation-pill.tsx']
    ac_refs: [4, 5]

