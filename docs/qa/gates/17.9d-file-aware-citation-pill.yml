status_reason: 'All 7 ACs met. Owner manual smoke passed (paperclip pill, hover passage preview, click -> real PDF modal, no lagläsaren copy). The one DOM bug found in smoke (DOM-001, modal nested in <p>) was fixed during review via createPortal + a regression test, and re-smoke confirmed the console is now clean. Only a single low-severity, optional follow-up remains (REL-001).'
