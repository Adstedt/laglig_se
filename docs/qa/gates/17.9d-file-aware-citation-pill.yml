nfr_validation:
  security:
    status: PASS
    notes: 'getFileById + getFileDownloadUrl both enforce workspace_id scoping (withWorkspace + findFirst where workspace_id). fileId originates server-side from the search_workspace_files tool result, not user input — no cross-tenant or injection vector. No schema/server-action changes.'
  performance:
    status: PASS
    notes: 'No render-time fetches. One getFileById on click + one getFileDownloadUrl on preview open. QuickPreview self-returns null until opened, so closed file pills carry no DOM cost.'
  reliability:
    status: PASS
    notes: 'Happy path solid and confirmed in-app. The DOM-001 nesting bug is resolved (portal + regression test, re-smoke clean). The only residual is REL-001: the getFileById error branch is a silent no-op — low impact (cited files almost always exist; no crash, workspace-scoped), tracked as an optional follow-up, not a reliability failure.'
  maintainability:
    status: PASS
    notes: 'Mirrors the shipped styrdokument pill pattern; presence-of-fileId discriminator consistent with the workspaceDocumentId convention (no kind union). Snippet preview file-scoped via a separate condition with a clear comment. Tests mirror source structure.'

