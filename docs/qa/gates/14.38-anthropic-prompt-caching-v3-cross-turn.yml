story_title: 'Anthropic Prompt Caching v3 — Cross-Turn History Caching'
gate: PASS
status_reason: 'Cross-turn caching is implemented and empirically proven (87.4% real cache-hit, cost down, no regressions). The cache_hit_pct metric defect was fixed during review (smoke script + canonical 14.37 verification SQL corrected to cacheRead/input; confirmed no production code surface). Under the corrected metric AC2 reads 87% ≥ 65% — satisfied. Two low-severity advisory follow-ups remain (LAW/CHANGE live check; PO re-baseline of the 14.37 numbers).'
reviewer: 'Quinn (Test Architect)'
updated: '2026-06-15T22:35:00Z'

top_issues:
  - id: METRIC-001
    severity: low # was medium — RESOLVED during review
    status: resolved
    finding: >-
      The cache_hit_pct metric was cacheRead/(cacheRead+input). Because the
      AI-SDK Anthropic inputTokens is INCLUSIVE of cacheRead, this double-counts
      and caps at 50% (pinned ~46-48% even at 87% real hit). RESOLVED in review:
      corrected to cacheRead/input in the smoke script and the canonical 14.37
      verification SQL (with a dated correction note). Confirmed no production
      code surface — the admin cache-dashboard is the Redis/server cache (a
      different metric) and scripts/check-usage-events.ts was already correct.
    suggested_owner: dev
    suggested_action: >-
      Done in review. Residual: PO to re-baseline the 14.37 comparison numbers
      against the corrected formula (bookkeeping, no migration).
  - id: COV-001
    severity: low
    finding: >-
      Live verification covered GLOBAL only; AC2 names GLOBAL/LAW/CHANGE.
      LAW/CHANGE add extended-thinking tokens after bp2.
    suggested_owner: dev
    suggested_action: >-
      Run the same warm matrix on LAW and CHANGE contexts and confirm cross-turn
      reads still climb. Low risk — buildModelMessages is context-agnostic.
  - id: MON-001
    severity: low
    finding: >-
      The Anthropic 20-block lookback could make a next-turn read miss bp2 on
      very long single agentic turns (>20 content blocks). Not observed at tested
      lengths; one breakpoint spare (3 of 4 used).
    suggested_owner: dev
    suggested_action: >-
      Monitor; add an intermediate breakpoint only if long-turn cross-turn misses
      appear in telemetry.

