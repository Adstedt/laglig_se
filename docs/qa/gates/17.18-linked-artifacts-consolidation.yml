top_issues:
  - id: 'PERF-001'
    severity: medium
    finding: 'getLinkedArtifactsForListItem does a single Prisma findFirst with 5 nested relation includes (3 levels deep on the task path). Performance unbenchmarked on outlier laws with >50 task links.'
    suggested_action: 'Run a scale probe post-GA on workspaces with the longest task lists. If response time exceeds 100ms on representative outliers, consider splitting the task-path query OR adding pagination to task_links.'
    refs: ['app/actions/linked-artifacts.ts:80-173']
    suggested_owner: dev
  - id: 'TECH-001'
    severity: low
    finding: 'Cache key string `list-item-details:v3:${id}` is constructed inline at 5 sites across 3 files. Future schema bumps require a 5-site grep + edit.'
    suggested_action: 'Extract to a shared helper, e.g. `export const listItemDetailsCacheKey = (id: string) => ...` in lib/cache/keys.ts. Single source of truth for future bumps.'
    refs:
      - 'app/actions/legal-document-modal.ts:220'
      - 'app/actions/law-list-item-requirements.ts:104'
      - 'app/actions/prefetch-documents.ts:62,113'
    suggested_owner: dev
  - id: 'DEBT-001'
    severity: low
    finding: 'EvidenceSummary type + evidence field on getListItemDetails return shape are dead code post v2.0 (the consumer EvidenceSummaryBox was deleted). Deferred cleanup per Completion Notes.'
    suggested_action: 'Schedule a follow-up cleanup story to remove the type, the field, and the corresponding pathway in lib/hooks/use-list-item-details.ts. Estimated 30 min.'
    refs:
      - 'app/actions/legal-document-modal.ts'
      - 'lib/hooks/use-list-item-details.ts'
    suggested_owner: dev
  - id: 'DEBT-002'
    severity: low
    finding: 'tasksWithoutAttachmentCount is computed server-side in linked-artifacts.ts but no longer consumed (the corresponding widget row was removed in v2.1).'
    suggested_action: 'Either drop the field from LinkedArtifactsResult (saves a small computation) OR add an attachment_required flag on tasks (parallel to bevis_required) to revive the widget signal as a meaningful gap indicator.'
    refs: ['app/actions/linked-artifacts.ts:263-269,289']
    suggested_owner: po

