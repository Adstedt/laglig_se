top_issues:
  - id: 'TEST-001'
    severity: low
    finding: |
      AC 9 specifies a `truncated: true` warning path for files with >1000
      data rows (parser caps + import row's `error_message` set to the warning
      copy "Vi importerade de första 1000 raderna…"). The parser unit tests
      verify `truncated: false` on every committed fixture (none of which have
      >1000 rows), and the integration suite has no >1000-row test fixture.
      The truncation branch is correctly implemented (verified by code read at
      `lib/import/parser.ts:73-75` for xlsx and `parser.ts:107-110` for csv)
      but never exercised by an automated test.
    suggested_action: |
      Add ONE small unit test that constructs an in-memory xlsx with 1001 rows
      (use `XLSX.utils.aoa_to_sheet` similar to the existing empty-workbook
      test at `parser.test.ts:55-62`), asserts `truncated === true`, and
      `rows.length === 1000`. Keep it in `parser.test.ts` — no fixture file
      needed. ~15 lines. Defensible to defer to a follow-up since no real
      customer file is anywhere near 1000 rows yet.
    suggested_owner: dev
  - id: 'TEST-002'
    severity: low
    finding: |
      AC 16's "Failure: oversized file (>5MB synthetic) → server action
      rejects before parsing" is partially tested. The Zod max-length cap on
      `fileBuffer` is exercised at `tests/integration/app/actions/law-list-import.test.ts`
      (the "rejects oversized file via Zod max-length" test). However, the
      parseImportFile action ALSO performs a defensive post-decode byte-length
      check at `app/actions/law-list-import.ts:164-172`. That defensive
      branch isn't separately tested — the Zod gate fires first on any
      realistic input. Both layers are correct; only one is covered.
    suggested_action: |
      Add a test that submits a fileBuffer JUST UNDER the Zod cap (~6.99 MB
      string) but where decoded bytes EXCEED 5 MB after base64 decode. This
      is a contrived edge case (base64 is ~33% expansion, so a 7MB string
      decodes to ~5.25MB). Trivial to write; ~10 lines. Defensible to defer
      because the Zod gate is the primary line of defense.
    suggested_owner: dev
  - id: 'TEST-003'
    severity: low
    finding: |
      The `entity_type='law_list_import'` resolver case (added inline as
      SHOULD-001 fix at `lib/activity/entity-resolver.ts`) is exercised only
      indirectly. The integration test verifies the activity log row IS
      written; the resolver renders correctly when called with that
      entity_type — but no test asserts the resolver returns the expected
      `{label: filename, href: '/laglistor/skapa/${id}/granska'}` shape. The
      existing entity-resolver test file (13 tests, all passing) covers the
      pre-existing entity types but not the new one.
    suggested_action: |
      Append one test to `tests/unit/lib/activity/entity-resolver.test.ts`
      that creates a fixture LawListImport row, calls `resolveEntityNames`
      with one synthetic activity row referencing it, and asserts the
      returned `primary` matches the expected shape. ~20 lines mirroring the
      existing `compliance_audit_cycle` test pattern in the same file.
      Defensible to defer because the resolver code is small and visually
      verifiable.
  - id: 'BUNDLE-001'
    severity: low
    finding: |
      AC 20 specifies `ANALYZE=true pnpm build` + inspection of
      `.next/analyze/client.html` as the verification method. Dev substituted
      static-import analysis (grep for xlsx/papaparse imports across
      components/) and concluded — correctly — that no client component
      directly imports the parser deps, and that Next.js Server Actions
      compile to RPC stubs on the client so the action body's transitive deps
      cannot reach the client bundle. The reasoning is sound, but it's a
      logical proof rather than the empirical proof the AC asks for.
    suggested_action: |
      At least once before the import flow ships to production, run
      `ANALYZE=true pnpm build` and capture a screenshot or note in the
      Completion Notes confirming `xlsx` is absent from the client chunks
      analyser report. Future changes to the parser's import surface (or to
      Next.js's Server Action compilation) could regress this without the
      static-grep noticing. Treat as a one-time pre-prod verification, not
      a per-PR CI gate.
    suggested_owner: dev
  - id: 'CODE-001'
    severity: low
    finding: |
      `components/features/onboarding-modal/import-upload-step.tsx:124` uses
      `btoa(unescape(encodeURIComponent(text)))` for the paste path's binary
      conversion. `unescape` is deprecated (per MDN). The pattern still works
      in all evergreen browsers but is technical debt. The file path
      (`readFileAsBase64`) uses the modern `Uint8Array` chunked-fromCharCode
      pattern instead — inconsistent within the same file.
    suggested_action: |
      Replace with the modern equivalent:
      ```ts
      function pasteToBase64(text: string): string {
        const bytes = new TextEncoder().encode(text)
        let binary = ''
        const chunk = 0x8000
        for (let i = 0; i < bytes.length; i += chunk) {
          binary += String.fromCharCode(...bytes.subarray(i, Math.min(i + chunk, bytes.length)))
        }
        return btoa(binary)
      }
      ```
      Same shape as the existing `readFileAsBase64`. ~8-line change.
    suggested_owner: dev

