nfr_validation:
  security:
    status: PASS
    notes: |
      Workspace isolation enforced via `withWorkspace(cb, 'tasks:edit')` on
      both server actions. Zod validates createImport input + parseImportFile
      input + the 7 MB max-length cap on fileBuffer (defense in depth: action
      also re-checks decoded byte length at `parseImportFile:164-172`). File
      uploads are bounded at 5 MB; the parser caps row count at 1000 to
      prevent runaway memory use. No new auth surface, no secrets, no
      dynamic SQL, no PII leakage. The `markImportFailed` defensive
      try/catch wrapping the failure-state DB update is good defensive
      pattern: the user's import-history row gets a meaningful failed-state
      record even if the failure-marking itself encounters an error.
  performance:
    status: PASS
    notes: |
      Bulk-insert via `prisma.$transaction` + `lawListImportRow.createMany`
      keeps the persist phase to 2 round-trips (insert N + update import).
      detectColumns samples first 10 rows only — O(min(rows, 10) × cols)
      time, sub-millisecond on real fixtures. Parser library is pure
      synchronous TypeScript; no I/O. Performance budget for the upload
      path on a 50-row Notisum file: ~700ms in the integration test
      (network-bound). Well within user-tolerable range for an explicit
      file upload action.
  reliability:
    status: PASS
    notes: |
      Comprehensive failure-mode coverage: malformed file → status=FAILED +
      Swedish error_message; empty file → status=FAILED; oversized file →
      Zod gate + defensive post-decode check; non-existent import →
      "Importen hittades inte"; wrong status → "inte i UPLOADED-läge". Every
      failure path persists state on the import row so the user sees a
      meaningful entry in their import history. Idempotency via the
      `status === UPLOADED` check at the entry of parseImportFile prevents
      double-parsing.
  maintainability:
    status: PASS
    notes: |
      Parser library is well-organised: types up top, regex constants
      extracted as named exports, scoring functions cleanly separated, no
      inline magic numbers. Server action follows the project's
      `withWorkspace` + Zod-safeParse + try/catch pattern. UI component
      header doc-comment explicitly captures the SHOULD-002 cross-epic
      directory note for future devs. Activity-log entity-resolver
      extension is additive — no impact on the existing 13 resolver tests.
      Fixture generator scripts (`scripts/generate-import-fixtures.ts` +
      `generate-import-mall.ts`) are committed as documentation for
      regen + provenance. CODE-001 (`unescape` deprecation) is the only
      maintainability note and is trivial to address.

