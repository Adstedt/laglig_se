nfr_validation:
  security:
    status: PASS
    notes: 'No new attack surface. Server actions (recordTabViewed, minimiseFirstRunModal) reuse existing `withWorkspace` context guard from Story 25.0. No raw user input flowing into Prisma. Tab IDs are a closed const enum, not user-controlled.'
  performance:
    status: PASS
    notes: 'SWR cache deduplicates with the dashboard banner (same key `/api/workspace/generation-status`) — modal-to-banner handoff after Minimera is instant. Polling stops on completed/failed (refreshInterval returns 0). No N+1 queries; no new DB writes per render.'
  reliability:
    status: PASS
    notes: 'StrictMode-safe via `useRef(false)` guard on initial-mount `tab_viewed` fire (mirrors Story 25.1 `openEventFired` pattern). Minimera failure path keeps the modal on the tutorial step (verified by new test). Generera 200 + 409 both correctly transition to tutorial; failure path stays on path-choice. No silent error swallowing.'
  maintainability:
    status: PASS
    notes: 'TypeScript strict (no `any`, exactOptionalPropertyTypes-safe optional props). Kebab-case file naming matches project structure. Shared `GenerationStatus` type exported from progress-strip.tsx for downstream import. `DEFAULT_TAB_ID` const removes prior magic-string coupling. Local `GenerationStatusResponse` type duplicates the banner shape — deliberate decoupling per architecture §4.'

risk_summary:
  totals: { critical: 0, high: 0, medium: 0, low: 4 }
  recommendations:
    must_fix: []
    monitor:
      - 'Keep an eye on the SWR cache-warming claim in staging. If banner shows a loading flash after Minimera, the SWR key has drifted between the two surfaces.'
      - 'Modal_dismissed.from_state stays hardcoded to "path_choice" even when fired from the tutorial step. Funnel analysts should know until B.6 fixes the server action signature.'

