# Resolved issues from v0.3 — kept as closure record
resolved_issues:
  - id: 'CONSIST-001'
    severity: medium
    closed_by: 'v0.4 QA fix pass'
    resolution: 'Moved logActivity call INSIDE the seal transaction as `tx.activityLog.create(...)`. Verified at compliance-audit-cycle.ts:1245. Seal is now truly atomic — the cycle_sealed audit-log row commits or rolls back with the status flip + snapshots + report. Closes the durability gap where a post-commit log-write failure would have left a permanently-sealed cycle with no audit-trail entry and no retry path. Regression-pinned by new test: "CONSIST-001 — activityLog.create is called on the tx-participating prisma client, NOT via the standalone logActivity helper".'

  - id: 'INTEGRITY-001'
    severity: medium
    closed_by: 'v0.4 QA fix pass'
    resolution: 'Added pre-seal integrity gate at compliance-audit-cycle.ts:1011-1039 that rejects sealing when any linked styrdokument evidence has status=DRAFT. Swedish error: "Kan inte fastställa kontroll med styrdokument i utkast-status: {titles}. Godkänn styrdokumenten först." Runs BEFORE hash compute (saves I/O on reject path) and BEFORE any writes (no state change on failure). Closes the silent integrity failure where autosave-in-place on DRAFT docs would invalidate re-verification. Regression-pinned by two new tests: the DRAFT reject path and the APPROVED pass-through.'

  - id: 'RACE-001'
    severity: low
    closed_by: 'v0.4 QA fix pass'
    resolution: 'Removed the separate `complianceFinding.count` query. openAvvikelsesCount now derived at compliance-audit-cycle.ts:1103-1105 from the step-3 findings array via `findings.filter(f => f.type === "AVVIKELSE" && f.closed_at === null).length`. Gate moved AFTER findings load. Single source of truth — gate and manifest now synchronised; no window for a newly-created AVVIKELSE to appear in the manifest without triggering the override requirement. Bonus: saves one DB round-trip per seal attempt.'

  - id: 'CONSTRAINT-001'
    severity: low
    closed_by: 'v0.4 QA fix pass'
    resolution: 'Added @@unique([cycle_id, report_kind]) to ComplianceAuditReport via migration 20260424030000_add_compliance_audit_report_unique_cycle_kind. sealCycle refactored from findFirst+create/update pattern to `tx.complianceAuditReport.upsert(...)` using the new `cycle_id_report_kind` composite key. Inline comment correctly removed the "safe ONLY because SF-2 serialises" caveat — now safe at the DB level. Future multi-write paths (21.12 COMPLETE-kind regen) are safe here without extra schema churn.'

