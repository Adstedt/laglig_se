nfr_validation:
  security:
    status: PASS
    notes: 'Cross-tenant isolation across all 3 new code paths verified via line-by-line read + AC 28 dedicated tests. Workspace_id is non-optional in updateChunkMetadata (throws if empty) AND hard-coded into the SQL WHERE clause (not a parameter the caller can forget). Cron sweep clears flags workspace-scoped. Backfill walks per-workspace. No new auth surface. AUDITOR role unchanged (Story Context note). The DRAFT-visibility model is workspace-membership-scoped (not role-scoped) — same as existing styrdokument access.'
  performance:
    status: PASS
    notes: 'Cron-sweep choice (DEC-5 Option B) smooths embedding load vs per-request throttle. 60s debounce window collapses rapid autosaves to one reindex per cron tick (verified by AC 16 test). Hash gate in syncWorkspaceChunks short-circuits no-op re-embeds. Composite index `(needs_reindex, last_marked_dirty_at)` on workspace_documents speeds the sweep predicate. Metadata-UPDATE path on status changes (the common case) skips embedding entirely — significant cost win vs 17.9b which always re-embedded.'
  reliability:
    status: CONCERNS
    notes: 'PASS in normal operation. The ONE CONCERN: no retry-limit or backoff on cron failures. A doc that consistently fails to index (corrupt content_html, persistent embed API issue, etc.) stays needs_reindex=true forever and gets retried every minute, spamming console.error. NTH-4 explicitly accepted no alerting for v1 — but a max-retries flip-to-poison-state mechanism would be a meaningful future hardening. Cron-race (autosave→archive) WAS a CONCERN; closed by the QA refactor below + regression test.'
  maintainability:
    status: PASS
    notes: 'Faithful extension of 17.9b/17.9c patterns. DEC-1 through DEC-6 labels in Story Context make the design decisions auditable. Inline JSDoc on every new public function. The exactOptionalPropertyTypes-induced conditional spread + the vi.mock-hoisting fix from 17.10 are both documented in Dev Debug Log References for the next reader. VIM-001 (in-place version mutation) explicitly tracked as accepted-but-deferred in Dev Notes so a future contributor doesn''t mistake it for a bug.'

qa_applied_refactor:
  file: 'app/api/cron/sweep-draft-reindex/route.ts'
  change: 'Added defensive status filter to the sweep query: `status: { notIn: [SUPERSEDED, ARCHIVED] }`.'
  why: |
    Race: a doc can be marked dirty by autosaveDocument while DRAFT, then
    transitioned to ARCHIVED (or SUPERSEDED) by updateDocumentStatus before
    the cron sweep fires. updateDocumentStatus's DELETE branch deletes the
    chunks via deindexWorkspaceDocument, but does NOT clear the dirty flag.
    Without the filter, the sweep would then re-CREATE chunks from the still-
    present current_version.content_html, leaving archived content silently
    searchable to the agent.
  how: |
    The filter is the second layer that closes the race regardless of
    transition ordering. markWorkspaceDocumentDirty already skips marking
    terminal-state docs going in; this filter covers the case where the
    transition happens between mark and sweep.
  test_added: 'tests/unit/app/api/cron/sweep-draft-reindex.test.ts → "REGRESSION: excludes docs in terminal states (SUPERSEDED/ARCHIVED) to close the autosave→archive race"'
  validation: 'Re-ran sweep-draft-reindex.test.ts → 6 tests passing (was 5; +1 regression). tsc clean. No other tests affected.'

owner_smoke:
  smoked_at: '2026-06-02T11:55:00Z'
  smoked_by: 'Alexander Adstedt (Owner)'
  workspace: 'Nordviken Hotell & Konferens AB (e4cd55b0-8b2c-4209-bd19-0b40f50f04f1)'
  prep:
    - 'Migration applied locally (pnpm prisma migrate deploy).'
    - 'Seed script scripts/seed-nordviken-17.10b-smoke.ts populated 3 DRAFTs with distinct Swedish content (Semesterpolicy, Arbetsmiljöpolicy, NEW Diskrimineringspolicy — Revision).'
    - 'Backfill script scripts/backfill-workspace-document-drafts.ts indexed 4 DRAFTs (the 3 seeded + the pre-existing Årlig riskbedömning). Hash-gated APPROVED docs no-op skipped. Chunk count 43 → 63.'
  scenarios_run: 5
  scenarios_passed: 5
  surfaced_findings:
    - 'Smoke A ("Visa Semesterpolicy") PASS: one-turn DRAFT retrieval (vs 17.10''s search-empty + list-fallback dance), strong prose hedge "Observera att dokumentet är ett utkast som ännu inte har godkänts", title appended with "(Utkast — ej godkänt)" suffix, status fields visible from get_workspace_document. No inline citation chip — but this is a display prompt; chips appear on claim prompts (verified in Smoke B).'
    - 'Smoke B ("Vad har vi för riktlinjer om diskriminering?") STRONG PASS: mixed-tier retrieval with TWO distinct chip tiers in one response. Canonical chip "Diskrimineringspolicy" (no prefix, no suffix) + draft chip "Utkast: Diskrimineringspolicy — R..." (Utkast: prefix VISIBLE in chip text per DEC-3). Hedging asymmetry held: canonical refs presented authoritatively ("Er gällande policy förbjuder…"); draft refs explicitly hedged ("ett pågående utkast till revision", "I utkastet föreslås", "Revisionen är ännu inte godkänd"). Section structure ("Godkänd Diskrimineringspolicy" + "Pågående revision (ej godkänd)") emergent, not in any AC, exactly what compliance use needs.'
    - 'Smoke C ("Vad är vår officiella semesterpolicy?") TEXTBOOK PASS — the load-bearing safety probe. Agent refused the leading question honestly: "Ni har för tillfället ingen godkänd semesterpolicy i ert dokumentarkiv. Det enda semesterpolicydokument som finns är det utkast jag visade tidigare — det är alltså ännu inte fastställt som officiell policy." Then enumerated which policies ARE approved (using list_workspace_documents) and offered to help formalize the missing one. Zero "Vår policy säger" framing; zero [Källa: Semesterpolicy] chips. DEC-2 contract held under maximum-pressure LLM-behavioral prompt — this was the single test most likely to fail; it passed cleanly.'
    - 'Smoke D ("Visa Miljöpolicy" after live UI edit) PASS — full autosave→cron→reindex chain verified end-to-end live. Owner typed ~5394 chars into the Miljöpolicy editor; autosaveDocument fired markWorkspaceDocumentDirty (verified via Prisma query: needs_reindex=true, last_marked_dirty_at set). 81s later (debounce expired), cron route manually triggered (Vercel cron runs only in prod; local dev requires manual curl): 1 candidate, 1 processed, 0 failed, 5.9s duration. Post-sweep: 14 chunks created with metadata.status=DRAFT + metadata.version_number=1 + metadata.title + metadata.document_type. needs_reindex flag cleared, last_marked_dirty_at nulled. Agent prompt "Visa Miljöpolicy" then retrieved the freshly-chunked content with block-quote draft warning ("⚠️ OBS: Detta är ett utkast (ej godkänt)") + "[Utkast]" suffix in title. Cron route works exactly as designed.'
    - 'Smoke E ("Vad säger Diskrimineringspolicyn?") PASS — 17.10 CITE-002 regression check covered by Smoke B''s diagnostic follow-up. Same behavior as 17.10: both APPROVED Diskrimineringspolicys found, clean section split, agent presents content from both. The chip-disambiguator (8-char-id) suffix is not visible — but neither was it explicitly confirmed in 17.10''s C2 smoke. This is the SAME behavior as 17.10, not a 17.10b regression. The agent emits the bare-title citationKey when both search+get are called on a colliding title, even though the source map has the suffixed forms available. Cosmetic UX gap, not a safety issue (the section headers + "två separata" framing carry the disambiguation visually).'
  cosmetic_finding:
    label: 'CITE-DIS-001: Chip disambiguator emit-side gap'
    details: 'The CITE-002 disambiguator infrastructure is implemented and unit-tested correctly. When both search_workspace_documents AND get_workspace_document are called for a colliding title, the source map carries BOTH the bare-title key (from get) and the (8-char-id)-suffixed keys (from search). The agent then chooses to emit [Källa: <bare title>] rather than [Källa: <title (id)>]. Result: chips render identically even though the source map has the disambiguator ready. UX cost: hovering either chip resolves to whichever variant get_workspace_document registered first. Mitigation: a system-prompt instruction "när samma titel återkommer i sökresultaten, använd ALLTID den fullständiga citationKey-strängen med ID-suffix" would force the suffix emit. Future story, not a 17.10b blocker.'
    suggested_owner: po

