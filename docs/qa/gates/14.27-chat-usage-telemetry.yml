nfr_validation:
  security:
    status: PASS
    notes: |
      SQL parameterization uses Prisma tagged templates + INTERVAL '1 day' * ${n}::int pattern
      + clampRangeDays/clampLimit/clampOffset helpers (defense-in-depth).
      Admin page inherits Epic 11 middleware auth (no new auth surface).
      No PII in telemetry schema (token counts + IDs only; user email joined at read time).
      Fail-safe error logging does not leak sensitive data.
  performance:
    status: PASS
    notes: |
      One async Prisma INSERT per chat turn (fire-and-forget, non-blocking).
      Admin queries use indexed columns ((workspace_id, created_at), (user_id, created_at),
      (workspace_id, user_id, created_at), (context_type, created_at)).
      Promise.all parallelization on admin page for both tab queries.
      date_bin (Postgres 14+) for O(n) time-series bucketing.
  reliability:
    status: PASS
    notes: |
      Fail-safe write path verified by integration test + runtime operation.
      Rollback is data-preserving (leave table, remove code — no FK cascades).
      No new failure modes introduced.
      onFinish only fires on successful stream completion (structural guarantee from AI SDK).
  maintainability:
    status: PASS
    notes: |
      Well-commented code (cost estimator, admin queries, route.ts).
      MEMORY.md updated with architectural decisions + SQL safety pattern.
      Clamping helpers factored out to avoid duplication across the 3 query functions.
      Cost estimator is pure function (no side effects, trivial to extend).
      Schema names follow repo convention (snake_case + @@map).

code_quality_notes:
  strengths:
    - 'Fail-safe write pattern verified both by integration test AND by live operation — the try/catch swallow correctly protects the user-facing stream response from telemetry failures'
    - 'SQL parameterization is belt-and-suspenders — tagged-template auto-parameterization + explicit ::int casts + input clamping helpers. Resilient against future refactors that might accidentally interpolate into string literals.'
    - 'Dual-path cache-write accessor handles AI SDK version drift gracefully. Runtime evidence confirms the nested path resolves correctly.'
    - 'Cost estimator is a pure function with sentinel tests — trivial to extend when new models ship.'
    - 'Runtime verification reconciles hand-computed cost to 6 decimals against stored cost — strong signal that the estimator is correctly wired.'
    - 'Admin UI follows the existing server-component + client-component split pattern from Epic 11. Pre-fetches both tabs via Promise.all for instant tab switching.'
