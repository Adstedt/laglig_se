nfr_validation:
  security:
    status: PASS
    notes: 'Four defense layers verified — (1) workspace-scope on every new Prisma query (direct on cycle, via `cycle: { workspace_id }` relation filter on item + finding; test-pinned via explicit where-clause assertions), (2) tombstone on missing rows prevents cross-workspace information leakage, (3) motivering privacy pin at the formatter level (test explicitly passes raw text in payload, asserts it does not appear in output), (4) zero new attack surface — no new writers, server actions, or routes. See PRIVACY-SPLIT-001 for the 21.5 logger-level counterpart opportunity.'
  performance:
    status: PASS
    notes: 'Batched findMany: 1 query per new model regardless of row count — test-pinned. Minimal `select` clauses on all three new Prisma queries. Promise.all parallelisation with existing 4 queries — net 7 concurrent, each indexed. Zero added latency for page loads that include no compliance-audit rows (empty ID sets short-circuit to Promise.resolve([])).'
  reliability:
    status: PASS
    notes: 'Defensive fallbacks: missing `law_list_item.document` on cycle item (returns "Kontrollpost" + root cycle link); `typeof itemCount === ''number''` guard on `cycle_materialised` (handles null/undefined/non-numeric); name-change tail gracefully skipped when either old or new name missing; tombstone exercised on cycle + item + finding. Fail-closed for unknown entity_type values (falls through to existing synthetic-no-link branch).'
  maintainability:
    status: PASS
    notes: 'Section-comment blocks tag every Story 21.13 addition. EFTERLEVNADS_BEDOMNING_LABELS JSDoc cross-references canonical source (`components/features/compliance-audit/bedomning-copy.ts`). Inline comments document defensive-fallback rationale, privacy-pin rationale, name-tail precedent reference. No new helpers introduced. Tests follow existing file conventions.'

