top_issues:
  - id: 'POLISH-001'
    severity: low
    finding: 'Swedish pluralization on the `cycle_materialised` sentence suffix. Formatter renders `(N poster)` for all N, which is grammatically wrong for N=1 (correct Swedish: "1 post", "2+ poster"). Single-item cycles are rare but valid — a cycle scoped to one law produces "1 poster" in the feed.'
    suggested_action: 'One-line fix in `lib/activity/format-activity.ts:484`: replace `text(` (${itemCount} poster)`)` with `text(` (${itemCount} ${itemCount === 1 ? ''post'' : ''poster''})`)`. Add one format-activity.test.ts case for itemCount=1. ~2 min.'
    suggested_owner: dev

  - id: 'POLISH-002'
    severity: low
    finding: 'No truncation on `cycle.name` or item `doc.title` in the resolver. Other resolver branches (requirement.text, finding.title) use the `truncate()` helper. The existing `list_item` branch also does not truncate doc titles, so this is consistent with precedent — not a new inconsistency. But a pathologically-long cycle name (users can enter up to 200 chars per Story 21.2 Zod validation) would produce an ugly single-line sentence.'
    suggested_action: 'Defer. Apply `truncate(hit.name)` and `truncate(...doc.title...)` only if pathologically-long labels surface in production UX. Not blocking; follow-up consideration for a future polish story alongside the existing list_item branch (if ever addressed).'
    suggested_owner: dev

  - id: 'PRIVACY-SPLIT-001'
    severity: low
    finding: 'Motivering privacy pin is split across Stories 21.5 (logger payload) and 21.13 (formatter). Story 21.13 test-locks the formatter contract (raw motivering text NEVER rendered in the sentence). But the Story 21.5 logger contract (that `new_value` never contains `motivering: string`) is NOT explicitly test-pinned at the logger level. If a future refactor accidentally logs the raw text in `new_value`, the expanded-row view (`activity-expanded-row.tsx`, which renders raw JSON diff) would leak it — the 21.13 formatter pin would not catch this because the expanded row does not go through the formatter.'
    suggested_action: 'Future: add a regression test to `app/actions/__tests__/compliance-audit-item.test.ts` asserting that `updateItemMotivering`''s `logActivity` call receives a `new_value` object containing ONLY `{new_length: number}` — no `motivering` key, no raw text. One test; three lines. Land when touching that file next.'
    suggested_owner: dev

