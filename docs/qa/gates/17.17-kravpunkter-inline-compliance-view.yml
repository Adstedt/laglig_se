nfr_validation:
  security:
    status: PASS
    notes: |
      No new auth surface. `updateListItemBusinessContext` uses `withWorkspace('tasks:edit')` — same gate as before. `getRequirementsForListItem` (used by new count cell) already enforces workspace isolation via `getRequirementWorkspaceContext` (verified in 17.16 review). RichTextDisplay uses DOMPurify — no sanitization regression in the new Kommentar subsection. Migration is additive (2 nullable columns) — no data exposure. `complianceReadOnly` prop threaded correctly to the new count cell (read-only renders non-interactive div, no button, no Lägg-till route).
  performance:
    status: PASS
    notes: |
      Per-row SWR fetch in KravpunkterCountCell is architecturally sound (virtualized → bounded burst, SWR dedup + shared cache with expansion → no double-fetch on expand). Plan explicitly traded bulk endpoint for cache consistency. Optimistic update path for business_context in Zustand store bumps the attribution timestamp locally so UI reflects before the server round-trip. revalidatePath('/laglistor') on business_context updates is consistent with the existing compliance_actions pattern — not a new cost path. See PERF-001 for unbenchmarked-at-scale note (low severity).
  reliability:
    status: PASS
    notes: |
      Migration is additive (new nullable columns), safe to rollback. Existing optimistic-rollback pattern in KravpunkterChecklist unchanged. `autoEdit` → `focusField` refactor in ComplianceActions consolidates two state triggers into one — reduces state-machine complexity. New `triggerRef.scrollIntoView` has 150ms timeout to let modal animation settle, with explicit cleanup on effect teardown. Accordion `defaultValue` includes `'compliance-actions'` so focusField='kravpunkter' always scrolls to an open section.
  maintainability:
    status: PASS
    notes: |
      `focusField` union widened cleanly across 7 files — each hop is explicit and typed. Type widening caught by tsc at every boundary (compliance-group-section + grouped-compliance-table both needed updates; tsc flagged them, fixed in same pass). `KravpunkterCountCell` co-located with its only consumer (compliance-detail-table.tsx) — avoids premature extraction. Test mock complexity is proportional to the number of integration points (swr + rich-text-editor + server action stub + KravpunkterChecklist stub) — all follow established project patterns. One duplication noted: cell pill JSX ≈ expansion header pill JSX — ~15 lines; not extracted, reasonable pending a third use site.
  accessibility:
    status: PASS
    notes: |
      `KravpunkterCountCell` button has aria-label (`${fulfilled} av ${total} uppfyllda — öppna kravpunkter`). Expansion progress tracker renders standalone-readable text ("2/3 uppfyllda"). Read-only mode correctly renders non-interactive div (no misleading button semantics). Sentence-case section labels improve scan readability. No regressions from 17.16 baseline.

