top_issues:
  - id: 'PERF-001'
    severity: low
    finding: '`KravpunkterCountCell` uses per-row SWR fetch with key `list-item-requirements:${listItemId}` instead of a bulk endpoint. TanStack Virtual bounds the fan-out to visible rows (~10-15 at a time), and SWR dedupes in-flight requests + shares the cache with the expansion, so architectural cost is contained. Unbenchmarked at laglistor >100 rows though. Plan explicitly considered and rejected a bulk server action based on "cache consistency vs. query efficiency" tradeoff.'
    suggested_action: 'Add a light perf probe once a workspace hits >100 laglistor rows in production. If the initial-render fetch burst shows up on real-user metrics, introduce `getRequirementCountsForListItems(ids: string[])` and preload the SWR cache from a single query. Not needed for MVP.'
    suggested_owner: dev
    refs: ['components/features/document-list/compliance-detail-table.tsx:KravpunkterCountCell']

  - id: 'TEST-001'
    severity: low
    finding: 'The shared-SWR-cache consistency claim (cell pill updates when a kravpunkt is toggled from the expansion, and vice versa) is tested only via architectural inspection — both surfaces read the same key, so SWR revalidation propagates. Unit tests mock SWR entirely (module-scope `mockSwrData` Map), which short-circuits the cache-sharing semantics. A real-SWR integration test would verify the propagation end-to-end.'
    suggested_action: 'Optional: add one integration test that wraps both the expansion and the count cell in a real `<SWRConfig>` provider and asserts that `mutate()` on the shared key updates both surfaces. Current coverage is sufficient for MVP given the architectural guarantee.'
    suggested_owner: dev
    refs: ['tests/unit/components/features/document-list/compliance-detail-table.test.tsx:22-36']

  - id: 'DOC-001'
    severity: low
    finding: 'Story 17.17 scope was extended twice past the original 12 ACs (v1.5 = original "17.18" column rename + Kommentar + progress tracker; v1.6 = business-context attribution migration). The evolutions are documented in the Change Log and Completion Notes, but the story''s formal "Acceptance Criteria" section was not extended to cover the new scope. AC5 in particular now documents a REMOVED feature (legacy banner) — dev notes explain the replacement, but someone reading ACs top-down will hit contradicting language.'
    suggested_action: 'Consider either (a) promoting 17.18 to its own story file with its own 4 ACs retroactively, or (b) amending 17.17''s AC5 to reflect the final scope (Kommentar subsection instead of legacy banner). Hygiene matter, not a defect. (a) is preferred for future-history clarity.'
    suggested_owner: sm
    refs: ['docs/stories/backlog/frontend/17.17.kravpunkter-inline-compliance-view.md:19,55']

