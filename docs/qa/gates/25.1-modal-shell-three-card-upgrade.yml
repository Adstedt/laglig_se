  # From v1.2 polish + smoke pass
  - id: STORY-16-4-NULL-BUG
    severity: high  # would have been HIGH had it not been fixed in-flight
    summary: >-
      Latent bug in `POST /api/workspace/generate-law-list`: SQL three-valued
      logic in `NOT: { law_list_generation_status: 'in_progress' }` excluded
      NULL-status rows, causing every Generera click on a clean workspace to
      return 409 (no actual generation kicked off). Latent until Story 25.0
      dropped the createWorkspace auto-fire that used to pre-populate
      status to 'pending'.
    resolution: >-
      v1.2 — Dev replaced the WHERE clause with explicit
      `OR: [{ field: null }, { field: { not: 'in_progress' } }]`.
      Diagnosis + before/after code documented in Completion Notes
      "Latent Story 16.4 bug uncovered during smoke testing" subsection.
      File: `app/api/workspace/generate-law-list/route.ts`.

