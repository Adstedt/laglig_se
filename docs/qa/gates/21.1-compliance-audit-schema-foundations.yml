schema: 1
story: '21.1'
story_title: 'Compliance-audit schema foundations'
gate: CONCERNS
status_reason: 'Schema is clean, migration applied to Supabase production successfully, unit tests green (17/17 new + 4126/4126 full suite). BUT: integration tests were written with 5 schema-mismatch errors against the real LegalDocument model that would have broken on first run — fixed during QA review but still never executed. The XOR CHECK constraint, cascade delete, and FK restrict behaviors are trusted via clean DDL apply + code inspection, not verified at runtime. Two small design-level watchpoints (bidirectional Task↔Finding FK, missing unique constraint on cycle+law_list_item_id) to carry into Story 21.8 + future hardening.'
reviewer: 'Quinn (Test Architect)'
updated: '2026-04-22T12:30:00Z'

waiver: { active: false }

top_issues:
  - id: 'TEST-001'
    severity: medium
    finding: 'Integration tests (tests/integration/compliance-audit/schema.test.ts) contained 5 schema-mismatch errors against the real LegalDocument model: wrong enum value `LAGAR` (actual: `SFS_LAW`), wrong field `document_status` (actual: `status`), wrong enum value `CURRENT` (actual: `ACTIVE`), wrong field `sfs_number` (actual: `document_number`), missing required `slug` + `source_url`. The tests could never have executed without these fixes. Shows the integration tests were not even attempted locally before being handed off.'
    suggested_action: 'Already fixed during QA review — LegalDocument seed now uses valid fields + enum values. Dev (James): please run these tests once a local dev DB is available to verify the runtime behavior they assert (XOR CHECK, cascade delete, FK restrict).'
    suggested_owner: dev
  - id: 'TEST-002'
    severity: medium
    finding: 'Integration tests verifying the three critical DB-level behaviors (XOR CHECK constraint, cascade delete from cycle, restrict delete of LawListItem referenced by cycle item) have never been executed — no local dev DB was configured. These behaviors are currently trusted based on (a) Postgres accepting the CHECK constraint syntax at apply time, and (b) code inspection. Not a blocker because a CHECK syntax error would have prevented Supabase apply; but the XOR logic (symmetric OR over NULL/NOT NULL) could theoretically be wrong in a way Postgres would still accept (e.g., AND instead of OR would still be valid SQL).'
    suggested_action: 'Once Story 21.2 kicks off and a local dev DB is configured (or integration tests are run against a test Supabase project), execute `pnpm vitest run tests/integration/compliance-audit/schema.test.ts` and confirm all 4 test cases pass. If any fail, treat as blocking for Story 21.2.'
    suggested_owner: dev
  - id: 'SCHEMA-001'
    severity: medium
    finding: 'Task ↔ ComplianceFinding has two separate FKs (Task.compliance_finding_id + ComplianceFinding.corrective_action_task_id), creating a bidirectional-FK pattern that can diverge. Finding A may set corrective_action_task_id=TaskX while TaskX.compliance_finding_id points at Finding B (or null). The architect explicitly asked for both FKs for query convenience, but it is structurally redundant and introduces a data-integrity risk.'
    suggested_action: 'Story 21.8 (auto-spawn task on AVVIKELSE) MUST set both FKs within a single Prisma transaction. Add an explicit AC to Story 21.8 + an assertion test. Consider a database trigger if app-layer enforcement proves fragile. Alternatively, revisit the architecture decision — most ORMs model this as one FK with a reverse relation array, which is simpler.'
    suggested_owner: dev
  - id: 'SCHEMA-002'
    severity: low
    finding: 'No `@@unique([cycle_id, law_list_item_id])` constraint on ComplianceAuditItem. The materialization logic in Story 21.4 is expected to prevent duplicates at the app layer, but nothing at the DB layer enforces this. A concurrent materialization call, a future refactor bug, or a direct DB write could create two items for the same law in the same cycle.'
    suggested_action: 'Add `@@unique([cycle_id, law_list_item_id])` as a follow-up schema hardening. Low priority because app-layer enforcement is primary.'
    suggested_owner: dev
  - id: 'RISK-001'
    severity: low
    finding: 'Migration was applied to Supabase PRODUCTION before any integration test could run. Mitigated because (a) user did the apply manually with a visible success response, (b) production contains zero cycle data so there is no rollback blast radius, (c) Story 21.2 implementation will exercise the schema via real server actions. But pre-production test runs are a strong cheap safeguard that did not happen here.'
    suggested_action: 'For Story 21.2+ schema changes, recommend: (a) ensure dev has a local or shared test DB with the same migration applied before PR review, (b) run integration tests as part of PR approval, (c) user applies to production only after tests verify runtime behavior. This matches the "user-applied-migration" workflow flagged by Sarah in the v0.2 PRD update.'
    suggested_owner: sm
  - id: 'CLEAN-001'
    severity: low
    finding: 'components/providers/theme-provider.tsx shows as modified in git status but is unrelated to Story 21.1 scope — dev correctly left it alone but this pollutes the PR diff if the story ships as-is. Appears to be a pre-existing working-tree modification that drifted into the session.'
    suggested_action: 'Either include as a small separate commit with a clear message (if the changes are intentional) or revert before PR. Does not block this story but creates noise.'
    suggested_owner: dev

