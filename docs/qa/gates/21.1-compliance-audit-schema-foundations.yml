nfr_validation:
  security:
    status: PASS
    notes: |
      No new auth surface — audit:seal permission is deferred to Story 21.14.
      All new models workspace-scoped (ComplianceAuditCycle has workspace_id;
      children inherit transitively). FK onDelete semantics correctly
      preserve audit trail (SetNull on optional actor refs; Restrict on
      source-integrity refs). SHA-256 evidence hash approach is sound.
      canonicalize dep (Apache-2.0, ~4KB, zero transitive deps) is the
      reputable erdtman/canonicalize RFC 8785 reference implementation.
      XOR CHECK on evidence snapshots is stricter than existing
      RequirementEvidenceLink (app-layer only) — acceptable one-way
      improvement. No PII concerns at schema level.
  performance:
    status: PASS
    notes: |
      All 6 indexes from architecture addendum §4.3 present in migration.
      No query-plan impact on /laglistor (new tables entirely separate;
      no changes to existing hot paths). Build confirms 105 static pages
      generate in ~21s (unchanged from baseline). Task model gains one
      nullable column + index — trivial. Cascade delete is bounded by
      cycle scope (4 child tables × typical-cycle-size rows).
  reliability:
    status: CONCERNS
    notes: |
      Integration tests verifying the three critical DB-level behaviors
      (XOR CHECK, cascade, restrict) have never been executed. The
      behaviors are currently trusted via (a) clean Supabase apply,
      (b) code inspection of symmetric CHECK constraint, (c) standard
      Prisma-generated cascade/restrict DDL. All three are low-probability
      failure modes, but the exact class of bug that integration tests
      catch is "the syntax was valid but the semantics were wrong" —
      e.g., an accidental AND-vs-OR in the CHECK predicate. Running the
      tests locally once a dev DB is available is the cheap cheap way
      to close this gap.
  maintainability:
    status: CONCERNS
    notes: |
      Two design-level watchpoints: (1) SCHEMA-001 — bidirectional Task ↔
      Finding FK is structurally redundant and can diverge; enforcement
      lands in Story 21.8 app-layer. Worth flagging so that story does
      not silently implement one-direction sync and leave the reverse
      FK free-floating. (2) SCHEMA-002 — missing unique constraint on
      (cycle_id, law_list_item_id) for ComplianceAuditItem; app-layer
      enforcement is primary but a DB constraint would make this a hard
      guarantee. Neither is a bug in Story 21.1; both are hardening
      opportunities for future stories. Apart from that: schema is
      clean, well-commented, conventions-compliant, migration SQL is
      readable. Test fixture is usable (after QA refactor).

