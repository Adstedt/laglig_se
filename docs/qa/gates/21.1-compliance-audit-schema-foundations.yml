# Positive observations worth recording
notes:
  - |
    Dev's choice to use `prisma migrate diff --from-schema-datamodel` instead
    of the story-prescribed `prisma migrate dev --create-only` is a genuine
    improvement for the user-applied-migration workflow. `--create-only`
    still connects to a shadow DB; `migrate diff` with two schema files is
    100% offline. Zero production-contact risk. Well-documented in Debug
    Log References. This is exactly the kind of pragmatic deviation you
    want to see from a dev agent — identified a safer path, documented it,
    verified the output is identical.
  - |
    The Apache-2.0 license clarification on `canonicalize` was caught and
    documented by dev at install time. Both the story and architecture
    addendum said MIT; the actual package is Apache-2.0. Both are on the
    tech-stack §3.6 allowed list, so no policy violation, but it shows dev
    verified rather than trusted. The exact-version pin (3.0.0 — no caret)
    is correctly implemented, which is essential for seal-hash determinism
    in Story 21.9.
  - |
    The reverse-relation arrays added to the 8 existing models are
    minimally invasive (one or two lines each) and follow the existing
    Story 17.16 kravpunkter pattern exactly. No new relations were added
    where they weren't strictly needed. Task model extension is the
    lightest-touch possible — one nullable column, one index, two relation
    lines. Brownfield compatibility CR1-CR4 from the PRD are fully honoured.
  - |
    Migration SQL is 236 lines of readable, commented DDL with the XOR
    CHECK constraint appended as documented in the story. Dev included
    both forward (21.1.migration.sql) and reverse (21.1.rollback.sql)
    delivery artifacts, mirrored the SQL into Completion Notes for user
    convenience, and the rollback SQL is wrapped in a transaction with
    helpful post-rollback verification queries commented inline. Top-tier
    delivery hygiene.

