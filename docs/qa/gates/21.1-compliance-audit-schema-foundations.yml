top_issues:
  - id: 'SCHEMA-001'
    severity: low
    finding: 'Task ↔ ComplianceFinding has two separate FKs (Task.compliance_finding_id + ComplianceFinding.corrective_action_task_id) — structurally redundant and can diverge if only one side is written. Design choice confirmed by architect, but introduces a consistency risk the auto-spawn logic must guard against.'
    suggested_action: 'Story 21.8 (AVVIKELSE auto-spawn) must set BOTH FKs within a single Prisma transaction + add an assertion test verifying mutual consistency. Consider a DB trigger if app-layer enforcement proves fragile. Severity lowered from medium to low because this is a tracked deferral with a specific owner + AC target, not an open defect.'
    suggested_owner: dev
  - id: 'SCHEMA-002'
    severity: low
    finding: 'No `@@unique([cycle_id, law_list_item_id])` constraint on ComplianceAuditItem. App-layer materialization prevents duplicates today; DB-level uniqueness would make it a hard guarantee.'
    suggested_action: 'Add the unique constraint as part of Story 21.4 (cycle materialization). Low priority — not a Story 21.1 blocker.'
    suggested_owner: dev
  - id: 'RISK-001'
    severity: low
    finding: 'Process improvement: for future schema stories, integration-test runs against a local or shared test DB should happen as part of PR review, before user applies migration to production. Story 21.1 got around this by pivoting to a SQL-based verification script run against production (safe because wrapped in BEGIN/ROLLBACK) — but this was a case-specific workaround, not a sustainable pattern for every schema story.'
    suggested_action: 'SM to codify in Story 21.2+ template: require evidence of integration-test execution (or SQL-verification equivalent) in the Completion Notes before handoff to QA. Severity lowered from medium to low because the verification pattern is now established.'
    suggested_owner: sm

