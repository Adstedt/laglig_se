top_issues:
  - id: 419A-001
    severity: low
    summary: 'Write-tool id resolution uses `lawListItemId ?? context?.lawListItemId` + `if (!resolvedId)`, so an explicit EMPTY-STRING arg errors ("Ingen laglistpost angiven") instead of falling back to context. AC 5 said "absent/empty". Fails safe (no wrong write) and the agent realistically never passes "", so very low — but a literal AC edge.'
    refs: ['lib/agent/tools/add-obligation.ts', 'lib/agent/tools/add-context-note.ts', 'lib/agent/tools/update-compliance-status.ts']
    suggested_owner: dev
    suggested_fix: 'Treat empty/whitespace arg as absent: `const id = (lawListItemId?.trim() || context?.lawListItemId)`.'
  - id: 419A-002
    severity: low
    summary: 'search_law_list_items `query` is `z.string()` (no min); an empty/whitespace query degrades to `contains: ""` which matches ALL items (returns up to `limit` arbitrary rows) rather than erroring. Agent will not pass an empty query, so low.'
    refs: ['lib/agent/tools/search-law-list-items.ts']
    suggested_owner: dev
    suggested_fix: 'If buildDocumentWhere yields no usable tokens, return wrapToolError (or add `.min(2)` to the query schema).'
  - id: 419A-003
    severity: low
    summary: 'search_law_list_items matches token-AND × (raw|stem) × (title|number) — precision-biased. A query polluted with non-name words (e.g. the agent appending the kravpunkt topic) yields zero hits. Mitigated by the prompt retry steering (shorter stem / SFS) + the agent passing clean law names (live smoke did). Monitor.'
    refs: ['lib/agent/tools/search-law-list-items.ts']
    suggested_owner: dev
  - id: 419A-004
    severity: low
    summary: 'Route LAW fallback `lawListItemId = contextId` assumes the current single LAW mount convention (contextId = listItemId, verified). A future LAW chat that sets contextId to something else (e.g. a document slug, as the brief originally assumed) would feed a wrong id. Fails safe → "Laglistposten hittades inte", never a wrong write.'
    refs: ['app/api/chat/route.ts']
    suggested_owner: dev
  - id: SLI-001
    severity: low
    status: tracked
    summary: 'The v0.5 definite-form fix is still substring-based (token + suffix strip) — brittle to typos, word order, and inflection beyond definite suffixes. Robust answer = pg_trgm trigram similarity (extension + GIN index on document.title = a migration + threshold). Logged in the implementation-sequence plan follow-ups.'
    refs: ['lib/agent/tools/search-law-list-items.ts']
    suggested_owner: dev
    suggested_fix: 'Promote pg_trgm fuzzy matching if name-resolution misses recur.'

nfr_validation:
  security:
    status: PASS
    notes: 'Both discovery tools workspace-scoped (law_list.workspace_id / Task.workspace_id). The threaded lawListItemId cannot bypass isolation — write tools still findFirst { id, law_list:{ workspace_id } }, so a foreign/wrong id fails safe to an error, never a cross-tenant write (unit-tested). Discovery tools expose no raw user IDs (return no people at all). No raw @anthropic-ai/sdk.'
  performance:
    status: PASS
    notes: 'Discovery is a single findMany per call; Task.workspace_id is indexed; the title/number ILIKE is a scan but law lists are small per workspace (≈tens–hundreds of items). pg_trgm + GIN index (SLI-001) is the scale answer if lists grow large. No N+1.'
  reliability:
    status: PASS
    notes: 'All paths fail safe — wrapToolError on miss/empty, threaded id validated via findFirst, prompt retry steering on empty search. The definite-form regression is locked by a unit test so it cannot silently return.'
  maintainability:
    status: PASS
    notes: 'Clean helpers (definiteStem / buildDocumentWhere) with comments; reuses the 19.5 registry seam + the search-workspace-files tool pattern; SF-1/SF-2/NH-1 all implemented + tested. 12 new tests.'

