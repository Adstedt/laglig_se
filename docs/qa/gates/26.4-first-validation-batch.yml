  - id: QA-26.4-B
    severity: medium
    suggested_owner: po
    finding: >-
      AC 17 is half-open: Alexander blessed the template, PO (Sarah) review of the
      five live preview pages is pending. 26.5–26.8 stay blocked until checked.
    suggested_action: 'Schedule the PO review on the Vercel preview; record outcome in the story.'
  - id: QA-26.4-C
    severity: medium
    suggested_owner: po
    finding: >-
      Content depth below brief on the two funktioner pages: ai-agent ~700-word
      body (~830 incl. FAQ) vs ~1,200 target; kontroller ~850 vs ~1,100. Kontroller
      also misses AC 6's named composition (cycle-table hero + report/checklist
