      screenshot — dev's own task list says "kontroller currently hero-only".
      Industry pages are on target (bygg/hotell ~1,200, it ~1,170).
    suggested_action: 'Decide at the AC 17 review: accept current depth or extend before 26.5+ builds on the template.'
  - id: QA-26.4-D
    severity: medium
    suggested_owner: po
    finding: >-
      Bridge rule (AC 3) strictly unmet: each industry page has 2 editorial H2s
      with no product hand-off in/directly after (bygg: Miljökrav, Personalliggare;
      hotell: Alkoholservering; it: Avtal/marknad/immaterialrätt; plus the intro
      H2s). Sections are short and the template inserts OrgCheckCta/CatalogLawList
      later, so this is a judgment call — but the AC was written as a hard
      structural rule at Alexander's request.
    suggested_action: 'Rule on bridge-rule strictness at the AC 17 review; add SplitFeature/screenshot rows to the uncovered H2s if upheld.'
  - id: QA-26.4-E
    severity: medium
    suggested_owner: dev
    finding: >-
      scripts/create-demo-login.ts:67 — listUsers() reads only the first page
      (default 50 users); the idempotent already-exists path breaks once the
      project has >50 auth users. Also brittle English error-message sniffing
      instead of error.code === 'email_exists'.
    suggested_action: 'Paginate listUsers (or filter by email via admin API) and match on the stable GoTrue error code.'
  - id: QA-26.4-F
    severity: medium
    suggested_owner: dev
    finding: >-
      tests/e2e/marketing-nav.spec.ts hard-codes today's publish inventory
      ("Vård & omsorg has no page", "no /omraden/* links") — it will go red the
      moment 26.5–26.8 publish those pages, failing because the product improved.
    suggested_action: 'Derive expectations from the content dir / published routes at test time, or tag the assertions with TODOs tied to 26.5–26.8.'
  - id: QA-26.4-G
    severity: low
    suggested_owner: dev
    finding: >-
      scripts/lib/seed-industry-workspace.ts:96,173 — process.exit(1) inside the
      shared engine skips the callers' prisma.$disconnect(); mdx-components.tsx
      leaves table/pre/code/h4/img unmapped (escape the prose column unstyled);
      AC 11 end-to-end GA4/Vercel DebugView verification not evidenced (unit-test
      proxy only) and marketing_org_check_submit has no test; relatedPages
      cross-linking is 2-of-4 per page vs Dev Notes guidance.
    suggested_action: 'Batch as cleanup; none block the gate individually.'

