nfr_validation:
  security:
    status: PASS
    notes: >-
      XSS: every user-supplied string routed through `escapeHtml` /
      `escapeNullable` / `escapeHtmlMultiline`. Iframe sandbox=""
      (strictest — no scripts, no same-origin, no forms) keeps the
      report HTML's own `<style>` isolated from the app. Tenant
      isolation verified by dedicated test asserting the evidence-
      snapshot query uses nested `cycle: { workspace_id }` filter.
      AUDITOR role access (FR16) verified by test. Zod UUID input
      validation. Full 64-char seal hash visibly rendered (FR13) —
      hashes are public integrity markers, not secrets.
  performance:
    status: PASS
    notes: >-
      Pure renderer — no DB / fetch / RNG. 200-item × 50-finding
      performance test asserts <2s render time (IV2). Single
      Promise.all in the server action clumps 4 reads; no waterfalls.
      Iframe height cap at 2000px prevents runaway DOM with a
      scrollbar fallback. Counts pre-aggregated in one pass
      (`computeCounts` at line 277), reused across sections.
  reliability:
    status: PASS
    notes: >-
      Deterministic output enforced via golden-fixture file-snapshot
      (`toMatchFileSnapshot`). Defensive null-severity AVVIKELSE
      branch covered + documented as defence-vs-schema-drift.
      Empty states handled for every finding type + zero-items
      cycle. Swedish locale fixed via `{ locale: sv }` rather than
      relying on Node ICU default. Error propagation from all three
      upstream actions is explicit + individually tested.
  maintainability:
    status: PASS
    notes: >-
      Clean module boundaries — renderer is pure; server action
      composes; tab component is stateless-ish with SWR. Section
      renderers are independent functions (easy to touch in isolation).
      `SECTION_LABELS` + `bedomningLabel` + `cycleStatusLabel` live
      next to each other (grep-friendly). JSDoc on non-obvious
      choices (escapeHtml inline rationale, tenant-isolation filter
      explanation, iframe sandbox rationale). Two minor polish items
      flagged in top_issues R1/R2 as unchecked follow-ups.

