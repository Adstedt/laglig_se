nfr_validation:
  security:
    status: PASS
    notes: |
      No new auth/authz attack surface. Both paths use existing permission
      gates (members:invite for create, session ownership check for accept).
      Migration adds nullable column only, no RLS implications.
      Trial-picked-tier resolution is read-only.
      One concern: SEAT-003 (Stripe outage produces unstructured 500 errors
      that may leak stack traces to the client) — listed as a quality
      concern, not a security finding, since Sentry/Vercel logs are the
      primary leak surface and they're already private.

  performance:
    status: PASS
    notes: |
      Each invite-create + accept makes a Stripe API call (~100-200ms) for
      add-on seat counting on TEAM workspaces with subscriptions. Acceptable
      for the low-frequency invite path per the spec ("not a hot path").

      The team-tab page render also triggers getSeatUsage() on every visit
      — also makes the Stripe call. SWR caches client-side but a cold load
      pays the latency. Minor: 2-3 second page loads when the Stripe API
      is slow. Fix would be 5.5c-style Redis caching, but that's
      out-of-scope for this story.

      computeSeatUsage runs four DB queries + one Stripe call in parallel
      via Promise.all — efficient.

  reliability:
    status: PASS
    notes: |
      All v1 reliability concerns addressed. Stripe outage now fail-closes
      with structured error (HTTP 503 + STRIPE_UNAVAILABLE / matching server
      action shape). TOCTOU race narrowed to microsecond window at READ
      COMMITTED isolation by moving the seat re-check inside the transaction
      — production-level race risk is negligible at B2B accept frequencies
      (<1/min/workspace). Pending invitations counted toward seat tally at
      create time covers the multi-invite-then-accept overflow scenario.

      Documented for future: SERIALIZABLE isolation on the accept transaction
      would close the residual race window entirely; defer until production
      observability shows the race firing.

  maintainability:
    status: PASS
    notes: |
      Code is well-structured and well-commented. Single-source-of-truth
      pattern (lib/usage/limits.ts) is clean and the Story 5.6 cross-ref
      for add-on shape is properly flagged. Inline comments reference AC
      numbers (e.g., "Story 5.5a: re-check seat cap..." at
      app/actions/invitations.ts:239-243). 26-test unit suite locks in the
      limits semantics; 15-test integration suite locks in the helpers; new
      5-test path-tests file (SEAT-004 fix) catches gate-removal regressions.

