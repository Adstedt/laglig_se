top_issues:
  - id: 'SEAT-001'
    severity: 'closed'
    title: 'TOCTOU race between assertSeatAvailable and member-create transaction in acceptInvitation'
    description: |
      In app/actions/invitations.ts, the seat re-check at AC 4 runs OUTSIDE the
      member-create transaction:

        await assertSeatAvailable(invitation.workspace_id)  // checks count
        ...
        await prisma.$transaction([
          tx.workspaceMember.create(...),                    // writes member
          tx.workspaceInvitation.update(...),
        ])

      Two simultaneous accepts on the last seat both pass the check (neither
      has written yet), then both transactions succeed and the workspace ends
      up over the cap by one. AC 4 explicitly says "race protection."

      Mitigations (pick one):
      a. Move the seat check INSIDE the transaction using the tx client:
         re-count tx.workspaceMember + tx.workspaceInvitation, throw if over.
         Both concurrent accepts will see the same snapshot and one will fail
         a uniqueness or count check.
      b. Add a unique constraint that would catch the violation (less elegant).
      c. Document the race window as acceptable for v1 given low operation
         frequency (B2B invite-accepts are rare; the window is milliseconds).

      Recommend option (a) — moves the check into the transactional snapshot
      so the race window closes entirely.
    refs:
      - 'app/actions/invitations.ts:200-215'
      - 'lib/usage/seats.ts:127-139'

  - id: 'SEAT-002'
    severity: 'closed'
    title: 'acceptInvitation overflow response does not match AC 9 shape'
    description: |
      AC 9 specifies the JSON shape on BOTH create + accept paths:

        { error, message, code: 'SEAT_LIMIT_REACHED', currentSeats, limit, tier }

      The create path (app/api/workspace/invitations/route.ts:150-161) returns
      this shape correctly with HTTP 402. The accept path
      (app/actions/invitations.ts:200-214) returns only:

        { success: false, error: 'Arbetsplatsen har inga lediga platser kvar...' }

      Loses programmatic error code (no `code: 'SEAT_LIMIT_REACHED'`),
      currentSeats, limit, tier. Client cannot distinguish "this was a seat
      cap error" from any other accept error and cannot offer the same
      upgrade CTA programmatically.

      Fix: extend acceptInvitation's return type to optionally include
      `code` and the seat-state fields. On overflow, populate them from the
      caught SeatLimitExceededError instance. Clients (the /invite/[token]
      page) can then branch on `code` for upgrade UI.

      Server actions return plain objects (not HTTP responses) so HTTP 402 as
      such doesn't apply, but the SHAPE consistency is what AC 9 actually
      requires for client-side handling parity.
    refs:
      - 'app/actions/invitations.ts:208-214'
      - 'docs/stories/5.5a.seat-enforcement.md AC 9'

  - id: 'SEAT-003'
    severity: 'closed'
    title: 'Stripe outage path is unhandled — produces HTTP 500 / unhandled action throw'
    description: |
      countActiveAddonSeats() calls stripe.subscriptions.retrieve() with no
      try/catch. On Stripe outage / network error / API rate-limiting, the
      thrown StripeError bubbles up through assertSeatAvailable to the
      caller:

      - Route POST /api/workspace/invitations: only catches
        SeatLimitExceededError; everything else falls through to Next.js's
        default 500 HTML response. Client's res.json() then fails to parse.
        (Same root cause as the bug we fixed in /api/billing/checkout last
        session — "Unexpected end of JSON input".)
      - Server action acceptInvitation: throws to client; harder to surface
        cleanly in UI.

      Decision needed: fail-closed (block invites during Stripe outage,
      with clean error message) or fail-open (count addonSeats=0 on Stripe
      error, allow invite). For a low-frequency operation with margin
      protection as the primary purpose, fail-closed is defensible — but
      the error response shape needs to be a clean JSON 503/424:

        { error: 'Tillfälligt tekniskt fel', code: 'STRIPE_UNAVAILABLE' }

      Fail-open is also defensible (Solo/non-Team workspaces aren't
      affected anyway since countActiveAddonSeats short-circuits to 0 for
      those cases — only a Team workspace adding a 4th seat during a Stripe
      outage is the corner case).

      Recommend: catch StripeError-shaped errors in countActiveAddonSeats,
      log via console.error, fail-closed with HTTP 503 + JSON error code.
      Update integration tests to cover this branch.
    refs:
      - 'lib/usage/seats.ts:61-68'
      - 'app/api/workspace/invitations/route.ts:148-164'

  - id: 'SEAT-004'
    severity: 'low'
    title: 'Integration test gap — gate wiring not directly verified'
    description: |
      tests/unit/usage/seat-enforcement.test.ts has 15 thorough tests for
      countActiveAddonSeats and assertSeatAvailable, but no test imports
      the actual route handler from app/api/workspace/invitations/route.ts
      or the acceptInvitation server action to verify the gate is wired
      into the user-facing flow. A dev could remove the assertSeatAvailable
      call from either path and all 41 tests would still pass.

      Recommend: add 4-6 integration tests at
      tests/unit/usage/seat-enforcement-paths.test.ts that:
      - Import POST from app/api/workspace/invitations/route.ts
      - Mock auth context + prisma + stripe
      - Send a Request with a JSON body
      - Assert the 402 response shape on overflow
      - Assert the 200 response when within cap
      - Same pattern for acceptInvitation

      Pattern to follow: tests/unit/billing/stripe-integration.test.ts:411
      (the existing 'rejects an invalid tier with 400' test imports the
      Stripe checkout route handler).
    refs:
      - 'tests/unit/usage/seat-enforcement.test.ts'
      - 'tests/unit/billing/stripe-integration.test.ts:411'

resolutions:
  - id: 'SEAT-001'
    fixed_in: 'v1.3 (2026-05-05 fix-pass)'
    fix_summary: |
      Seat re-check moved INSIDE prisma.$transaction (app/actions/invitations.ts:244-289). Three queries via tx client (workspace, member count, pending invitation count) → getEffectiveLimits → throw SeatLimitExceededError if used > limit BEFORE tx.workspaceMember.create. Add-on count fetched OUTSIDE transaction (Stripe network call). Outer try/catch marks invitation EXPIRED on overflow.
      Residual: at Postgres default READ COMMITTED isolation, two concurrent transactions can still see the same pre-write count snapshot. Window is microseconds and worst-case is +1-2 over-cap. Acceptable for v1 B2B accept frequencies. Documented as future consideration if observed in production.
  - id: 'SEAT-002'
    fixed_in: 'v1.3'
    fix_summary: 'acceptInvitation return type extended with code: SEAT_LIMIT_REACHED | STRIPE_UNAVAILABLE | undefined, currentSeats, limit, tier (all optional). On overflow populated from SeatLimitExceededError instance. Matches AC 9 shape for client-side parity with create-path.'
  - id: 'SEAT-003'
    fixed_in: 'v1.3'
    fix_summary: 'New StripeUnavailableError class in lib/usage/seats.ts:39-44. countActiveAddonSeats wraps stripe.subscriptions.retrieve in try/catch, logs via console.error("[SEATS_STRIPE_ERROR]"), throws StripeUnavailableError. Route returns HTTP 503 + code STRIPE_UNAVAILABLE with clean Swedish retry message. Server action returns same code. Fail-closed approach.'
  - id: 'SEAT-004'
    fixed_in: 'v1.3'
    fix_summary: 'New tests/unit/usage/seat-enforcement-paths.test.ts with 5 path tests: (1) POST returns 402 + SEAT_LIMIT_REACHED on cap; (2) POST returns 503 on Stripe outage; (3) acceptInvitation in-transaction overflow returns SEAT_LIMIT_REACHED structured shape; (4) acceptInvitation Stripe outage returns STRIPE_UNAVAILABLE; (5) happy-path member-create. Tests import actual route handler + server action. Mock setup catches gate-removal regressions.'

future_considerations:
  - 'SERIALIZABLE isolation level on the acceptInvitation transaction — closes the residual TOCTOU window from "microseconds at READ COMMITTED" to "guaranteed atomic". Add via prisma.$transaction(cb, { isolationLevel: "Serializable" }). Defer until production observability shows the race firing — likely never at B2B accept frequencies.'
  - 'Redis caching for the addon-seat lookup (5.5c pattern) once observability shows the Stripe call is a noticeable latency contributor on the invite path.'
  - 'E2E Playwright spec for the invite-modal upgrade-CTA flow — deferred per workflow note, pick up in a dedicated E2E pass.'

