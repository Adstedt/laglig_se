schema: 1
story: '7.5'
story_title: 'Upload kollektivavtal (Settings + HR area) + ingest into RAG'
gate: PASS
status_reason: >-
  The epic's primary risk — cross-workspace agreement leakage — is
  structurally closed: every COLLECTIVE_AGREEMENT chunk write funnels through
  syncWorkspaceChunks → chunkCollectiveAgreement, BOTH of which hard-throw on
  a falsy workspace_id, the chunk input type requires a non-null string, the
  only caller feeds WorkspaceFile.workspace_id (non-nullable column), and a
  codebase-wide grep finds no other CA chunk writer. Agreement lookups and
  status writes carry the workspace filter inside the query itself. Migration
  is additive-only and precedent-conformant; all failure legs land the
  agreement on FAILED; 253 targeted tests + typecheck + offline prisma
  validate independently re-run clean. Four low-severity notes only.
reviewer: 'Quinn (Test Architect)'
updated: '2026-07-03T20:55:00+02:00'

top_issues:
  - id: 'UX-ADMIN-001'
    severity: low
    finding: >-
      ADMIN holds workspace:settings (sees the Kollektivavtal Settings tab)
      but neither employees:view nor employees:manage — in production the tab
      permanently renders the muted "Kollektivavtal kunde inte laddas." with
      no upload form. Intended per the story's accepted role-visibility note,
      but it reads like a broken tab to an ADMIN, not a permission boundary.
    suggested_action: >-
      Product to confirm acceptable, or relax the list read (e.g. to a
      settings-visible read) in 7.6; alternatively hide the tab for roles
      lacking employees:view.
    suggested_owner: po
  - id: 'DUP-001'
    severity: low
    finding: >-
      uploadCollectiveAgreement deliberately re-implements the storage leg of
      files.ts#uploadFile (dedupe → quota → sanitized key → sha256 →
      upsert:false upload → workspaceFile.create). Verified line-by-line
      identical in constants and semantics today (25MB, workspace-files
      bucket, PENDING self-queue, root-folder dedupe), but two copies WILL
      drift when files.ts changes.
    suggested_action: >-
      When 7.6 brings files.ts into scope (delete/replace), extract the
      shared storage helper and re-point both callers.
    suggested_owner: dev
  - id: 'SEC-MIME-001'
    severity: low
    finding: >-
      PDF gating trusts the client-declared File.type (both client and server
      side) — identical to the uploadFile precedent, so no regression, but a
      renamed non-PDF passes validation and lands with extraction deciding
      its fate (extract FAILED → agreement FAILED, honest status; no leak).
    suggested_action: >-
      Future hardening (both upload paths together): magic-byte sniff
      (%PDF-) before storage.
    suggested_owner: dev
  - id: 'VER-001'
    severity: low
    finding: >-
      The live loop (upload → extract-files cron ≤10 min → Bearbetas → Klart,
      both mounts) is unverified in a browser because the migration is
      unapplied by design. All seams are unit-pinned; this is the documented
      checkpoint, not a gap the dev could have closed.
    suggested_action: >-
      User applies `pnpm db:migrate`, then a manual browser pass of both
      mounts + one failing PDF (encrypted) to see Misslyckades.
    suggested_owner: dev
waiver: { active: false }

