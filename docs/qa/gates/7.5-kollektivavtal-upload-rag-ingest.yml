nfr_validation:
  security:
    status: PASS
    notes: >-
      ISOLATION VERDICT — no path can write an agreement chunk with a null or
      foreign workspace_id: (1) the only CA chunk producer is
      chunkCollectiveAgreement, whose shared core throws on falsy
      workspaceId; (2) syncWorkspaceChunks independently throws on falsy
      workspaceId before any DB write; (3) WorkspaceChunkInput.workspace_id
      is a required string, so the createMany insert cannot omit it; (4) the
      single call site (indexExtractedFile) sources workspace_id from
      WorkspaceFile.workspace_id, a non-nullable column; (5) grep confirms no
      other writer of source_type COLLECTIVE_AGREEMENT exists. Defense in
      depth: the agreement lookup pairs workspace_file_id WITH workspace_id,
      and status writes use updateMany carrying the workspace filter in the
      WHERE. Read side: lib/agent/retrieval.ts, context-assembly.ts and all
      lib/agent/tools/* are CA-free (verified) — agreements are not
      retrievable until 7.7 adds workspace-filtered search. Permissions:
      mutations employees:manage, list employees:view, first-upload profile
      sync is a scoped two-field update inside the upload's own ctx (the
      workspace:settings-gated action is NOT called) — all test-pinned.
      SEC-MIME-001 (client-declared mime, precedent-consistent) logged low.
  performance:
    status: PASS
    notes: >-
      Upload does one sha256 + one storage PUT + three small queries;
      chunk/embed cost is cron-side and content_hash-deduped (re-ingest of an
      unchanged PDF skips the whole OpenAI spend — test-pinned). The
      dev-flagged markAgreementFailedForFile lookup on every non-indexed file
      (incl. DONE CHAT_ATTACHMENTs) is one indexed-by-workspace... one
      findFirst against a tiny table per file, batch-capped at 25 — noise.
      Settings page adds the agreements fetch inside the existing
      Promise.all (no extra waterfall).
  reliability:
    status: PASS
    notes: >-
      The seam never throws (indexExtractedFile catches both routes;
      markAgreementFailedForFile and setAgreementStatus swallow their own
      failures) — a poisoned PDF cannot stall the batch, and the file row's
      17.9 semantics are preserved byte-identically on the USER_FILE path
      (test-pinned). Every extraction dead-end lands the agreement on FAILED
      instead of an eternal "Väntar" (beyond the AC letter, correct call).
      Upload is fail-safe around the profile sync; agreement lookup errors
      degrade to USER_FILE indexing rather than data loss. One honest gap:
      storage upload succeeded + workspaceFile.create failed leaves an
      orphaned storage object (same exposure as uploadFile — precedent,
      not a regression).
  maintainability:
    status: PASS
    notes: >-
      The seam extraction (ingest-extracted-file.ts) is the right move — the
      route shrank and the branch logic is unit-tested without cron
      scaffolding. Section-aware headers reuse the shared core via one
      optional callback instead of a forked chunker. Transparency switch
      stays exhaustive (no default) so a missed SourceType breaks the build,
      not production. DUP-001 (storage-leg copy, boundary-forced) logged with
      a clear consolidation path in 7.6. Copy rules honored ("Ej ifylld",
      badge tones, Safiro font-medium, no banned noun).

