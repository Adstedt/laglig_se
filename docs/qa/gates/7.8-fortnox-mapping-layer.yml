top_issues:
  - id: 'DATE-001'
    severity: low
    finding: 'toFortnoxDate serializes Date via toISOString().slice(0,10) (UTC). A DateTime NOT stored at UTC midnight (e.g. a local-midnight write from a UTC+2 form path = 22:00Z previous day) would emit the prior calendar day. fromFortnoxDate correctly produces UTC-midnight Dates, and the 7.1 convention is UTC midnight, so current data is safe — but nothing in the mapper enforces the convention.'
    suggested_action: 'Accept for 7.8 (pure mapper, convention holds). When the employee edit UI / sync job land, ensure employment_date/employed_to writes stay UTC-midnight normalized.'
    suggested_owner: dev
  - id: 'SYNC-001'
    severity: low
    finding: 'EmployeeInput.country is non-nullable string defaulting ''SE'' (dev scrutiny item 3 — accepted: makes the default explicit and keeps the shape round-trippable). Consequence for the FUTURE sync job: a naive full-row upsert from a Fortnox record with no Country would overwrite a manually-set non-SE country with ''SE''. Same class of concern as the documented null-emission policy (plan-doc assumption 5), but inbound.'
    suggested_action: 'When the sync story lands, the merge policy must treat mapper-defaulted fields (country, inactive) deliberately, not as authoritative Fortnox values. Add a line to the conflict-policy section when that story is drafted.'
    suggested_owner: dev
  - id: 'ENV-001'
    severity: low
    finding: 'Full-repo pnpm typecheck is currently RED — but entirely outside 7.8''s zone: lib/agent/skills/generate-law-list.ts (4× TS18048 toolCall possibly undefined) and components/features/ai-chat/citation-pill.tsx, both in Story 7.7''s concurrent working-tree area (uncommitted edits to lib/agent/tools/index.ts etc. confirm active 7.7 work). Zero type errors reference lib/integrations/** or tests/unit/lib/integrations/**; the dev''s "typecheck clean" claim was evidently true at their run time.'
    suggested_action: 'Route to the 7.7 dev — resolve before either story merges so the branch typechecks green.'
    suggested_owner: dev

