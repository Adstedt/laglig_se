nfr_validation:
  security:
    status: PASS
    notes: |
      Workspace scoping enforced at BOTH tool time (lib/agent/tools/add-document-section.ts:166-186)
      AND dispatch (app/actions/pending-agent-actions.ts:653-679). Writeable
      predicate ("dual-pointer draft set OR never-approved DRAFT") re-asserted at
      dispatch — never trust proposal snapshot. AUDITOR `tasks:edit` denial
      covered explicitly. CP-001 guardrail: 13 renderer tests assert no raw
      `documentId`/`pendingActionId`/heading-as-identifier rendered in DOM.
  performance:
    status: PASS
    notes: |
      One additional `findFirst` for position-target lookup (only when
      `position.at ∈ {after,before}`). `findSectionBounds` is O(n) over top-level
      doc children — negligible for any realistic styrdokument (typical 5-50
      sections).
  reliability:
    status: CONCERNS
    notes: |
      REL-001 (inherited from 17.11): the AC 10 activity-log stamp is
      fire-and-forget (try/catch + console.error). A missed stamp doesn't roll
      back the version; downstream audit consumers may see a
      `document_version_saved` row without the `by:'agent' / operation:'add_section'`
      enrichment. Story explicitly accepts this trade-off (Dev Notes line 152).
      Future hardening: fold the stamp into `saveDocumentVersion` itself with an
      `agentAuthor?: { pendingActionId, operation }` param so both 17.11 + 17.11b
      flip atomically. NOT a blocker — INFO-level, recommended follow-up.
  maintainability:
    status: PASS
    notes: |
      `addSection` co-locates with `updateSection`/`extractSection`/`hasSection`
      in `lib/documents/update-document-section.ts` — single locus for section-
      mutation logic. `findSectionBounds` stays module-private and is reused
      directly without re-implementation. New `SectionAlreadyExistsError` follows
      the same shape as the pre-existing `SectionNotFoundError`. Renderer reuses
      17.11's `'document-update'` ChatDetailItem variant via `oldSectionContentJson: []`
      — zero new detail-panel surface. Test layout mirrors 17.11's verbatim.

