    - action: 'Fix NEXT_PUBLIC_APP_URL fallback to prefer VERCEL_URL or hard-fail in non-prod'
      refs:
        - 'app/api/workspace/invitations/route.ts:47-49'
        - 'app/api/workspace/invitations/[id]/resend/route.ts:18-20'
    - action: 'Add Vitest coverage for /invite/[token] page (happy path + expired state minimum)'
      refs:
        - 'app/invite/[token]/page.tsx'
  future: # Address when convenient
    - action: 'Add per-workspace rate limiting on POST /api/workspace/invitations'
      refs: ['app/api/workspace/invitations/route.ts:51']
    - action: 'Component tests for InviteMemberModal'
      refs: ['components/features/settings/invite-member-modal.tsx']
    - action: 'Extract INVITE_TTL_MS to a shared constant module'
      refs:
        - 'app/api/workspace/invitations/route.ts:27'
        - 'app/api/workspace/invitations/[id]/resend/route.ts:17'
