    status: PASS
    notes: 'Optimistic state with rollback on server failure; cache invalidation guarded by try/catch; cascade deletes correctly configured; XOR enforcement at app layer compensates for NULL-distinct unique index limitation. AlertDialog removes the race condition that plagued the earlier sonner-undo pattern.'
