    notes: 'Bug #2 CommandDialog fix is a major improvement across the app. Aria-labels, Radix primitives, focus management correct. Open: text-muted-foreground contrast on fulfilled rows; inline-edit discoverability for keyboard-only users. Worth an axe-core pass in follow-up.'

