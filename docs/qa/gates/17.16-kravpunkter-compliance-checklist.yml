    notes: 'Workspace isolation via getRequirementWorkspaceContext join helper; XOR Zod refinement prevents dual-link state; server-side workspace verification on linked file/document IDs; P2002 mapped to friendly Swedish error; correct permission gates. AC10 fix means AUDITOR UX now matches the server-side permission gate — consistent defense in depth.'
