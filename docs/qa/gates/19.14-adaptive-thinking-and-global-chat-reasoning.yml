  - id: 'UX-001'
    severity: low
    finding: 'NEW consequence of 19.14 (not a defect in this story): adaptive mode auto-enables interleaved thinking, so a heavy multi-step turn now emits one reasoning block per tool step -> a ladder of repeated "Tänkte klart" breadcrumbs (7+ observed). chat-message.tsx renders each reasoning part as its own breadcrumb; 19.14 only exposed the existing design to far more reasoning events.'
    suggested_action: 'Out of scope for 19.14. Follow-up story drafted: docs/stories/19.15.agent-progress-timeline-and-working-indicator.md (Draft, SM to refine/size) — beside-avatar live status + elapsed timer, collapsing to one beneath-avatar "Tänkte och sökte i N steg" summary.'
    suggested_owner: sm
  - id: 'VER-001'
    severity: low
    finding: 'RESOLVED for the core case. AC8 confirmed via a real /api/chat SSE stream on a tool-heavy GLOBAL turn: reasoning-start/delta/end parts + signature + interleaved thinking across two tool steps → drives the ReasoningBlock breadcrumb; English reasoning correctly masked. Remaining (optional): eyeball the CHANGE-context breadcrumb and the trivial-GLOBAL clean-degrade case.'
    suggested_action: 'Optional: confirm CHANGE-context breadcrumb + trivial-GLOBAL no-empty-block degrade. Core reasoning-stream behaviour already proven.'
    suggested_owner: dev
  - id: 'DEP-001'
    severity: medium
    finding: 'AI-SDK family bumped wide alongside a small feature: ai 6.0.50->6.0.209, @ai-sdk/anthropic 3.0.23->3.0.85, @ai-sdk/openai 3.0.19->3.0.74, @ai-sdk/react 3.0.52->3.0.211. Necessary (provider version-skew Tool-type clash) and full unit suite is green, but it is a broad surface touching prompt caching + streaming + OpenAI path.'
    suggested_action: 'Smoke the chat (both providers) + prompt-caching + citations on a Vercel preview deploy before prod merge.'
    suggested_owner: dev
  - id: 'TEL-001'
    severity: low
    finding: 'AC7: reasoning-token capture now reads outputTokenDetails.reasoningTokens (field moved in ai@6.0.209), but the Anthropic provider populates neither field — counter stays 0. No regression (always 0 in prod data), but reasoning volume is unobservable via telemetry.'
    suggested_action: 'Accept as a known provider limitation; rely on the streamed reasoning block as the "did it think" signal. Revisit if a future SDK surfaces thinking_tokens.'
    suggested_owner: dev
  - id: 'TEST-001'
    severity: low
    finding: 'AC6: REASONING_GUIDANCE now-on-for-global is satisfied by re-deriving thinkingEnabled=isAnthropic, but there is no test asserting the global system prompt actually contains the guidance block.'
    suggested_action: 'Optional: add a buildSystemPrompt unit test asserting REASONING_GUIDANCE present when thinkingEnabled=true (and absent when false).'
    suggested_owner: dev

