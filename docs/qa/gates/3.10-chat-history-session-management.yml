top_issues:
  - severity: medium
    title: 'Stale closure in loadMore — messages captured by value'
    suggested_owner: dev
    status: resolved
    notes: 'setMessages([...olderUIMessages, ...messages]) captured stale `messages` ref. Fixed to use functional updater: setMessages(prev => [...olderUIMessages, ...prev])'
  - severity: low
    title: 'highlightSnippet global regex with .test() is stateful'
    suggested_owner: dev
    status: resolved
    notes: 'RegExp.test() with g flag advances lastIndex causing alternating match failures. Fixed to use index parity from split capture group.'
  - severity: low
    title: 'N+1 count queries in searchConversations'
    suggested_owner: dev
    status: deferred
    notes: 'Promise.all fires a COUNT query per unique conversation. Bounded to ~50 max conversations. Acceptable at current scale; consider single groupBy query if search volume grows.'
  - severity: low
    title: 'Server-side rate limiting for search deferred'
    suggested_owner: dev
    status: deferred
    notes: 'AC 4.1 specified max 10 req/min. Client-side 300ms debounce provides throttling. Add server-side limiter when needed.'

