schema: 1
story: '29.1'
story_title: 'Cycle Read Tier — list_cycles, get_cycle, get_finding (+ create_task findingId delta)'
gate: PASS
status_reason: >-
  All 22 ACs implemented and conform to the pinned query plans byte-for-byte:
  guards trio asserted at tool time AND re-asserted at dispatch (before
  createTask, row stays PENDING on failure), the 21.8 invariant runs in ONE
  prisma.$transaction with the exact partial-failure message, Epic 23
  nullable-cycle tolerance is typed + runtime-guarded + unit-tested, every
  query is workspace-scoped with names-not-ids output, and the bounded
  count/groupBy plans have no N+1. One real gap found and fixed during review:
  the legacy execute:true branch of create_task accepted findingId but has no
  link step — it would have created exactly the orphan corrective task this
  story removes; now rejected with a steering error + regression test.
  64 files / 732 tests green, tsc 0 errors, eslint clean.
