waiver: { active: false }

top_issues:
  - id: 'QA-FIX-001'
    severity: medium
    status: RESOLVED_DURING_REVIEW
    finding: >-
      create_task's legacy execute:true branch (pre-14.22) ran the new
      findingId guards but then created the task via the direct path, which
      has no finding-link step — a findingId + execute:true call would
      silently produce an orphan task (the exact failure mode Story 29.1/A6
      exists to remove). AC 15/16 define the coupling as approval-dispatch
      only, and every post-14.23 write tool has no direct-execute path at all.
    suggested_action: >-
      Fixed in review: findingId + execute:true now returns wrapToolError
      ("findingId kräver godkännandeflödet") steering to the propose path,
      before any DB read; regression test added in write-tools.test.ts.
      Dev to fold lib/agent/tools/create-task.ts + write-tools.test.ts QA
      edits into the File List (already listed — content updated).
    suggested_owner: dev
  - id: 'OBS-001'
    severity: low
    finding: >-
      get_finding and both create_task/dispatch finding guards scope via
      `cycle: { workspace_id }` without `cycle.deleted_at: null`, so a finding
      whose parent cycle is soft-deleted stays reachable by remembered id.
      This exactly matches the story's pinned query plans AND the canonical
      Epic 21 helper loadFindingScopedToWorkspace
      (app/actions/compliance-finding.ts:346-354) — product-wide convention,
      not a 29.1 defect. AC 4's soft-delete rule (cycle ids → hittades inte)
      is honoured by list_cycles/get_cycle.
    suggested_action: >-
      When Epic 23 gives findings their own workspace_id, decide the
      soft-deleted-parent semantics once, centrally (23.1 owns that where-
      clause migration; the // Epic 23: comments already mark both sites).
    suggested_owner: po
  - id: 'OBS-002'
    severity: low
    finding: >-
      AC 16's specified partial-failure behaviour (link tx fails → task
      exists, row stays PENDING, error names the partial state) means a
      second approval of the same card would create a duplicate task. This is
      the story-pinned design (staleness guards make the retry fail only if
      the back-fill committed, which it didn't) and is unit-tested as
      specified; noting the residual for the ops runbook.
    suggested_action: >-
      Future: make CREATE_TASK dispatch idempotent (persist taskId on the row
      before the link tx, resume the link on retry) if the partial state ever
      shows up in production logs — console.error('[CREATE_TASK] finding link
      failed…') is the tripwire.
    suggested_owner: dev

nfr_validation:
  security:
    status: PASS
    notes: >-
      Multi-tenancy: every query in all three readers + both guard sites is
      workspace-scoped (list_cycles/get_cycle: workspace_id + deleted_at:null
      in the WHERE; get_finding + guards: cycle.workspace_id — the only path
      pre-Epic 23, with the mandated // Epic 23: comment). Cross-workspace and
      soft-deleted misses return the same "hittades inte" wrapToolError — no
      existence leak. No raw user-id columns emitted anywhere: lead_auditor/
      sealed_by/closed_by resolve via userName/userNameOrNull, and tests
      assert byte-absence of lead_auditor_user_id/sealed_by_user_id/
      closed_by_user_id from serialized output. Dispatch guards run inside
      withWorkspace + tasks:edit permission gate (14.23 SEC-001 unchanged) —
      AUDITOR can read cycles but cannot approve the write. Zero mutation
      paths against cycles/items/findings/reports (AC 11).
  performance:
    status: PASS
    notes: >-
      Pinned bounded plans respected exactly: list_cycles = 1 count + 1
      findMany (Promise.all) then 2 groupBys over the page's ids (no per-cycle
      N+1, asserted in tests); get_cycle = 1 findFirst with take-capped
      includes (items/findingRows/task_links = 20, asserted at the Prisma
      arg level) + 3 count queries in Promise.all; get_finding = 1 findFirst.
      Caps at `take`, never post-fetch slicing. Reports uncapped per the DB
      unique (max 1 COMPLETE). System-prompt growth +~170 tokens with the
      ceiling re-baselined 7100→7400 per the file's established pattern.
  reliability:
    status: PASS
    notes: >-
      All three readers try/catch into Swedish wrapToolError envelopes (never
      throw into the stream); invalid completedAfter ISO fails fast before any
      query; parseScopeSummary is defensive (malformed Json → 'all' fallback,
      never throws, tested incl. groupIds:'oops'). Dispatch: guards BEFORE
      createTask (guard fail → row PENDING, createTask not called — tested);
      link tx failure → named partial-state error, row PENDING (tested);
      Epic 23 cycle_id-null → link row skipped, no throw (tested).
  maintainability:
    status: PASS
    notes: >-
      Every seam mirrors its cited precedent (19.3 diagnostics, 19.4 readers,
      21.8 task-spawner invariant, spawnTaskForFinding guard wordings reused
      verbatim). Label helpers reuse badge-tones as single source of truth;
      the two local maps (auditType/bedömning) document WHY they're local
      ('use client' sources) per the IMPACT_LEVEL_LABELS precedent. The three
      documented deviations (shared parseScopeSummary, registry-narrowing
      re-baseline, token-ceiling bump) are all justified, commented in-file,
      and smaller than the alternatives.

