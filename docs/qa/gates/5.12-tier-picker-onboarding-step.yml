nfr_validation:
  security:
    status: PASS
    notes: 'No new endpoints. pickedTier validated against literal union with safe default. SALES_NOTIFICATION_EMAIL is server-only. Email goes only to trusted internal alias; React Email escapes content. Migration is operator-applied per project discipline.'
  performance:
    status: CONCERNS
    notes: 'PERF-001: Enterprise email send is awaited, blocking the action response by Resend latency (200ms-1.5s typical). Enterprise picks are rare (~2-5% of signups) so user-facing impact is bounded, but pattern should match the law-list-generation fire-and-forget directly below in the same file.'
  reliability:
    status: PASS
    notes: 'Fail-safe email pattern (try/catch + console.error, no re-throw) mirrors Story 14.27 telemetry idiom. Defensive default for missing pickedTier. Additive nullable column migration. Workspace creation never rolls back on email failure.'
  maintainability:
    status: PASS
    notes: 'TSDoc on all new exports. Single source of truth pattern (tier-display → TIER_LIMITS) prevents marketing/enforcement copy drift. // TODO(yearly): signpost. Minor: TierCard prop precedence (popular > recommended > selected) not in JSDoc — MAINT-001.'

top_issues:
  - id: 'TEST-001'
    severity: medium
    finding: 'E2E (AC 14) deferred — three URL paths (?plan=solo|team|enterprise) untested at integration level. Unit coverage of each link in the chain is strong but doesnt catch FormData encoding drift or middleware regressions.'
    suggested_action: 'Add Playwright spec at tests/e2e/onboarding-tier-picker.spec.ts per spec AC 14, OR explicitly waive with operator smoke-test sign-off.'
    suggested_owner: dev
  - id: 'PERF-001'
    severity: low
    finding: 'Enterprise email send is awaited (app/actions/workspace.ts:326), blocking workspace-create response by Resend latency (200ms-1.5s).'
    suggested_action: 'Drop the await and use fire-and-forget pattern matching app/actions/workspace.ts:347-364. ~5 LOC change.'
    suggested_owner: dev
  - id: 'TEST-002'
    severity: low
    finding: 'AC 11 / AC 15 invite-bound-signup skip behavior not directly regression-locked. Relies on existing wizard `showWizard` gate behavior.'
    suggested_action: 'Add tests/unit/components/onboarding/onboarding-wizard-invite-skip.test.tsx with 1 test asserting tier-picker is NOT rendered when invitations.length > 0.'
    suggested_owner: dev
  - id: 'TEST-003'
    severity: low
    finding: 'AC 12 marketing pricing-section refresh transitively covered by <TierCard> tests but not directly tested as a section.'
    suggested_action: 'Add small pricing-section.test.tsx asserting (a) 3 tiles render, (b) ctaHrefs match /signup?plan=*, (c) no toggle UI.'
    suggested_owner: dev
  - id: 'MAINT-001'
    severity: low
    finding: '<TierCard> visual precedence rules (popular > recommended > selected for ring color) not documented in JSDoc.'
    suggested_action: 'Add 1-line precedence note to TierCard component JSDoc. ~2 LOC.'
    suggested_owner: dev
  - id: 'TECH-001'
    severity: low
    finding: 'Pass-3 marketing copy positions Lagefterlevnadskontroller / Anmärkningar / versionshantering as Team-tier features, but Epic 21 + Epic 17 do not gate access by subscription_tier. Solo workspaces have access to these surfaces today. Marketing-vs-enforcement drift.'
    suggested_action: 'Either add per-feature subscription gates as a separate story (similar to 5.5a-c), OR accept the MVP marketing-positioning gap and revisit on conversion data. Recommend the latter — feature-level gating is a bigger product decision than 5.12 scope.'
    suggested_owner: po

