nfr_validation:
  security:
    status: PASS
    notes: >-
      TRAP #1 (AI tool permission gate) PASS: get_employee_salary is declared
      then `delete`d from the registry unless hasPermission(role,'employees:manage'),
      BEFORE decision-log wrapping — a view-only agent has NO tool (not a refusing
      stub). Full role matrix asserts absence for MEMBER/ADMIN/AUDITOR/undefined;
      presence for OWNER/HR_MANAGER. Tool fetch is workspace-scoped; output is a
      strict PII allowlist (no personnummer/email/phone/address — byte-level tested).
      TRAP #2 (repo gate before serialization) PASS: EmployeeView Omits the salary
      ciphertext columns; toSalaryView decrypts only for canManage and masks/nulls
      otherwise, degrading a corrupt ciphertext to the mask. Byte-level JSON.stringify
      tests confirm neither ciphertext nor plaintext reaches a view-only row even with
      the Lön column visible. SALARY ABSENCE in always-on AI paths PASS:
      formatEmployeeContext byte-level absence test (polluted record), lookup_employee
      allowlist select (structurally salary-free), biasEmployeeId threaded without
      reading salary (trap #5). Fail-closed encryption; no plaintext logging.
  performance:
    status: PASS
    notes: >-
      Encrypt-at-rest forgoes numeric DB aggregation — accepted/documented (AI does
      the minimilön comparison; analytics out of scope). No hot-path regression: the
      salary bias reuses the existing single pill-employee re-fetch.
  reliability:
    status: PASS
    notes: >-
      Corrupt/rotated-key salary ciphertext degrades to mask (repo) / null (tool)
      instead of throwing out of the list or tool — personnummer parity, tested both
      sides. Three-state write contract keeps stored ciphertext on an absent key
      (masked-prefill keep path), tested via `'monthly_salary' in data === false`.
  maintainability:
    status: PASS
    notes: >-
      Mirrors the proven personnummer pattern (salary.ts thin crypto wrappers,
      encryptSalaryOrError three-state). Client-safe formatters correctly split into
      labels.ts to keep Node crypto out of the 'use client' bundle. Catalog-invariant
      test guards default-hidden drift. Fortnox mapper stays pure/crypto-free.

