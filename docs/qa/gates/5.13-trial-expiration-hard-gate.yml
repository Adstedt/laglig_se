nfr_validation:
  security:
    status: PASS
    notes: 'Webhook signature verified against real Stripe SDK constructEvent. Idempotency via P2002 unique-constraint claim is race-safe (replaces older findUnique→create TOCTOU). Bypass-context skips ONLY billing gates — session/role/membership checks still enforced. CRON_SECRET-protected cron route. Gates enforced at workspace-context boundary (server-side, no client bypass possible). RLS unchanged. Stripe Customer auto-recovery (AC 19) discriminator prevents accidental restoration of billing-failure-paused workspaces.'
  performance:
    status: PASS
    notes: 'Gate evaluation is O(1). Redis cache TTL (5 min) appropriate for the 24h cron window + 3-day grace window. Cache invalidation via `bestEffortInvalidate` runs only on webhook (not on hot path). Cron uses indexed WHERE clauses (subscription_tier + trial_ends_at + stripe_subscription_id are all on Workspace). Per-row failures don''t block the run. revalidatePath wrapped in try/catch so it can''t crash the webhook in test env.'
  reliability:
    status: PASS
    notes: 'Fail-safe pattern throughout: state transition before email send, idempotency lock before action, three layers of try/catch in cron (outer + email + activity-log), best-effort cache invalidation that never blocks webhook. Webhook handler re-throws errors so Stripe retries (idempotency row deleted on failure). NEXT_REDIRECT pattern via redirect() avoids the layout/page race condition that plagued the original throw-based approach. Discovered + fixed during smoke testing: 6 server actions whose generic try/catch would swallow NEXT_REDIRECT (now use passthroughRedirect helper).'
  maintainability:
    status: PASS
    notes: 'Comprehensive JSDoc on every new file explaining WHY (NEXT_REDIRECT propagation, race conditions, cache tradeoffs, discriminator rationale). Architectural decisions traceable in Dev Agent Record + 7-point smoke-test discovery log. `passthroughRedirect` helper is reusable across the codebase. `bestEffortInvalidate` extracted from inline duplication. Single source of truth for trial constants in `lib/billing/trial-config.ts`. Snake_case DB / camelCase TS naming consistent. Bypass pattern is clearly named (`getWorkspaceContextBypassBillingGates`, `requirePermissionForBilling`) so the intent is obvious at call sites.'

