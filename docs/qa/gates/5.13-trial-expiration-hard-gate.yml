top_issues:
  - id: 'DOC-001'
    severity: low
    finding: '`getWorkspaceContext` JSDoc still claims `@throws {WorkspaceAccessError}` as the only failure mode, but billing gates (TRIAL_EXPIRED + PAYMENT_PAST_DUE) now propagate via NEXT_REDIRECT instead of throwing. The non-billing codes (UNAUTHORIZED, NO_WORKSPACE, WORKSPACE_DELETED, ACCESS_DENIED) still throw, so the doc is incomplete rather than wrong.'
    suggested_action: 'Add a one-line JSDoc note that billing-gate failures redirect via Next.js framework rather than throwing.'
    suggested_owner: 'dev'
    refs: ['lib/auth/workspace-context.ts:290']

  - id: 'OBS-001'
    severity: low
    finding: 'Layout uses `headers().get(''x-pathname'')` to decide between gated vs bypass context, but this header requires middleware to be set. Codebase has no middleware.ts. In practice the fallback `''/''` causes the pathname-based branch to never engage — the bypass version is selected ONLY by the settings page directly. This is fine because the page-level bypass call carries the contract, but the layout''s pathname routing is layered defense that may be inert.'
    suggested_action: 'Either (a) verify Next.js 16 sets x-pathname automatically in App Router (some versions do; a quick log line at runtime would confirm), (b) add a thin middleware.ts that sets the header, or (c) remove the layout pathname branching since the page-level bypass already guarantees correctness. Option (c) is the smallest change.'
    suggested_owner: 'dev'
    refs: ['app/(workspace)/layout.tsx:30-40']

  - id: 'OBS-002'
    severity: low
    finding: 'Cron per-row failure logging is verbose: a single workspace failure can emit up to 3 console.error calls (outer try/catch + email try/catch + activity-log try/catch). Acceptable for a daily cron, but signal-to-noise drops for ops monitoring.'
    suggested_action: 'Consider a single structured log per failed row that includes which sub-step failed (state/email/activity). Not blocking — current approach captures all failure modes.'
    suggested_owner: 'dev'
    refs: ['lib/billing/trial-expiration-cron.ts:108-110, 132-134, 138-141, 199-201, 252-254']

  - id: 'TEST-001'
    severity: low
    finding: 'AC 12 (countdown banner) and AC 13 (3 email templates) have no dedicated unit tests. Both were live-verified during the smoke-test session, but lack of tests means future regressions could go undetected. The banner''s sessionStorage dismiss + day-window logic and the email templates'' Swedish copy register would benefit from snapshot/render tests.'
    suggested_action: 'Add `tests/unit/components/features/billing/trial-countdown-banner.test.tsx` (3 cases: renders at daysLeft∈{1,2}, hidden otherwise, dismiss persists in sessionStorage). Email-template snapshot tests are nice-to-have. QA can pick up Playwright parity if mandated.'
    suggested_owner: 'dev'
    refs: ['components/features/billing/trial-countdown-banner.tsx', 'emails/trial-ended.tsx', 'emails/workspace-paused.tsx', 'emails/enterprise-inquiry-trial-ended.tsx']

  - id: 'OPS-001'
    severity: low
    finding: '`CRON_SECRET` env var confirmation in Vercel is still operator-pending per Dev Agent Record. The `expire-trials` cron route requires Bearer auth in production — without the env var set, all cron invocations will return 401 and the trial-end emails / pause / delete actions will never fire.'
    suggested_action: 'Operator must confirm `CRON_SECRET` is set in Vercel env (existing pattern from `cleanup-workspaces` cron). Block final Done flip until verified.'
    suggested_owner: 'po'
    refs: ['app/api/cron/expire-trials/route.ts:23-32']

