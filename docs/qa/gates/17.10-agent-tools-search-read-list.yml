owner_signoff:
  smoked_at: '2026-06-01T15:00:00Z'
  smoked_by: 'Alexander Adstedt (Owner)'
  workspace: 'Nordviken Hotell & Konferens AB (e4cd55b0-8b2c-4209-bd19-0b40f50f04f1)'
  seed_prep: 'scripts/seed-nordviken-17.10-smoke.ts — idempotent, touches only Nordviken. Required because Nordviken had 21 styrdokument but 0 WORKSPACE_DOCUMENT chunks (17.9b indexes APPROVED-only per DEC-2, and many existing APPROVED docs were stubs <100 chars). Seed: promoted 2× Diskrimineringspolicy DRAFT→APPROVED with distinct Swedish content (HR/rekrytering vs Gäster/kundbemötande — the natural CITE-002 collision pair); linked an APPROVED doc to existing test task for A5; syncWorkspaceChunks on 5 APPROVED+content docs → 43 chunks indexed.'
  scenarios_run: 8  # A1, A2, A3, A5, B1, C2, D, E (B2/B4 absorbed by B1; C1 absorbed by C2; A4 not needed once A2 demonstrated default-grouping)
  scenarios_passed: 8
  surfaced_findings:
    - 'CITE-002 collision behavior is healthier than the spec strictly requires: the **list** surface honestly flags same-titled docs as "troligen dubbletter" (A2 — correct heuristic with no content visible); the **search+get** surface declares "två separata" with distinct content summaries (C2 — content-aware path). Both interpretations correct on the same data, complementary not contradictory. Worth documenting as canonical behavior, not a defect.'
    - 'Multi-tool composition is the agent norm, not the exception: A1 chained 3 tools (search_workspace_documents + search_legal_documents + get_workspace_document); A5 chained 3 (sökte uppgift + läste uppgift + list_workspace_documents with linked_task_id); B1 chained 2 (search → get). Agent is *planning* with the tools, not picking one. Strongest signal that the 17.10 surface shape fits the agent reasoning loop.'
    - 'D scenario surfaced the strongest empirical motivation for **17.10b** (DRAFT/IN_REVIEW indexing + status-aware citations): search returned empty for a DRAFT-only query → agent fell back to list by title → asked user to disambiguate → second turn for content. Three round-trips for what could be one with content-aware DRAFT indexing. The graceful-degradation emerged without being prompted (good agent behavior), but the user friction is real. Filed as Task #2.'
    - 'Inline citation pills (B1) vs bottom Källor (A1): the citation surface adapts to response shape — section-level chips for long-form summaries, summary line for short answers. Emergent, not designed; works well; worth being aware of as more flows ship.'
    - 'Agent embellishes get_workspace_document responses with `godkänd av <name>` + version provenance (not in 17.10 spec but pulled from the get payload). Reasonable surfacing.'
  cross_tenant_verification:
    method: 'Owner smoke E — same prompt run in a different workspace; Nordviken''s 43 chunks did not appear. Confirms closure-captured workspaceId + Prisma where.workspace_id + 17.9b write-side invariant compose correctly end-to-end (the three independent isolation layers each held under load).'
    result: PASS
