schema: 1
story: '20.3'
story_title: '/krav Route & Workspace Krav Table UI'
gate: CONCERNS
status_reason: 'Route + UI functional and visually aligned with /laglistor after the post-implementation layout fix. The two typed boundaries (URL ↔ action input, resolver re-use) are clean and type-safe. The SWR dedup invariant is locked with a dedicated test. But three non-trivial pieces of orchestration logic (virtualization, KravTable rendering, KravPageContent URL fallback + Ladda fler + inline-edit invalidation) ship without automated coverage — each is a plausible regression vector, and AC 28 (virtualization) is explicitly not implemented. Recommend closing the test gaps before flipping to Done; virtualization can be a tracked follow-up for large-workspace users.'
reviewer: 'Quinn (Test Architect)'
updated: '2026-04-21T22:05:00Z'

waiver: { active: false }

top_issues:
  - id: 'PERF-001'
    severity: medium
    finding: 'AC 28 (virtualization auto-enables above 100 rows) is NOT implemented. Dev deferred with the rationale that non-virtualized rendering is still functionally correct. True at <100 rows, but Story 20.2 ships with a default limit of 50, so two "Ladda fler" clicks push any workspace over threshold. A 500-krav workspace accumulating all rows will feel the DOM-reflow cost — exactly the scenario Epic 20 targets (compliance managers with 10+ laglistor).'
    suggested_action: 'Copy the `useVirtualizer` + 100-row threshold pattern from `document-list-table.tsx:838` into `components/features/krav/krav-table.tsx`. ~30–50 lines of additive code; no behaviour change below threshold; fully compatible with the existing column defs.'
    suggested_owner: dev
  - id: 'TEST-001'
    severity: medium
    finding: 'KravTable (395 lines — the largest new UI component in this story) has zero RTL coverage. Story Task 15 prescribed `krav-table.test.tsx` with column rendering, sort-click dispatch, and Ladda fler visibility tests.'
    suggested_action: 'Add `tests/unit/components/features/krav/krav-table.test.tsx`: assert each of the 7 columns renders expected content for a seed row; clicking a sortable header fires `onSortChange` with the right field; `nextCursor: null` hides the "Ladda fler" button; `isLoadingMore: true` disables the button with "Laddar…" label.'
    suggested_owner: dev
  - id: 'TEST-002'
    severity: medium
    finding: 'KravPageContent''s orchestration logic (URL hydration, graceful fallback stripping malformed params on mount, Ladda fler accumulation, cross-key SWR invalidation, modal open/close) has no automated coverage. The parser functions are pure and tested in isolation by type, but the `useEffect` that strips malformed URL params (lines 168–187) and the `extraPages` accumulation (lines 274–305) are non-trivial state transitions that would regress silently.'
    suggested_action: 'Add `tests/unit/components/features/krav/krav-page-content.test.tsx`: mount with `?filter=banana&sort=nope&dir=hmm` and assert `router.replace` is called with a cleaned URL; assert debounced search writes to URL after 300ms; assert "Ladda fler" appends rather than replaces; assert Rensa resets to `/krav`.'
    suggested_owner: dev
  - id: 'MNT-001'
    severity: low
    finding: 'Dead `void resolveEffectiveAssignee` expression at `krav-page-content.tsx:396`. The import is retained with a comment explaining it''s "for parity with Story 20.2''s contract in case the UI later adds an optimistic-patch path." That''s a speculative future need, not a current use — classic YAGNI violation.'
    suggested_action: 'Remove the `resolveEffectiveAssignee` import from line 33 and the `void` expression + comment from line 396. If an optimistic-patch path is added later, re-import then.'
    suggested_owner: dev
  - id: 'MNT-002'
    severity: low
    finding: 'The Ladda fler handler uses `await import(''@/app/actions/workspace-requirements'')` (dynamic import) to "bypass SWR" — but `getWorkspaceRequirements` is already reachable in the module graph via the SWR hook''s fetcher. The dynamic import adds latency for zero benefit (the module is already cached).'
    suggested_action: 'Replace the dynamic import with a static import at the top of the file. Saves one async tick per Ladda fler click.'
    suggested_owner: dev
  - id: 'PERF-002'
    severity: low
    finding: 'Performance markers (AC 36, 37) not implemented. Dev deferred along with Playwright e2e. Means real-world latency regressions (e.g., a silent SWR config drift, a new relation include on 20.2''s server action) won''t be caught at unit-test level.'
    suggested_action: 'Once a Playwright harness with a seeded workspace exists, add the `performance.mark` + `performance.measure` pattern from the story spec (Task 16). Warn-only P95 soft-fail is fine — this is observability, not gating.'
    suggested_owner: dev
  - id: 'A11Y-001'
    severity: low
    finding: 'AC 14 axe scan deferred. Keyboard-accessibility is covered structurally (aria-pressed on chips, aria-label on picker, role=region on table, Label on search), but a live page scan would catch things like insufficient contrast on the dimmed inherited-avatar state or missing focus rings on the Lag-cell button.'
    suggested_action: 'Run axe against a local dev preview once the branch is deployed, or add the scan to the Playwright scenario when that lands.'
    suggested_owner: dev

