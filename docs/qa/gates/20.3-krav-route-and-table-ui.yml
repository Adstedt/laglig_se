nfr_validation:
  security:
    status: PASS
    notes: |
      New `/krav` route is inside the `(workspace)` route group — auth enforced
      by the layout. All data access goes through already-QA''d server actions
      (`getWorkspaceRequirements`, `getWorkspaceRequirementCounts`,
      `updateRequirement`, `getWorkspaceMembers`) — no new auth surface. URL
      params are defensively parsed with enum coercion; malformed values never
      reach the server untyped. No raw SQL, no new write paths.
  performance:
    status: CONCERNS
    notes: |
      SWR dedup locked by test (AC 38). Payload + query budgets inherited from
      20.2 remain enforced. BUT: AC 28 virtualization deferred (PERF-001) means
      workspaces accumulating >100 rows via repeated "Ladda fler" clicks will
      render them all in the DOM — measurable reflow cost at 500 rows. Real-
      world impact moderate because (a) default limit is 50, (b) most workspaces
      have <100 krav, (c) the slow path only hits power users who click Load
      More many times. Mitigation: track virtualization as a follow-up;
      monitor Story 20.3 rollout for complaints.
  reliability:
    status: PASS
    notes: |
      Never throws to user — SWR errors surface the "Försök igen" branch;
      inline-edit failures surface Swedish toasts and revalidate server state
      rather than leaving the optimistic patch in place. Graceful URL fallback
      means bad bookmarks can''t break the page.
  maintainability:
    status: CONCERNS
    notes: |
      Two small smells: (1) MNT-001 — a dead `void resolveEffectiveAssignee`
      import/expression that should just be deleted; (2) MNT-002 — an
      unnecessary dynamic `await import()` in the Ladda fler handler. Neither
      blocks merge but both are noise that a future reader will have to
      understand. The 564-line krav-page-content.tsx is long but under
      codebase precedent (document-list-table.tsx is 1400+ lines); not
      flagging as a separate issue, but a custom `useKravPageState` hook
      would age well.

