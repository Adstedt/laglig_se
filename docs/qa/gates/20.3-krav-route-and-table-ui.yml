# Positive observations worth keeping in the record
notes:
  - |
    The systemic guardrail added in commit 3263ea3 (`pnpm build` in pre-push)
    caught the SECOND instance of the `'use server'` + sync-export rule at
    dev time rather than at Vercel time (this time on
    `buildRequirementWhere` in the 20.2 server-action file). The extraction
    to `lib/requirements/query-builders.ts` parallels the earlier
    `lib/requirements/helpers.ts` split. Two data points make this a
    ratified pattern — worth formalizing in the architecture docs
    (`docs/architecture/17-coding-standards.md` or a new rule in
    `docs/architecture/11-backend-architecture.md`) so Story 20.4+ authors
    don''t have to rediscover it.
  - |
    Dev correctly identified and responded to the user''s UI-feel feedback
    (three targeted fixes: breadcrumb label registration, header layout
    realignment, toolbar integration). This is documented in the Change Log
    v1.1 entry and Completion Notes — good post-implementation hygiene.
  - |
    KravFilterChips test suite is thorough (10 tests covering AC 11-17
    including edge cases like undefined counts, 0/1/2 Rensa adjustment
    cases). Exactly the shape a reviewer wants to see on a new pure
    component.
  - |
    SWR dedup test (AC 38) catches the subtle pitfall of separate React
    roots sharing cache state — dev''s first attempt at the test failed
    because of this, then fixed by mounting both hook consumers inside one
    `renderHook` call. The fix + reasoning is baked into the test file''s
    `sharedCacheWrapper()` helper comment.
