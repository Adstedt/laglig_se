schema: 1
story: '7.4b'
story_title: 'Register column controls — show/hide + resize'
gate: PASS
status_reason: >-
  The infinite-width bug is structurally unreachable: every sizing path
  (onEnd commit via resolved updater, functional or direct, live preview,
  localStorage load AND save) funnels through clampEmployeeColumnSizing,
  whose bounds table matches the column defs 1:1 — the register is stricter
  than the law table it mirrors (unknown ids dropped, non-finite values
  rejected). Non-hideable Anställd/drag-handle is a verified triple defense
  (enableHiding:false, sanitizer strip on load/save/change, disabled
  Obligatorisk checkbox). Shared primitive consumed untouched, no
  law-list-typed imports, AC1-6 all covered. 35/35 targeted tests +
  typecheck independently re-run clean. Three low-severity notes only.
reviewer: 'Quinn (Test Architect)'
updated: '2026-07-03T20:40:00+02:00'

top_issues:
  - id: 'STATE-001'
    severity: low
    finding: >-
      handleColumnVisibilityChange and handleColumnSizingChange each rebuild
      the full EmployeeColumnState from the OTHER half's closure value using
      non-functional setState. Unreachable from today's UI (visibility
      changes only from the single Kolumner control as full state; sizing
      only from one grip at a time), but a future caller firing both in one
      tick would clobber one half with a stale value.
    suggested_action: >-
      Future-proof with functional updates:
      setColumnState((prev) => ...) inside applyColumnState, merging the
      changed half over prev.
    suggested_owner: dev
  - id: 'TEST-001'
    severity: low
    finding: >-
      No component-level test drives an actual resize drag through the
      onEnd commit path (jsdom pointer-drag limits); the clamp is pinned at
      unit level (clampEmployeeColumnSizing) and via the hydrate-clamps-to-
      480px assertion, and the commit path was verified by code review.
    suggested_action: >-
      Cover resize drag + grip/sort/dnd seam in the carried-over manual
      browser pass (or a future Playwright pass) of the register.
    suggested_owner: dev
  - id: 'TEST-002'
    severity: low
    finding: >-
      The workspaceId-null path (register with groups but zero employees:
      Kolumner control renders, toggling skips persistence) is code-verified
      safe (applyColumnState guards the save, effect guards the load) but
      not pinned by a test.
    suggested_action: >-
      Add one test rendering groups with allEmployees=[] and toggling a
      column — asserts no crash and localStorage stays empty.
    suggested_owner: dev
waiver: { active: false }

