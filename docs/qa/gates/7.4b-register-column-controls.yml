    # sanitizer strips name/dragHandle=false (unit) and hide-personnummer
    # keeps Anställd (RTL). Triple defense verified in code: enableHiding,
    # sanitizer on load/save/change, mandatory checkbox.
    # AC3: clamp unit matrix (out-of-bounds both directions, unknown ids,
    # NaN/Infinity) + stale 99999px hydrates as exactly 480px (RTL);
    # columnResizeMode 'onEnd' + commit-path clamp-before-store verified by
    # review; bounds table matches column-def size/minSize/maxSize 1:1 for
    # all ten ids. TEST-001 notes the missing drag simulation.
    # AC4: persist-on-change under laglig:personalregister:columns:v1:{ws},
    # hydrate-on-mount, per-workspace isolation, corrupt JSON and
    # wrong-shape JSON degrade to defaults, unknown/new columns default
    # visible — all pinned.
    # AC5: no reorder — grep confirms zero columnOrder/onColumnOrderChange
    # machinery in the personalregister dir (absence, verified by
    # inspection rather than test).
    # AC6: filterEmployees matches a personnummer digit query with the
    # column hidden AND the matched row renders; filter-employees.ts
    # untouched (search is over data, not cells).

nfr_validation:
  security:
    status: PASS
    notes: >-
      No PII surface: persisted state is column ids, booleans and widths
      only — never row data; the personnummer privacy case (hide while
      screen-sharing) works and hydrates hidden before any interaction.
      localStorage is workspace-keyed, and stale/foreign keys cannot
      resurrect hidden-column content (visibility only gates rendering).
  performance:
    status: PASS
    notes: >-
      Sizing state lifted once, memoized columnControls, clamp is O(cols);
      localStorage writes only on user changes (visibility toggle, resize
      commit — onEnd means one write per drag, not per frame). Live preview
      recomputes per pointer move as in the law table; registers are small
      and unvirtualized by design.
  reliability:
    status: PASS
    notes: >-
      Every persistence failure mode degrades to defaults without crashing
      (corrupt JSON, wrong shape, disabled storage, quota — load and save
      both try/catch); SSR-safe post-mount hydration avoids mismatch;
      empty-register/null-workspace path skips persistence safely
      (TEST-002: pin it).
  maintainability:
    status: PASS
    notes: >-
      Single label source (EMPLOYEE_COLUMN_LABELS) shared by headers and
      toggle list; bounds table documented as clamp source of truth with a
      catalog-invariant test guarding drift; shared ui/column-settings
      consumed as-is (git: untouched, along with document-list/**); no
      law-list-typed imports; banned noun absent from 7.4b files. STATE-001
      logged for the dual-callback state merge.

