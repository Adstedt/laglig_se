expires: '2026-07-17T00:00:00+02:00'

evidence:
  tests_reviewed: 35
  risks_identified: 3
  trace:
    ac_covered: [1, 2, 3, 4, 5, 6]
    ac_gaps: []
    # AC1: Kolumner control lists all nine data columns (flat + grouped
    # toolbars), toggle removes header+cells, grouped test proves the hide
    # applies to EVERY section (shared lifted state, one instance per group).
    # AC2: Anställd present-but-disabled with Obligatorisk (data-disabled
