# ============================================================================
# Top issues — all LOW severity, all non-blocking, optional dev follow-ups
# ============================================================================

top_issues:
  - id: 'CONCERN-001'
    severity: low
    finding: |
      AC 5 `lastMeaningfulChange` helper at
      `components/features/documents/document-table.tsx:89` has no isolated
      unit test. The function derives the "Senast ändrad" display value via
      `Math.max` over [doc.updated_at, current_draft_version?.created_at,
      current_approved_version?.approved_at] — sound logic, but currently
      covered only through render-time integration in the table tests
      (which don't exercise the null-pointer edge cases the helper guards
      against).
    impact: |
      A future refactor could silently regress the null-pointer handling
      (e.g., switching the `if` guards to optional chaining without the
      null check would yield `NaN` in the Math.max chain). The display
      would then fall back to a Date(NaN), surfacing "Invalid Date" in the
      table. Caught quickly during smoke, but cheap to defend against now.
    suggested_action: |
      Add 3 isolated unit tests for the helper:
        (a) both draft + approved null → returns doc.updated_at
        (b) draft null + approved set → returns max(updated_at, approved_at)
        (c) both set → returns max of all three
      Test file: extend
      `tests/unit/components/features/documents/document-table.test.tsx`
      with a small `describe('lastMeaningfulChange', ...)` block.
    refs: ['components/features/documents/document-table.tsx:89-102']
    suggested_owner: dev

  - id: 'CONCERN-002'
    severity: info  # v2.1 — DOWNGRADED from low. Live smoke functionally closed.
    finding: |
      AC 6 / AC 7 / AC 8 DocumentEditor extensions (secondary "Godkänd v{N}
      av X den DATE" metadata indicator, Skicka / Godkänn / Neka / Förkasta
      utkast action buttons, dual-state edit banner + AlertDialog) had no
      isolated RTL test for their rendering at v2.0.
    impact: |
      v2.1 re-review update — the owner-led live smoke against Supabase
      production data (2026-06-04) exercised every banner branch + every
      action button end-to-end across multiple promote / Skicka / Neka /
      Förkasta cycles on real dual-state data (Almåsa toilets policy).
      Coverage is now functionally equivalent to (arguably better than)
      what an RTL test would have given. The risk vector this CONCERN
      was guarding against (DocumentEditor refactor silently breaking
      prop-plumbing) is also strongly mitigated by the strict TypeScript
      prop signature + the page-route integration that flowed real props
      through the component during the smoke.
    suggested_action: |
      Accept the deferral. Path (b) from the v2.0 review note is the
      established precedent (matches Story 17.16). No further action
      required unless a future story plans to land heavy DocumentEditor
      changes — at which point an RTL spot test for the new branches
      would be sensible.
    refs: ['components/features/documents/editor/document-editor.tsx']
    suggested_owner: dev

  - id: 'CONCERN-003'
    severity: low
    finding: |
      AC 12 ("color contrast: composite badge meets WCAG AA contrast for
      both approved and draft tone pills against the table row background,
      both dark and light themes") has no isolated contrast snapshot test
      for the composite badge specifically.
    impact: |
      Documentation-only — the composite badge renders two Badge primitive
      instances, and Epic 22.1 establishes that the tone-aware `<Badge>`
      primitive IS WCAG AA-validated (per the JSDoc on
      `lib/ui/badge-tones.ts:46-49`). So the composite inherits contrast
      compliance from its constituent primitives — there is no realistic
      failure mode where the composite would fail AA when both halves
      individually pass. But "inherited contrast" is an assumption, and
      adding a snapshot would be defensive.
    suggested_action: |
      Optional follow-up — add a snapshot-based contrast assertion via
      `axe-core` (already in the project per `tests/e2e/`) on the
      composite badge in both themes. Low priority; integration test
      territory. Defer unless QA wants to do it as part of a broader
      contrast audit.
    refs: ['components/features/documents/dual-status-badge.tsx', 'lib/ui/badge-tones.ts']
    suggested_owner: dev

  - id: 'CONCERN-004'
    severity: low
    finding: |
      The `editable` gate at `document-editor.tsx:175-180` reads as a
      3-clause composition:
        const editable =
          viewMode !== 'approved' &&
          currentDraftStatus !== 'IN_REVIEW' &&
          (currentDraftId != null ||
           (currentStatus === 'DRAFT' && currentApprovedVersionId == null))
      Correct under the v1.3 spec, but harder to scan + test in isolation
      than a named helper.
    impact: |
      Readability + testability. A future dev tweaking the gate would
      have to re-derive the v1.3 rationale from the comments. Extracting
      to a `computeEditable` helper (matching the `computeRestoreGuard`
      pattern that already shipped for AC 17) would (a) be unit-testable
      in isolation with the full case matrix, and (b) move the JSDoc
      explanation next to the predicate logic. Not blocking.
    suggested_action: |
      Optional dev follow-up — extract the gate to a helper in
      `lib/utils/document-editability.ts` (sitting next to
      `isDocumentEditable`) named `computeEditable(args)`, then unit-test
      the case matrix (10 cases: 5 doc states × 2 viewMode values). The
      existing `isDocumentEditable` helper stays untouched as the
      backward-compatible primitive.
    refs: ['components/features/documents/editor/document-editor.tsx:165-180', 'lib/utils/document-editability.ts']
    suggested_owner: dev

