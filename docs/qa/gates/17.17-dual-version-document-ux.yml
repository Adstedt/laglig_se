  security:
    status: PASS
    notes: |
      All new server actions workspace-scoped via withWorkspace.
      submitDraftForReview gates on tasks:edit (matches the
      14.22-14.30 + 17.11/17.11b + 17.16 convention; the SF-1 fix from
      Story 17.16 v1.1 + v1.3 PO ratification holds). Permission check
      ordering is defensive (gate-before-fetch). ActivityLog preserves
      audit trail. CP-001 explicitly asserted (no raw IDs in DOM) on the
      composite badge. ?view=approved query param is a safe read-only
      override; defensively gated by current_approved_version existence.
      No new attack surface.
  performance:
    status: PASS
    notes: |
      AC 15 satisfied — SELECT shape extension on existing findMany,
      no new query. New WHERE-clause status switch uses Story 17.16's
      indexed columns (current_approved_version_id @unique,
      current_draft_version_id @unique, secondary index on
      (workspace_id, current_draft_version_id)). lastMeaningfulChange
      is O(1) per row at render time. matchesStatusFilter is a simple
      switch — O(1). computeRestoreGuard is O(1) per render. Composite
      badge anchors are static — no per-render allocation.
  reliability:
    status: PASS
    notes: |
      All new server actions return typed ActionResult.
      submitDraftForReview uses $transaction (atomic doc update +
      ActivityLog) matching discardDraft shape. Required AlertDialog
      confirmation on destructive Förkasta action (AC 8). Toast feedback
      on success + error paths for every dual-state handler. Optimistic
      local state updates with router.refresh() — fast UI + eventual
      consistency via server re-fetch. viewMode='approved' cannot make a
      stable-APPROVED doc editable (gate logic explicitly handles this).
      Story 17.16's alias-freeze invariant still verified across paths
      A/B/C/D in the existing test suite.
  maintainability:
