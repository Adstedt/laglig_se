nfr_validation:
  security:
    status: PASS
    notes: |
      Three-layer authorization preserved:
      (a) Zod validation at entry (non-UUID cycleId rejected pre-prisma â€” verified);
      (b) `withWorkspace(cb, "tasks:edit")` on both new actions (AUDITOR rejection verified);
      (c) Runtime `canCompleteOrRevertCycle` on revert for lead-auditor-OR-privileged-role semantics (7/7 authorization tests green).
      Tenant isolation: every Prisma query filters by `workspace_id` either directly or via a cycle join. Cross-workspace test verifies generic `Kontrollen hittades inte` return (no existence leakage).
      Activity log PII: old/new values are status strings + timestamps only; no user content in payloads.
      TODO(21.10) markers present on both new mutation actions â€” future immutability guard will add the SEALED/ARKIVERAD write-reject layer.
  performance:
    status: PASS
    notes: |
      completeCycle: 4 Prisma round-trips per happy-path (loadCycle + parallel countÃ—2 + update + post-update refresh via loadCycleDetailInline). Parallel counts via Promise.all keep the guard step at single-wait latency.
      revertCycleToPagaende: 4 Prisma round-trips (loadCycle + canCompleteOrRevertCycle's internal findFirst + update + post-update refresh). DEBT-002 notes this could be 3, but the savings are marginal.
      Shared `CYCLE_DETAIL_INCLUDE` + `mapCycleRowToDetail` + `loadCycleDetailInline` helpers eliminate the nested `withWorkspace` re-entry pattern the original draft risked (SF-4 â€” verified via helper presence in the diff).
      Frontend: all counts are derived from existing hoisted state (no new fetches); localCycle update is O(1) React re-render.
  reliability:
    status: PASS
    notes: |
      Error handling: structured ActionResult returns; outer try/catch wraps both actions with Swedish generic error strings on unexpected Prisma failures (tested).
      Dialog error-path: `e.preventDefault()` on AlertDialogAction onClick keeps the dialog open on mutation failure (tested â€” dialog stays mounted + toast.error fires).
      Submit-flag cleanup: `finally` blocks in both handlers guarantee `isSubmitting` returns to false. GAP-001 flags the missing explicit test but the code is correct.
      Race conditions: items-signed guard is best-effort pre-check (documented); DEBT-001 flags the where-clause tightening opportunity but the current design is acceptable.
      Idempotency on guard-rejection: no DB write + no log when status/items guards reject (verified).
  maintainability:
    status: PASS
    notes: |
      Clean separation of concerns â€” presentation components (dropdown, dialogs) are stateless; state + mutation ownership is in CycleDetailPage.
      Shared helpers reduce duplication: mapCycleRowToDetail is now the single CycleDetail construction site (getCycleById refactored to use it â€” trivial diff, all pre-existing tests pass).
      Constants extraction: DROPDOWN_TOOLTIP_COPY exported for copy-contract pinning.
      Naming convention: Swedish "anmÃ¤rkningar" in dialog copy matches the 21.7/21.8 UI rename; FindingRow / code identifiers stay English.
      JSDoc coverage on all new public exports + rationale (SF-1, SF-4, SF-5) inlined in code + test debug log.

