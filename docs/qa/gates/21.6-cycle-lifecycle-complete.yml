top_issues:
  - id: 'PROD-001'
    severity: low
    finding: 'Manual browser smoke test (Task 12.7) not executed during dev pass â€” 6-step flow covering PAGAENDE â†’ Complete â†’ status flip â†’ Revert â†’ PAGAENDE + activity-feed verification remains pending.'
    suggested_action: 'PO runs the smoke test against a live workspace before Done. Covered scenarios: Ã…tgÃ¤rder dropdown opens on PAGAENDE, Complete dialog renders with advisory (if open findings), status badge flips amber, Revert dropdown appears in AVSLUTAD, Revert flow round-trips cleanly, activity feed shows both transitions with the new Swedish labels.'
    suggested_owner: po

  - id: 'DEBT-001'
    severity: low
    finding: 'completeCycle update uses `where: { id }` only â€” under the vanishingly rare case of two users concurrently passing the items-signed guard simultaneously (or a simultaneous seal), the second update would overwrite a state it didnt intend. Impact is bounded: the only reachable race is "complete-then-complete" (idempotent-ish) or "complete-vs-seal" (seal requires AVSLUTAD, so the race would fail at 21.9s guard anyway).'
    suggested_action: 'Tighten to `where: { id, status: PAGAENDE }` for completeCycle and `where: { id, status: AVSLUTAD }` for revertCycleToPagaende. Trivial change; could land as part of Story 21.10 (immutability guard) since that PR already touches these entry points.'
    suggested_owner: dev

  - id: 'DEBT-002'
    severity: low
    finding: 'revertCycleToPagaende does two cycle lookups â€” the existing `loadCycleScopedToWorkspace` + the `isLeadAuditor` lookup inside `canCompleteOrRevertCycle`. Could be one if we threaded the loaded cycles `lead_auditor_user_id` + `deleted_at` through to a pure role-check helper.'
    suggested_action: 'Nice-to-have consolidation. Not worth churn for MVP â€” the two lookups are both cheap (single `findFirst` with `select: { id: true }` in the lead-auditor case), and the clean separation of concerns is arguably the right tradeoff.'
    suggested_owner: dev

  - id: 'GAP-001'
    severity: low
    finding: '`handleCompleteCycle`/`handleRevertCycle` `finally` blocks clear their respective `isSubmitting` flags â€” a regression would cause permanent button disable on error. No test asserts this cleanup explicitly.'
    suggested_action: 'Add one small assertion to cycle-detail-page-lifecycle.test.tsx error path: after the error toast fires, click the cancel button and verify both cancel + primary are enabled (would fail if submitting didnt clear). ~5 lines. Optional.'
    suggested_owner: dev

