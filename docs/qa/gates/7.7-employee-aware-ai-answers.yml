    status: PASS
    notes: 'Hot-path inertness proven at three independent layers: buildSystemPrompt byte-identity (toBe), route-level (prisma.employee never queried, employeeContext undefined, no biasAgreementId) and transport (no body override — pre-7.7 call shape). The employee branch costs one indexed findFirst only when an id is present under permission. Retrieval adds one null-guarded predicate, same shape as the existing sourceType filters. All pre-existing chat suites pass unchanged (git-verified additive-only test edits); SEC-001 fix re-verified against all 11 app/api suites (69/69).'
  reliability:
    status: PASS
    notes: 'Both tools wrap DB/retrieval failures into Swedish error envelopes (never throw into the stream); empty-result guidance steers the model back to unbiased search / search_laws; CA pill degrades gracefully without a backing file (hover preview, no CTA, no crash); picker fetch failure → non-fatal error text with retry-on-reopen; fail-closed on undefined role everywhere.'
  maintainability:
