    notes: 'Every seam mirrors its cited precedent; label duplication is drift-guarded by a test pinning lib/employees/labels.ts to the personalregister maps; registry counts + role matrix pinned; exactOptionalPropertyTypes ripple solved at the type-definition side without touching the out-of-zone consumer; the SEC-001 fix is self-documenting with the QA finding cited inline.'

