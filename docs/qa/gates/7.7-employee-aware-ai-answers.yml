      PII-into-LLM verdict: PASS by construction. All four employee-data paths
      (route fetch, formatEmployeeContext, lookup_employee, getEmployeesForChatContext)
      use typed/Prisma ALLOWLISTS — personnummer (any form), email, phone, address and
      fortnox_raw are structurally unreachable, and tests assert byte-level ABSENCE
      from polluted records (incl. bare "@", city, postcode). Nothing logs the employee
      block; AgentDecisionLog persists lookup_employee output but that output IS the
      allowlist mapping (workspace-scoped, same tier as chat content).
      Trust-boundary verdict: PASS — compound WHERE (id + workspace_id), employees:view
      re-gate against the real permission matrix, workspaceId !== 'default' guard;
      foreign/deleted/foreign-workspace ids yield 200 with no block, no bias, no
      existence leak; biasAgreementId is not client-reachable; model-supplied
      agreementId is workspace-clamped (foreign id → zero rows, tested).
      lookup_employee registration fail-closed (OWNER/HR_MANAGER only; ADMIN/MEMBER/
      AUDITOR/undefined absent; delete precedes decision-log wrapping).
      SEC-001 RESOLVED (2026-07-04): raw body rest-spread removed from
      buildSystemPrompt; per-key typeof-checked allowlist (title/sfsNumber/summary)
      makes every server-computed prompt slot structurally unoverridable from the
      request body — regression-tested under MEMBER with smuggled fields.
