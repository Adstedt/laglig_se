top_issues:
  - id: REL-001
    severity: medium
    summary: 'Dedupe skips re-embed on content_hash match without verifying embeddings exist. A transient embed failure leaves chunks with NULL embedding + DONE status; same-content re-sync short-circuits, so the file is permanently, silently unretrievable. Documented "retryable via re-sync" recovery does not work.'
    refs: ['lib/chunks/sync-workspace-chunks.ts:86-97']
    suggested_owner: dev
    suggested_fix: 'Skip only when content_hash matches AND no chunk has a null embedding (raw count, since embedding is Unsupported() in Prisma). Add a test for the failed-embed re-sync path.'
  - id: SCOPE-001
    severity: medium
    summary: 'USER_FILE index has no consumer. Only caller of retrieveContext (search-laws.ts:48) hardcodes LEGAL_DOCUMENT; planned consumer story 17.10 (Draft) targets WORKSPACE_DOCUMENT (depends on 17.9b), not USER_FILE. Uploaded-file chunks are write-only — indexed and paid for, never queried.'
    refs: ['lib/agent/tools/search-laws.ts:48', 'docs/stories/17.10.agent-tools-search-read-list.md']
    suggested_owner: po
    suggested_fix: 'Confirm a follow-up adds a USER_FILE search tool (or extend 17.10 scope). Not an AC failure of 17.9 (ACs 10-12 only require the capability), but the index accrues embedding cost with zero retrieval value until then.'
  - id: TEST-001
    severity: low
    summary: 'Read-side cross-tenant isolation (AC 11, highest-risk AC) tested only at SQL-parameter level — $queryRaw is mocked. The actual exclusion of a foreign-workspace USER_FILE row is unproven. Story Task 6 explicitly asked for an integration test against a test DB.'
    refs: ['tests/unit/agent/retrieval.test.ts:261']
    suggested_owner: dev
    suggested_fix: 'Add a row-level integration test against a real test DB before USER_FILE retrieval is activated by a consumer.'

