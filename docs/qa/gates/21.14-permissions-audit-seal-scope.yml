nfr_validation:
  security:
    status: PASS
    notes: 'Four defence layers verified — (1) default-deny via role matrix, (2) tenant isolation via `workspace_id` in the Prisma where-clause, (3) soft-delete guard via `deleted_at: null` filter (test-pinned via toMatchObject assertion), (4) no cache staleness (IV3 pin at authorization.test.ts:258-284 validates two sequential DB hits on lead-auditor demotion). Client-side cannot spoof — runtime override is server-authoritative; the client hook only surfaces the role-based bit. No new attack surface, no hardcoded secrets.'
  performance:
    status: PASS
    notes: 'Single indexed findFirst with `select: { id: true }`. OWNER/ADMIN short-circuit — zero DB cost for the 90%+ majority case. TransactionClient support allows Story 21.9 to call canSealCycle inside the seal transaction without acquiring a separate connection. No caching introduced.'
  reliability:
    status: PASS
    notes: 'Pure functions with explicit Promise<boolean> contract; no throws (Prisma errors propagate to caller). 14/14 authorization test branches exercised. Fail-closed client-hook behaviour preserved automatically via the existing checkPermission helper. Zero-dependency additions.'
  maintainability:
    status: PASS
    notes: 'TODO(21.9) breadcrumb orients future grep. Matrix row + override-note JSDoc self-describe the split of concerns. canSealAuditCycle convenience fn has inline JSDoc calling out the role-only-vs-runtime-composed separation. Test files cross-reference real source files via comments. File header JSDocs document Story 21.14 provenance.'

