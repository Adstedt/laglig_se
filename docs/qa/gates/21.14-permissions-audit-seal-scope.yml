top_issues:
  - id: 'TEST-001'
    severity: low
    finding: 'Wrong-workspace + wrong-user cases in authorization.test.ts (lines 61-88) simulate the behaviour by mocking `findFirst.mockResolvedValue(null)` with standard fixture IDs. Effectively contract tests (does null → false?) rather than real tenant-isolation tests. The `deleted_at` + `select` tests properly assert on the `where` clause contents — full coverage of the query shape is achieved, but by mixing strategies rather than consistently. The `OTHER_USER_ID` / `OTHER_WORKSPACE_ID` / `OTHER_CYCLE_ID` fixtures at the file head are unused; a `void FOO` lint-suppression hack at the file tail (lines 289-291) silences the warning rather than removing them.'
    suggested_action: 'Optional hardening. Extend the wrong-workspace / wrong-user tests to (a) pass `OTHER_WORKSPACE_ID` or `OTHER_USER_ID` as the arg, (b) assert the Prisma findFirst call received `where.workspace_id === OTHER_WORKSPACE_ID` (or lead_auditor_user_id === OTHER_USER_ID). This would let the story use the `OTHER_*` fixtures legitimately and remove the `void FOO` hack. ~10 min; non-blocking.'
    suggested_owner: dev

  - id: 'TEST-DEBT-001'
    severity: low
    finding: 'Test-local `ROLE_PERMISSIONS` maps in `app/actions/__tests__/compliance-audit-cycle.test.ts:79-130` and `app/actions/__tests__/compliance-audit-item.test.ts:68-74` hard-code OWNER + ADMIN without `audit:seal`. Intentional per Dev Debug Log (AUDITOR-focused tests in this story never need the scope). Will drift further from the real ROLE_PERMISSIONS each time `lib/auth/permissions.ts` changes.'
    suggested_action: 'Story 21.9 PR must sync OWNER + ADMIN entries in both test-local maps with `lib/auth/permissions.ts` before adding `sealCycle` happy-path tests (otherwise OWNER/ADMIN seal tests will require a custom `permissions` override on every call). Consider extracting `ROLE_PERMISSIONS` into a shared test helper at that point to prevent further drift.'
    suggested_owner: dev

  - id: 'SEC-NOTE-001'
    severity: low
    finding: 'AUDITOR-who-is-lead-auditor CAN seal via `canSealCycle`. Mechanical consequence of the OR-logic (canSealAuditCycle(role) || isLeadAuditor(...)). Product-deferred per the story''s "Not-in-scope" section with two available fixes (creation-time validation rejecting AUDITOR as lead_auditor_user_id, OR inline `role !== ''AUDITOR''` clause in canSealCycle). Documented; not a defect.'
    suggested_action: 'Story 21.9 reviewer may want to revisit the AUDITOR-as-lead-auditor policy. If Product decides AUDITOR should never seal regardless of lead-auditor status, the fix is 1-2 lines in `canSealCycle` OR a validation in `createCycle` / `updateCycleMetadata`. No action required for 21.14; surfaced for future-review visibility.'
    suggested_owner: po

