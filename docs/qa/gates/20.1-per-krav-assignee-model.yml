nfr_validation:
  security:
    status: PASS
    notes: 'Workspace isolation enforced via withWorkspace + getRequirementWorkspaceContext + direct workspace_id comparison on parent list item. Cross-workspace assignee writes are blocked by an explicit workspaceMember.findFirst check before persist — this is a strengthening over the equivalent law-list-items code path that does not validate membership. Zod UUID validation at the boundary. onDelete:SetNull prevents dangling FK on user deletion. No raw SQL, no string interpolation. Permission gate ''tasks:edit'' is consistent with sibling mutations.'
  performance:
    status: PASS
    notes: 'Write path adds one extra DB query (workspace-member lookup) only when responsibleUserId is set — negligible. Read path (getRequirementsForListItem) adds no new query; parent responsible_user_id is joined into the already-existing findFirst select. No N+1 introduced. Cache invalidation follows existing 3-key pattern.'
  reliability:
    status: PASS
    notes: 'Optimistic-update + revert pattern applied consistently (isFulfilled, bevisRequired, new assignee handler). Toast on error with existing Swedish copy. Graceful prop-absence handling — picker simply does not render when workspaceMembers is undefined or readOnly is true, so sibling surfaces (compliance-detail-table) remain unaffected. ActivityLog branch restructure eliminates the prior pattern where an assignee change could be silently attributed to a text/status action.'
  maintainability:
    status: PASS
    notes: 'resolveEffectiveAssignee is a clean pure function with thorough branch coverage. updateRequirement grew in length but the restructure improved correctness (two independent log branches replace an ambiguous nested ternary). Pre-existing content-action-name nested ternary survives as MNT-001 — flagged for future cleanup, not caused by this story. AssigneeEditor extension is additive: three optional props with JSDoc, default behaviour unchanged for existing call sites (document-list-table), verified by the 25 pre-existing tests continuing to pass.'

