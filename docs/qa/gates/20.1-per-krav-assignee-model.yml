top_issues:
  - id: 'PROC-001'
    severity: low
    finding: 'Task 11 (regression smoke test) is checked [x] in the story but dev completion notes explicitly state the manual browser smoke test was deferred to QA — human verification step still pending before merge to main.'
    suggested_action: 'Story owner runs the modal-level smoke test (create / edit text / toggle fulfilled / toggle bevis_required / add comment / reorder / link+unlink evidence / delete + new assignee picker paths) on a running dev server before merge.'
    suggested_owner: dev
  - id: 'TEST-001'
    severity: low
    finding: 'Frontend optimistic-update + revert flow in KravpunktRow (AC 11) has no React Testing Library coverage — only the server-side effect (updateRequirement writes responsible_user_id) is tested. On error, the toast + revert path is un-asserted.'
    suggested_action: 'Follow-up: add RTL test that mocks updateRequirement to fail, renders KravpunktRow with a workspaceMembers prop, triggers assignee change via the AssigneeEditor, asserts row state reverts and toast fires.'
    suggested_owner: dev
  - id: 'TEST-002'
    severity: low
    finding: 'AC 12 "Återställ till lagansvarig" visibility logic (only shown when effectiveAssignee.isInherited === false) has no DOM-level assertion — only the server effect of null-clear is tested.'
    suggested_action: 'Follow-up: add RTL test asserting the reset item is rendered with showResetOption=true and absent with showResetOption=false.'
    suggested_owner: dev
  - id: 'UX-001'
    severity: low
    finding: 'On inherited rows, selecting "Ej tilldelad" from the dropdown sends onChange(null) — which maps to updateRequirement({responsibleUserId: null}) — which is already the krav''s stored state (null = inherit). Net effect: a no-op round trip. Not a bug (no data corruption, no incorrect log due to value-unchanged suppression), but confusing semantics: the user may expect "Ej tilldelad" to truly clear the assignee, not stay inherited.'
    suggested_action: 'Future refinement: either (a) hide "Ej tilldelad" from rows where variant="inherited", or (b) treat it as "break inheritance + assign-to-nobody" which requires a different backend semantic. Decide product direction before adding more surfaces that consume the picker.'
    suggested_owner: po
  - id: 'MNT-001'
    severity: low
    finding: 'updateRequirement is now ~150 lines with a 4-level nested ternary for content-action-name picking. The dev''s restructure (separating assignee + content log branches) improved correctness but the content branch''s action-name logic is pre-existing complexity that would benefit from extraction.'
    suggested_action: 'Future cleanup: extract `pickContentActionName(parsed, existing)` as a pure helper with its own unit tests. Not blocking — pre-existing debt.'
    suggested_owner: dev

