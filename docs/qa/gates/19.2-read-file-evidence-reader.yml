top_issues:
  - id: READ-001
    severity: medium
    status: deferred
    resolution: 'review-qa 2026-05-24 — deferred to Story 19.9 (structural). The fix is to isolate heavy PDFs in the DocumentReader subagent so base64 never enters the main agent context; lowering the native-PDF threshold would degrade medium-PDF read quality without solving it, so no 19.2 patch applied. Bounded today by the 10 MB / 5 MB caps.'
    summary: 'A read_file PDF/image is returned as a base64 tool_result, which persists in the conversation and is re-sent (uncached — cacheControl is on the system prompt, not tool results) on every subsequent step of the stepCountIs(10) loop. A 10 MB PDF read early in a long loop multiplies request size/cost. Bounded by the 10 MB PDF / 5 MB image caps; not a correctness defect.'
    refs: ['lib/agent/tools/read-file.ts', 'lib/agent/file-content.ts']
    suggested_owner: dev
    suggested_fix: 'Story 19.9 DocumentReader / read_and_answer isolates heavy PDFs in a subagent so the base64 never enters the main agent context.'
  - id: READ-002
    severity: low
    status: wont_fix
    resolution: 'review-qa 2026-05-24 — by design. Making contentKind exact would force `execute` to download, defeating the AC-6 lean-envelope invariant (no base64 in the audit log). The envelope is an explicit UI/log hint; the model content (toModelOutput) is authoritative.'
    summary: 'contentKind in the lean execute envelope is classified from MIME+size only and can drift from the actually-delivered content (e.g. a PDF ≤10 MB whose download fails in toModelOutput is delivered as text, but the envelope says "pdf"). Cosmetic.'
    refs: ['lib/agent/file-content.ts', 'lib/agent/tools/read-file.ts']
    suggested_owner: dev
  - id: READ-003
    severity: low
    status: resolved
    resolution: 'review-qa 2026-05-24 — toModelOutput error branch now relays `${message}\n${guidance}`; +1 unit test (guidance relay).'
    summary: 'toModelOutput error-relay forwarded only the wrapToolError `message`, dropping `guidance` ("använd search_workspace_files"). Including the guidance helps the agent self-recover from a bad fileId.'
    refs: ['lib/agent/tools/read-file.ts']
    suggested_owner: dev
  - id: READ-004
    severity: low
    status: deferred
    resolution: 'review-qa 2026-05-24 — not closable in 19.2 code (needs 19.4 to surface non-text file ids, or a live env). Provider support + the image-data path are unit-tested. Live-verify when 19.4 lands.'
    summary: 'Image path (toModelOutput → image-data) is provider-supported + unit-tested but not live-smoked, and unreachable via the agent loop today (search_workspace_files is text-based, so a no-OCR image has no surfaced fileId).'
    refs: ['lib/agent/tools/read-file.ts']
    suggested_owner: dev
    suggested_fix: 'Live-verify once 19.4 (list_linked_artifacts) surfaces file ids regardless of text; or one-off Path-B script against real storage.'
  - id: READ-005
    severity: low
    status: resolved
    resolution: 'review-qa 2026-05-24 — added a `default: return { type: "text", value: "[Fil: kunde inte läsas]" }` after the toModelOutput switch; a future ResolvedFile kind degrades gracefully instead of returning undefined.'
    summary: 'No defensive fallback return after the toModelOutput switch over ResolvedFile.kind. Exhaustive today (tsc passes); a future ResolvedFile variant would have silently returned undefined to the SDK.'
    refs: ['lib/agent/tools/read-file.ts']
    suggested_owner: dev

nfr_validation:
  security:
    status: PASS
    notes: 'Workspace isolation on BOTH paths (classify in execute, resolve in toModelOutput) via findFirst({ where: { id, workspace_id } }); cross-tenant fileId → wrapToolError, no bytes read (unit-tested). No per-file ACL beyond workspace membership exists in this schema, so reading any workspace file via the agent is consistent with the file model — no escalation path. No raw @anthropic-ai/sdk; the pdfs-2024-09-25 beta is auto-added by the provider (same path 19.1 PDFs already use), not a manual beta header.'
  performance:
    status: CONCERNS
    notes: 'See READ-001 — base64 tool-result persists + re-sends across loop steps; bounded by size caps, designed fix in 19.9. execute is download-free (cheap classify); toModelOutput does ONE download for the bytes (no double-download; only a second cheap indexed findFirst). On-demand extraction (inherited from 19.1) runs synchronously inside toModelOutput for a not-yet-extracted DOCX/large-PDF — adds latency to that step.'
  reliability:
    status: PASS
    notes: 'toModelOutput wraps IO in try/catch → text-note fallback so the model always receives something; error-envelope short-circuit avoids a needless re-resolve; workspace-scoped, never throws a 403. Fail-safe decision-log wrapper (19.5) covers the execute call.'
  maintainability:
    status: PASS
    notes: 'Strong DRY refactor — routing core extracted to lib/agent/file-content.ts and shared by both the 19.1 converter (user-message parts) and read_file (tool-result parts); the two differ only in output mapping. Compile-enforced read-tier policy entry; 10 focused tests. Minor: READ-005 (no exhaustive guard).'

