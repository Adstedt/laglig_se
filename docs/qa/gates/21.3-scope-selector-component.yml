nfr_validation:
  security:
    status: PASS
    notes: >-
      Client-only component, no mutations. Reads via server actions that are already
      `withWorkspace(..., 'read')`-gated (verified at `app/actions/document-list.ts:372,1385`).
      User input (item titles, group names) auto-escaped via React JSX rendering — no dangerouslySetInnerHTML.
      No PII or secrets handled. No new external deps introduced.
  performance:
    status: PASS
    notes: >-
      500-item mount: 560ms (jsdom isolated), ~1600ms (jsdom under full-suite concurrency),
      real-browser target <500ms. Well under Epic 21 NFR5 budget (no /laglistor degradation — this
      component lives on a separate route). useMemo caches grouped data; deriveScope is O(n) per
      render but n≤500 bounded. Virtualisation deliberately deferred per story — lightweight rows
      did not warrant it.
  reliability:
    status: PASS
    notes: >-
      Controlled-mode feedback-loop guard (userDrivenRef) explicitly prevents onChange emissions
      on value-prop changes — verified by 2 dedicated tests. Empty-selection guard prevents invalid
      {kind:'items', itemIds:[]} / {kind:'groups', groupIds:[]} emissions (rejected by 21.2 Zod schema
      at `app/actions/compliance-audit-cycle.ts:87,91`). Error state has explicit "Försök igen" retry
      button that calls SWR mutate(). Loading state uses Skeleton primitives.
  maintainability:
    status: PASS
    notes: >-
      Pure helpers (getItemState/getGroupState/getMasterState/deriveScope/formatScopeSummary/
      resolveInitialSelection/buildGroupedData) exposed via `__private` export for direct unit testing
      without mounting — each is ≤30 lines and has 2+ dedicated test cases. JSDoc on every helper and
      the component explains the "why". Design language reuses app modal tokens (`rounded-lg border
      bg-card p-4 shadow-sm`). Barrel re-export + type-only import of `ScopeDefinition` from Story 21.2
      prevents type duplication — respects the PO's Critical fix from story v0.2.

