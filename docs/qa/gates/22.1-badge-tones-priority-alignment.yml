    evidence:
      - file: components/ui/badge.tsx
        lines: '47-78'
        finding: 'cva config has tone (5 values) + variant axes; compoundVariants populated programmatically from BADGE_TONES via flatMap (15 cells). Default variant retained as legacy "default". JSDoc steers status/priority/severity callers to the tone API.'
      - file: tests/unit/components/ui/badge.test.tsx
        lines: '17-39'
        finding: 'All 15 tone × variant cells render with the expected BADGE_TONES class string (parameterised via TONES × VARIANTS const arrays).'
    observation: 'No `whitespace-nowrap` baked into base classes (consumer decides) — confirms AC sub-bullet.'

  AC_2_token_module_created:
    status: PASS
    evidence:
      - file: lib/ui/badge-tones.ts
        finding: '232 lines. Exports Tone, Variant, BADGE_TONES, BADGE_TONES_LIGHT (analogue retained for future use), STATUS_DOMAINS, getStatusBadgeProps, getPriorityBadgeProps, PriorityValue. Uses `as const` array + indexed-type pattern per project standard.'
      - file: tests/unit/lib/ui/badge-tones.test.ts
        finding: 'Exhaustive enum coverage: 5 compliance + 5 cycle + 5 document + 2 severity + 3 type + 4 priority = 24 enum cases pinned. Plus fallback case + TONES/VARIANTS shape pins.'
    note: 'Project Structure decision deferred from story authoring (lib/ui/ vs lib/utils/) was resolved as lib/ui/ — reserves namespace for future UI-token modules (filter-chip-tokens, page-header-tokens, etc).'

  AC_3_compliance_status_migrated:
    status: PASS
    evidence:
      - file: components/features/document-list/table-cell-editors/compliance-status-editor.tsx
        finding: 'Trigger pill + each SelectItem render via <Badge {...getStatusBadgeProps("compliance-status", value)} />. OPTIONS array stripped of .color and .strikethrough fields (now { value, label, tooltip }).'
      - file: components/features/document-list/compliance-filters.tsx
        finding: 'STATUS_FILTER_OPTIONS populator uses getStatusBadgeProps to compute tone/variant per option (drops legacy .color pass-through).'
      - file: components/ui/filter-popover.tsx
        finding: 'FilterOption shape migrated: tone/variant added; default renderer wraps option label in <Badge tone variant>; .color retained as free-form pass-through for `renderOption` callers (Tasks hex-color column-status case).'
      - file: components/features/compliance-audit/cycle-detail/cycle-items-tab.tsx (line 305-319)
        finding: 'Status pill render migrated; uses getStatusBadgeProps directly off the row value.'
      - file: components/features/compliance-audit/cycle-item-modal/right-panel.tsx (line 247-258)
        finding: 'Same migration pattern.'
    observation: 'Story scoped Task 3 to only the editor file, but IV4 grep guard required full-tree migration of downstream `.color` consumers. Dev expanded scope correctly + flagged it transparently in completion notes.'

  AC_4_cycle_status_migrated:
    status: PASS
    evidence:
      - file: components/features/compliance-audit/cycle-detail/cycle-status-badge.tsx
        finding: 'STATUS_VARIANTS map deleted; <Badge tone variant data-status> wrapper from cycle-status domain map. data-status preserved for any e2e selector dependency.'
