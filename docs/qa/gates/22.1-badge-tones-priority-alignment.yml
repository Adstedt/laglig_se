      - helper_tests: '34 tests in tests/unit/lib/ui/badge-tones.test.ts — 24 enum mappings + fallback case + TONES/VARIANTS shape pins. Story specced minimum 24 enum cases.'
      - touched_component_test_updates: '8 tests across 3 existing test files updated to assert on tone-class strings (sourced from BADGE_TONES, not literal class strings — pinned to the shared map so future tweaks don''t require test changes).'

  AC_10_existing_test_updates:
    status: PASS
    evidence:
      - cycle_status_badge: 'Updated to assert tone classes via BADGE_TONES[tone][variant].split. Test names retained but assertion mechanism upgraded.'
      - compliance_status_editor: 'Strikethrough test rewritten as outline-tone test (intentional visual delta — outline conveys "set apart" instead of strikethrough decoration).'
      - document_status_badge: 'APPROVED + SUPERSEDED tests updated to assert success-soft / neutral-outline tone classes respectively.'
      - priority_editor: 'Existing test passed without modification (asserts on label rendering, not class strings — robust to migration).'

