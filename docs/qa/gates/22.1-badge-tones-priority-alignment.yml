    note: 'Acknowledged visual delta: Utkast (was solid `bg-secondary`) and Under granskning (was solid `bg-primary`) become soft-tone pills. Aligns Styrdokument with the rest of the app per epic DoD.'

  AC_6_finding_pills_migrated:
    status: PASS
    evidence:
      - file: components/features/compliance-audit/finding-card.tsx
        finding: 'TypeBadge + SeverityBadge migrated. Per-type icon prefix preserved (AlertTriangle / Eye / Lightbulb), wrapped in <Badge tone variant>. Filter chips on cycle-findings-tab.tsx untouched (Story 22.2 territory) — confirmed by grep.'
    observation: 'Story AC 6 originally listed severity values as KRITISK / STORRE / MINDRE; actual Prisma enum is MAJOR | MINOR. Dev corrected the badge-tones map to use the real enum keys (with Swedish display labels Större/Mindre via FINDING_SEVERITY_LABELS precedent). Story author intent preserved; enum reality reflected.'

  AC_7_priority_editor_unified:
    status: PASS
    evidence:
      - audit_finding: 'Confirmed parallel TASK_PRIORITY_OPTIONS in components/features/tasks/task-workspace/list-tab.tsx with HIGH=bg-orange-100/text-orange-700 (vs Laglistor''s bg-rose-100/text-rose-700) and MEDIUM=bg-blue-100/text-blue-700 (vs Laglistor''s bg-amber-100/text-amber-700). The audit-found drift.'
      - resolution: 'Both surfaces now route through the canonical components/features/document-list/table-cell-editors/priority-editor.tsx — single function definition site (verified: grep returns one export). Editor accepts `options` prop for the 4-value Tasks list (incl. CRITICAL).'
      - file: lib/ui/badge-tones.ts
        finding: 'getPriorityBadgeProps handles all 4 values: CRITICAL → danger+solid, HIGH → danger+soft, MEDIUM → warning+soft, LOW → neutral+soft. Single mapping shared by Laglistor (LOW/MEDIUM/HIGH) and Uppgifter (LOW/MEDIUM/HIGH/CRITICAL).'

  AC_8_medium_relabel:
    status: PASS
    evidence:
      - finding: 'Swept across 10 files: task-creation-form, create-task-modal, all-work-tab, task-filters-toolbar, bulk-action-bar, task-modal/{details-box,right-panel-rail,status-priority-badges}, summary-tab, notify-weekly-digest cron. DB enum stays English (MEDIUM); only display label is Swedish (Medel).'
      - verification: 'Final grep: 0 priority-context "Medium" label literals remaining.'

  AC_9_test_coverage:
    status: PASS
    evidence:
