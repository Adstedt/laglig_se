story: '24.3'
story_title: 'Import — matching engine (fuzzy + LLM)'
gate: CONCERNS
status_reason: |
  All 24 ACs functionally met or vacuously satisfied. Implementation is
  uniformly high quality: open-set agency capture works end-to-end, EU
  dual-format storage is bridged via Branch B suffix-match, live benchmark
  hits 100% aggregate MATCHED_HIGH at the spec-required cost (~$0.20/run).
  The dev's AC 14 spec-correction (ChatUsageEvent.context_type is the
  ChatContextType enum, not a String) was caught and resolved cleanly with
  an additive enum migration. Gate is CONCERNS — not PASS — because of one
  real AC↔test alignment gap: AC 18 requires "0 false positives at MATCHED_HIGH
  across the entire fixture" but the benchmark test only enforces fp=0 on
  AFS and EU subsets, and the live run had 1 high-tier false-positive on
  the PREFIX_MISMATCH subset. Three additional low-severity items round out
  the gate. None blocking; all are tightening recommendations rather than
  rework requests.
reviewer: 'Quinn (Test Architect)'
updated: '2026-05-07T12:00:00Z'

waiver: { active: false }

top_issues:
  - id: 'TEST-001'
    severity: medium
    finding: |
      AC 18 + the Testing-section coverage target both state: **"0 false
      positives at high tier across the entire fixture"**. The benchmark
      test at `tests/integration/lib/import/matcher.benchmark.test.ts:160-170`
      only asserts `high_tier_false_positives === 0` for the AFS and EU
      subsets — there is no fixture-wide fp=0 assertion. Live benchmark
      empirically hit **1 false-positive at high tier** on the
      PREFIX_MISMATCH subset (3/3 rows landed HIGH but only 2/3 had the
      correct doc_id). Because the test passes, the regression went
      uncaught against an AC that explicitly bans it.
    suggested_action: |
      Add one fixture-wide assertion to the benchmark test:
      ```ts
      const totalFp = Object.values(statsBySeries)
        .reduce((sum, s) => sum + s.high_tier_false_positives, 0)
      expect(totalFp).toBe(0)
      ```
      That will fail on the current matcher behavior on the prefix-mismatch
      subset. Fix path: see DESIGN-001 — Branch-B-only matches arguably
      should never high-tier. Either (a) cap suffix-only matches at MEDIUM
      tier in match-candidates.ts (cleaner semantics), or (b) update AC 18
      to allow PREFIX_MISMATCH fp specifically (acknowledges that ambiguous
      input can't be uniquely resolved). (a) is safer for users.
    suggested_owner: dev
  - id: 'DESIGN-001'
    severity: low
    finding: |
      The matcher gives HIGH tier on Branch-B-only matches (suffix match
      with prefix mismatch). Semantically, a suffix-only match means the
      user wrote an ambiguous id ("2020:5") and the matcher is guessing
      which series. Confidence should reflect that uncertainty. Current
      scoring caps Branch B at +0.4 (suffix bonus) + 0.2 (series hint) +
      0.6 × trgm = max 1.0 — so a high trigram score on a wrong-prefix
      candidate can push the total above 0.85 (HIGH tier).
    suggested_action: |
      In `lib/search/match-candidates.ts:226-235`, downgrade Branch-B-only
      results to a max of 0.84 when `document_number_exact === false &&
      document_number_suffix_match === true`. Preserves the user's
      ability to commit the medium match via 24.4's review surface, but
      prevents auto-accept on ambiguous input. ~3-line change. Pair with
      a unit test asserting the cap.
    suggested_owner: dev
  - id: 'TEST-002'
    severity: low
    finding: |
      AC 20 specifies "Assert `ChatUsageEvent` rows written for each LLM
      call" in the runMatching integration test. The current test at
      `tests/integration/app/actions/law-list-import.test.ts` mocks
      `matchRowsBatch`, so the real telemetry-write path inside
      `matchRow` is never exercised. The benchmark test (real LLM) doesn't
      explicitly assert ChatUsageEvent rows either — only the cleanup
      `deleteMany` reveals expectation that rows would have been written.
    suggested_action: |
      Two cleaner options: (a) add a small unit test for `writeUsageEvent`
      directly with a mocked Prisma client + spied estimateCostUsd; verifies
      the contract without needing a real LLM call. (b) extend the
      benchmark test to count ChatUsageEvent rows after the run and assert
      `count === 50 - shortCircuited` where shortCircuited is the count of
      rows that hit Stage-1 short-circuit (no LLM call). (a) is simpler and
      doesn't depend on benchmark cost. ~15 lines.
    suggested_owner: dev
  - id: 'TEST-003'
    severity: low
    finding: |
      Defensive contradiction guard missing: if the LLM returns
      `chosen_document_id: null` AND `confidence >= 0.5`, the matcher
      currently propagates that as MATCHED_HIGH/MEDIUM with `null` doc_id
      — confusing for the review UI (a "high-confidence non-match"). The
      system prompt instructs the LLM to use `confidence < 0.5` when
      doc_id is null, but there's no code-level enforcement against
      instruction violation.
    suggested_action: |
      In `lib/import/matcher.ts:215-228` (the `matchRow` Stage-2 final
      return), add: `if (llmResponse.chosen_document_id === null &&
      llmResponse.confidence >= MEDIUM_TIER_THRESHOLD) { ...force tier=
      'unmatched' and score=0... }`. Add a unit test sending the
      contradictory shape via the mocked LLM and asserting the matcher
      forces unmatched. ~10 lines.
    suggested_owner: dev
  - id: 'PERF-001'
    severity: low
    finding: |
      AC 5 mandates `findMatchCandidates` <500ms p95 on a ~10k-doc
      catalog. No automated benchmark verifies this. Live runs of the
      50-row matcher benchmark hit ~80s total, meaning per-row matcher
      latency averages ~1.6s (network-dominated by Anthropic). The
      database-only retrieval is sub-second on the live ~10k catalog
      (verified during dev), but no test guards against future regression
      (e.g., if someone removes the GIN index, the full-table-scan would
      be silent until production query-plan analysis).
    suggested_action: |
      Add one performance smoke test: query `findMatchCandidates` 5 times
      against the live test DB and assert max latency < 500ms. Gated like
      the benchmark on env (skip when DATABASE_URL points at sqlite or
      similar). ~25 lines. Defensible to defer; the query plan is
      defensively correct today and pg_trgm regressions are loud.
    suggested_owner: dev

