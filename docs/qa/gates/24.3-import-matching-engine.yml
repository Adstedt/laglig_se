# Positive observations from the review
notes:
  - |
    Open-set agency support is genuinely robust. The synthetic
    `ZZFS 2030:1` unit test plus the 6/6 AFS + 3/3 OTHER_AGENCY benchmark
    hits prove end-to-end that the matcher handles new agencies without
    code change — exactly the property the v0.4 PO revision asked for.
    EU dual-format storage (the Task 0 finding) is bridged cleanly via
    `enumerateAltCanonicalForms` + Branch B's stripped-zeros suffixMatches.
  - |
    The AC 14 spec-correction handling is exemplary. Dev grepped the
    schema during implementation, found the AC's claim was wrong, created
    an additive migration, documented the correction in the Change Log,
    and the user applied it. PO → Dev → QA loop functioning as designed
    when the spec is wrong.
  - |
    Live-benchmark cost matches the worked AC 10 estimate: ~$0.20 for 50
    rows = ~$0.004/row. This is the empirical proof that prompt caching
    is working correctly across calls within the 5-min ephemeral TTL.
  - |
    The matcher's hallucination gate (rejecting `chosen_document_id` not
    in candidates) is the right shape — guards against the model
    inventing IDs under structured-output instructions. Combined with the
    1-retry-then-unmatched fallback, it surfaces silently-bad LLM
    behavior as UNMATCHED rather than as plausible-looking wrong
    matches. TEST-003 would extend this to one more contradiction case.

