  ac_trace_details:
    ac_2_open_set: |
      Verified: 44 unit tests cover 15 named agency prefixes (AFS, MSBFS,
      BFS, SSMFS, ELSÄK-FS, NFS, SRVFS, KIFS, MCFFS, SCB-FS, STAFS, SKVFS,
      HSLF-FS, SOSFS, TSFS) plus a synthetic `ZZFS 2030:1` open-set proof.
      Live benchmark adds end-to-end verification: 6/6 AFS + 3/3
      OTHER_AGENCY all match correctly.
    ac_4_three_branches: |
      Verified by code read at `lib/search/match-candidates.ts:152-243`.
      Branch A: targeted findFirst with `enumerateAltCanonicalForms`
      (probes EU dual-format including CELEX). Branch B: `suffixMatches`
      after parsing both sides; +0.4 boost. Branch C: 0.6 × trgm + 0.2 ×
      suffix + 0.2 × series_inferred_match, capped at 1.0. Live benchmark
      confirms all three branches function: SFS exact-match (Branch A) hits
      30/30; EU dual-format (Branch A via alt-canonical) hits 4/4;
      PREFIX_MISMATCH suffix-match (Branch B) hits 3/3 medium-or-higher.
    ac_8_llm_prompt: |
      Verified: candidate display string at `matcher-prompt.ts:46` uses
      `${c.document_number ?? c.content_type}` — correct schema names per
      the Story 24.2 catalog verification. Swedish prose acknowledges
      agency + EU forms explicitly, not just SFS.
    ac_14_spec_correction: |
      Story AC 14 claimed `ChatUsageEvent.context_type` is a String. Dev
      grepped the schema during implementation and found it's actually the
      Prisma enum `ChatContextType`. Created additive migration
      `20260507140000_add_import_matching_chat_context` extending the
      enum with `IMPORT_MATCHING`. **User applied** during dev. Code uses
      `ChatContextType.IMPORT_MATCHING` correctly via the regenerated Prisma
      client. The spec was wrong; the dev's correction is right.
    ac_18_fp_gap: |
      AC 18 says "0 false positives at high tier across the entire fixture"
      (also restated in the Testing-section coverage target). Test only
      enforces fp=0 per AFS + EU subsets. Live run had 1 fp on
      PREFIX_MISMATCH (1 of 3 prefix-stripped rows landed HIGH on a
      different agency's record — semantically ambiguous input). See
      TEST-001 + DESIGN-001 for the recommended fix.

nfr_validation:
  security:
    status: PASS
    notes: |
      LLM hallucination gate present (matcher.ts:269-275): rejects
      `chosen_document_id` not in the candidates list, retries once, falls
      through to unmatched. Telemetry write is fail-safe try/catch +
      `[CHAT_USAGE_EVENT_WRITE_FAIL]` console.error per Story 14.27
      convention. Anthropic SDK is server-only (action wrapped in
      `withWorkspace(cb, 'tasks:edit')`). `prisma.$queryRaw` in
      match-candidates.ts uses tagged-template parameterisation throughout
      — no SQL injection surface. No PII handling beyond the title +
      doc-number fields the user already typed. API key read from env;
      not logged.
  performance:
    status: PASS
    notes: |
      pg_trgm GIN index in place (verified by user-applied migration).
      `findMatchCandidates` does a single targeted findFirst + a single
      bounded $queryRaw — bounded at TRIGRAM_POOL=20 results. matchRowsBatch
      uses `p-limit(10)` to cap concurrency, which respects the ~50 RPM
      Sonnet rate limit (10 concurrent × ~3s avg ≈ 200 RPM peak handled by
      the 429 backoff). Live benchmark for 50 rows: ~80s = ~1.6s/row
      including LLM round-trip. Within user-tolerable range for an
      explicit "Run matching" action. PERF-001 flags the lack of an
      automated <500ms findMatchCandidates p95 test — defensible to defer.
  reliability:
    status: PASS
    notes: |
      Comprehensive failure-mode coverage: Anthropic API down → flip back
      to UPLOADED for retry; LLM parse failure → 1 retry then mark row
      UNMATCHED with Swedish reasoning; >50% hard-failed rows → flip
      import to FAILED + log matching_failed; 429 rate-limit → exponential
      backoff up to 3 retries. Idempotency guard refuses re-run when
      status !== UPLOADED. Telemetry writes are fail-safe (action
      continues even if telemetry insert fails). All four paths verified
      by integration tests.
  maintainability:
    status: PASS
    notes: |
      `parseDocumentNumber` is a clean state machine — 8 patterns tried
      in order, first match wins, exhaustive JSDoc explaining each. The
      Task 0 catalog-format finding is documented inline so future devs
      see why EU is dual-form. Three-branch scoring in match-candidates.ts
      is well-commented with branch labels in code AND in the file's
      module doc-comment. The `enumerateAltCanonicalForms` helper for EU
      bridging is a self-documenting name. Matcher's hallucination gate
      is explicit in code. The benchmark fixture is regenerable from a
      committed script with documented per-series quotas. Minor maintainability
      note: matcher.ts at 353 lines is approaching the size where extracting
      the LLM-call path to a sub-module would aid readability — but it's
      not crowded yet.

