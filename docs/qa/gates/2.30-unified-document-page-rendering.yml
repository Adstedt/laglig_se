top_issues:
  - id: 'WORKSPACE-FORESKRIFTER-STATUS'
    severity: low
    summary: >
      Public foreskrifter page only maps ACTIVE → green; workspace variant
      additionally handles REPEALED. A repealed föreskrift would render with
      no status badge on the public route.
    refs:
      - 'app/(public)/foreskrifter/[slug]/page.tsx:119'
    suggested_owner: dev
  - id: 'DUPLICATED-STATUS-RESOLVER'
    severity: low
    summary: >
      resolveStatusBadge helper is identical between app/(public)/lagar/[id]/
      page.tsx and app/(workspace)/browse/lagar/[id]/page.tsx. Small lift into
      a shared helper (e.g. lib/document-themes.ts or document-hero.tsx) would
      eliminate drift risk.
    refs:
      - 'app/(public)/lagar/[id]/page.tsx:222-242'
      - 'app/(workspace)/browse/lagar/[id]/page.tsx:156-176'
    suggested_owner: dev
  - id: 'LINK-REWRITE-DUPLICATION'
    severity: low
    summary: >
      rewriteLinksForWorkspace is called inside both DocumentContent (htmlContent
      branch) and LawDocumentContent (children branch). Consider either threading
      a rewriter prop through the children branch or factoring the hook into a
      shared util to eliminate the duplicated useMemo.
    refs:
      - 'components/features/document-content.tsx:40-43'
      - 'components/features/law/law-document-content.tsx:45-48'
    suggested_owner: dev

