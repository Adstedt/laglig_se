top_issues:
  - id: 'DEBT-003'
    severity: low
    finding: 'Mutation action + logActivity execute as two separate Prisma calls, not inside `$transaction`. If `logActivity` fails (Postgres connection hiccup, etc.), the cycle-item row is updated but the audit trail is missing. Identical to Story 21.2 DEBT-002. Project-wide pattern across `app/actions/*.ts`; NOT a 21.5 regression.'
    suggested_action: 'Future consistency sweep across all server-actions: wrap mutation + log in a single `prisma.$transaction`, OR make the trade-off explicit in `docs/architecture/17-coding-standards.md`. Do NOT fix in isolation for 21.5 — would drift from the rest of `app/actions/` (law-list-item-requirements.ts, compliance-audit-cycle.ts, tasks.ts all follow the same shape).'
    suggested_owner: sm

  - id: 'DEV-001'
    severity: low
    finding: 'AC 5 column 1 specifies that clicking a row''s law title opens the source law in a new tab at `/laglistor?law=${lawListItemId}` via an existing query-param modal-opening contract. That pattern does not exist in the codebase — `/laglistor` uses internal state (not URL params) for modal opening. Dev pragmatically linked to `/laglistor` (main page, new tab) and documented the deviation. Functional, but the user lands on the main laglistor page and has to find the item manually rather than opening the modal directly.'
    suggested_action: 'Either (a) accept the current fallback and mark AC 5 col 1 as intentionally relaxed in Story 21.5''s completion notes (already done), or (b) spin a follow-up story to wire a proper `?law=...` (or `?listItem=...`) query-param handler on `/laglistor` that opens `LegalDocumentModal` directly. The modal infrastructure exists; only the URL-param entry point is missing. If (b), also update Story 21.5''s row title link to use the new URL shape. Not urgent — user has a navigable path today.'
    suggested_owner: po

  - id: 'DEV-002'
    severity: low
    finding: 'AC 1 specifies that not-found cycles redirect to `/laglistor/kontroller`. The implementation redirects to `/laglistor/kontroller/skapa` instead, because `/laglistor/kontroller` (the list page) does not exist yet per the story''s explicit "not-in-scope" guardrail. Deviation from AC 1''s literal wording, but matches the real route tree — the alternative would be redirecting to a 404.'
    suggested_action: 'Accept the current fallback. When a cycle-list page eventually ships (no current backlog story), update this redirect target. Until then, `/skapa` is the closest valid destination — users who navigate to a stale cycle ID get pushed into cycle-creation, which is a reasonable recovery action.'
    suggested_owner: po

