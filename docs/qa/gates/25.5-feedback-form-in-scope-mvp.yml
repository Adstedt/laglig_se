nfr_validation:
  security:
    status: PASS
    notes: 'Server action wrapped in withWorkspace (workspace-self-write only). Server-side validation on sentiment + email regex. Defence-in-depth slice-to-500 on message. No XSS surface (React Email + Tailwind, no dangerouslySetInnerHTML). No SQL injection (Prisma + structured payload). No PII concerns (privacy posture surfaced in RIGHT-column context card). No new auth surface, no new env-var required (PRODUCT_FEEDBACK_NOTIFICATION_EMAIL is optional override with dev@laglig.se fallback). Minor NIT: pre-auth validation could disclose validation rules to unauthenticated callers — captured as future polish, NEGLIGIBLE impact since messages reveal nothing beyond the UI.'
  performance:
    status: PASS
    notes: 'Single Prisma query per submit (user.findUnique). One sendEmail call (Resend with built-in retry-backoff). No N+1, no double-fetches. React Email component invoked only at send time (server-only — does not ship to client). Bundle delta ~270 LOC client + ~100 LOC email + ~70 LOC action append — well within tree-shaking budget. No new SWR caches, no new polling intervals. Form is event-driven (no mount-fire useEffects) so no StrictMode-double-fire concerns.'
  reliability:
    status: PASS
    notes: 'Fail-safe pattern correctly implemented: event write before email, email failure logged ([PRODUCT_FEEDBACK_EMAIL_FAIL]) + swallowed, action returns {ok: true} regardless. Verified by the "email-transport failure" test case (mockSendEmail.mockRejectedValueOnce). Matches existing pattern (Story 14.27 + 24.5). User-facing UX is graceful — failed submit toast + field preservation, no spinner-stuck state.'
  maintainability:
    status: PASS
    notes: 'Clean code, no dead exports, kebab-case + project-structure compliant, docstrings explain WHY (scope framing) not WHAT. Tests cleanly isolated via vi.mock. Arch doc (§5.2 + §7.1 + §14) updated inline in the same PR so code-truth and doc-truth stay aligned — mirrors Story 25.4 Task 11 precedent. Two test-mock additions (mockUserFindUnique + mockEmailComponent sentinel pattern) are reusable for future product-feedback-surface stories.'

recommendations:
  immediate: []
  future:
    - action: 'Move input validation INSIDE withWorkspace for pattern consistency'
      refs: ['app/actions/onboarding-modal.ts:222-232']
      severity: low
      reason: 'Other 5 actions in this file validate inside the wrapper. Pre-auth validation could theoretically disclose validation rules to unauthenticated callers probing the Server Action endpoint. Realistic information leak: NEGLIGIBLE (rules are also visible in the UI), but moving validation inside makes the pattern uniform. Trade-off: one extra DB roundtrip on obviously-invalid input.'
    - action: 'Add a test that asserts the RIGHT-column privacy disclosure copy'
      refs: ['tests/unit/components/features/onboarding-modal/feedback-step.test.tsx']
      severity: low
      reason: 'The privacy note ("Vi sparar din e-post, ditt meddelande... Inga session-IDs, ingen analytik.") carries a GDPR-adjacent user-facing surface. If accidentally rewritten or removed during a future polish pass, no current test would fail. A 1-line `expect(screen.getByText(/Inga session-IDs/)).toBeInTheDocument()` would lock the invariant.'
    - action: 'Verify Feedback tab works unchanged after B.6 ships tutorial_only mode'
      refs: ['components/features/onboarding-modal/feedback-step.tsx']
      severity: low
      reason: 'Form is mode-agnostic — no FAB-mode-specific code needed. Should be a no-op once B.6 lands the FAB / Hjälp re-entry, but worth a manual confirmation walkthrough.'

