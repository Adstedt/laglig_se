nfr_validation:
  security:
    status: PASS
    notes: |
      Admin-session gate at every action entry (`getAdminSession()` /
      `getAdminUser()`). Cross-cutting Epic 24 convention honoured — no
      `CREATE POLICY` block; admin actions get cross-workspace access via
      Prisma's BYPASSRLS role. Zod validation on every input
      (`FulfillCatalogRequestSchema`, `RejectCatalogRequestSchema`,
      `ListCatalogRequestsSchema`). LegalDocument id is validated via
      `findUnique` before being attached to the request — no arbitrary id
      injection possible. Workspace-scoped isolation for non-admin paths
      remains in place via `withWorkspace` (untouched by this story).
  performance:
    status: PASS
    notes: |
      `listPendingCatalogRequests` runs two parallel queries (`Promise.all`
      with the filtered list + the unfiltered window for counts). The
      counts query selects only `status` + `created_at` — minimal payload.
      Sidebar pip uses SWR with `revalidateOnFocus: false` and 60s refresh,
      so admins flipping windows don't hammer the DB. No N+1 patterns.
      `fulfillCatalogRequest` is a single 2-row transaction (request flip
      + row rematch) — fast. Activity-log write is outside the transaction
      (already-committed), which is the right call: a failed activity-log
      insert shouldn't roll back a successful fulfilment.
  reliability:
    status: PASS
    notes: |
      Idempotency on both fulfilment (re-fulfilling FULFILLED → no-op,
      no double-email) and rejection (re-rejecting REJECTED → no-op).
      Both verified by integration tests. Fail-safe email — the Resend
      send is wrapped in try/catch + console.error so a Resend outage
      doesn't roll back the transaction-flipped request. Activity-log
      write happens AFTER the transaction commits (correct ordering: the
      log is downstream of the truth, not part of it). Status guards on
      both actions — only PENDING requests are mutable; non-pending wrong
      states return cleanly with a Swedish error message.
  maintainability:
    status: PASS
    notes: |
      4 server actions live in one well-segmented file (~480 lines) with
      clear section banners. The `getAdminUser()` helper at line 99-107
      mirrors the existing `app/actions/admin-workspaces.ts:updateWorkspaceTier`
      pattern — consistent. `<CatalogRequestsList>` is ~700 lines but
      cleanly broken into `RequestRow` / `DetailPanel` / `FulfillmentModal`
      / `RejectionDialog` sub-components. Tests are well-scoped (next/cache,
      next/navigation, sonner, server actions all mocked at the module
      boundary). Activity-log integration follows the established 3-file
      pattern (action-constants + categories + format-activity); UX-002 is
      the one missing piece on the resolver side.

