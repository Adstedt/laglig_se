story: 'laglistor-group-popover-alignment'
story_title: 'Laglistor group management → Personalregister popover pattern'
gate: CONCERNS
status_reason: >-
  Handler parity with the deleted modal verified line-by-line (identical action
  names + payloads, delete copy byte-identical, reorder logic verbatim) and all
  untouchables git-clean; CONCERNS only because the focus-guard behavior
  (dropdown-close focus dance, keyboard reachability, tab-out no longer
  dismissing) on the app's most-used surface is provable only in a real
  browser, plus one low mount-gate drift (AlertDialog can outlive the popover
  if activeListId nulls mid-confirmation).
reviewer: 'Quinn (Test Architect)'
updated: '2026-07-03T22:55:00Z'

waiver: { active: false }

top_issues:
  - id: 'A11Y-001'
    severity: medium
    finding: >-
      onFocusOutside is unconditionally prevented so the ViewMenu dropdown's
      close-time focus restore cannot insta-dismiss the popover. Code reading
      shows Escape and outside-click dismissal survive in every state (no
      undismissable state constructible, no focus trap), but the end state of
      the focus race (does focus land on the ViewMenu trigger while the popover
      is portaled at body end? can keyboard users reach the popover content?)
      and the acceptability of tab-out no longer dismissing are only provable
      in a real browser. happy-dom cannot verify Radix focus timing.
    suggested_action: >-
      User browser pass: open via "Grupper" with mouse AND keyboard-only;
      confirm no flash-close, confirm popover content is keyboard-reachable,
      confirm Escape closes the AlertDialog first and the popover second.
      Product nod on tab-out staying open.
    suggested_owner: dev
  - id: 'GATE-001'
    severity: low
    finding: >-
      Mount-gate drift vs the old `{activeListId && <GroupManager/>}`: the
      delete AlertDialog is gated only on groupToDelete, not on open. If
      activeListId becomes null while the delete confirmation is showing, the
      popover closes but the AlertDialog survives and can still fire
      deleteListGroup on the stale group (old code unmounted everything).
      Hard to reach in practice.
    suggested_action: >-
      Clear groupToDelete in the existing `!open` reset effect in
      manage-law-groups-popover.tsx.
    suggested_owner: dev
  - id: 'LAYOUT-001'
    severity: low
    finding: >-
      PopoverPrimitive.Anchor renders a real wrapping <div> around the ViewMenu
      slot inside the toolbar's shrink-0 wrapper. AC5's "no layout shift" holds
      by inspection at normal widths but the wrapped-toolbar (flex-wrap /
      narrow-width) case is browser-only verifiable (dev scrutiny item 4).
    suggested_action: >-
      Include narrow-width toolbar check in the browser pass; if it shifts,
      consider `asChild` on the Anchor.
    suggested_owner: dev

