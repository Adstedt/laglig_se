nfr_validation:
  security:
    status: PASS
    notes: >-
      Workspace isolation on EVERY mutation, pinned by tests: edit
      (verify-then-act + compound-where updateMany), delete (compound verify;
      chunk filter carries workspace_id; backing-file lookup workspace-scoped
      — a foreign file row is provably left alone), bulk assign (agreement AND
      group ownership-verified; the updateMany itself carries the workspace
      filter). All mutations + preview gated employees:manage. Profile writes
      are scoped two-field in-ctx updates + shared completeness recompute —
      never the workspace:settings-gated action (PII/permission contract
      intact). UX-ADMIN-001 gate is canAccessSettings && canViewEmployees as
      specified, on both trigger and content.
  performance:
    status: PASS
    notes: >-
      Bulk assign is a single updateMany; preview a single count. Delete
      transaction is 4–6 statements — no N+1. The remaining-agreement read
      uses take: 1. Lazy group fetch happens once per dialog mount cycle;
      preview requests cancel stale responses via the cancelled flag.
  reliability:
    status: PASS
    notes: >-
      Atomic cascade: a mid-transaction failure (including the profile-sync
      leg) rolls everything back to a fully consistent, retriable state —
      correct polarity for a destructive op (see QA verdict on the dev-flagged
      deviation). Storage removal fail-safe post-commit (test-pinned: remove
      failure still returns success). Orphan-blob accumulation accepted
      (ORPHAN-001). Preview-vs-confirm race is inherent and documented; the
      count is a guardrail, not a lock.
  maintainability:
    status: PASS
    notes: >-
      DUP-001 genuinely closed: lib/files/upload-core.ts is the single
      implementation of validation/dedupe/quota/hash/upsert:false, consumed by
      both uploadFile and uploadCollectiveAgreement; files.ts action tests
      pass byte-unchanged (files.test.ts + files-chunk-cleanup.test.ts +
      files-extraction.test.ts green in the independent run). Shared
      LIST_ITEM_SELECT and KollektivavtalAgreementFields kill two more
      duplication seams. STATE-002 nit noted.

