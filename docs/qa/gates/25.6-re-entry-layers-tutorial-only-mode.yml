nfr_validation:
  security:
    status: PASS
    notes: 'No new auth surface; no new permission scope (FAB visibility derives from existing Workspace columns). LocalStorage stores plain "1" — no PII, no session tokens. SWR poll uses existing /api/workspace/generation-status endpoint (Story 16.4 workspace-scoped via withWorkspace). No XSS surface (React + Tailwind, no dangerouslySetInnerHTML). URL deep-link uses useSearchParams + type-guarded ?tab validation — no injection vectors. No new env vars, no schema migration.'
  performance:
    status: PASS
    notes: 'SWR cache-shared with TutorialStep + FirstRunModal (dedupe). Conditional polling via null key when !fabVisible || !workInFlight — no idle polling. One-shot router.refresh() via completedDetectedRef guard prevents render-loop. Auto-stop on completion (workInFlight flips false → polling stops). Bundle delta ~240 LOC across the new component + util + HemPage extensions. Note (non-blocking): 3s poll interval = ~100 req per 5-min generation window; could relax to 5s if production volume warrants.'
  reliability:
    status: PASS
    notes: 'Fail-safe localStorage writes (try/catch for private-browsing + quota). SSR-safe hydration via useState(true) initial + useEffect read (mirrors trial-countdown-banner.tsx:37-49 precedent). completedDetectedRef one-shot guard prevents render-loop on the SWR refresh. router.refresh() after router.replace() in handleDeepLinkClose ensures FAB visibility re-derives correctly. Per-trigger onMinimise resolution prevents redundant minimiseFirstRunModal DB write. SWR has built-in retry-on-failure. Null key disables SWR cleanly.'
  maintainability:
    status: PASS
    notes: 'Code is well-commented (WHY-only, no obvious-WHAT noise). New util lib/onboarding/done-generate-shown.ts mirrors lib/consent/storage.ts pattern exactly — no new conventions introduced. Test isolation via vi.mock at module level for SWR / next/navigation / storage util. v1.1 Change Log entry comprehensively captures the post-smoke polish work. Arch doc §14 open questions Q2/Q4/Q5/Q7 resolved inline per Task 16.'

recommendations:
  immediate: []
  future:
    - action: 'Consider relaxing SWR poll interval from 3s to 5s if production data shows req volume matters'
      refs: ['components/features/dashboard/hem-page.tsx:159-164']
      severity: low
      reason: '~20 req/min during the in-flight window. Acceptable for 5-min average generations but a tunable knob if production load is high. Negligible UX impact (1-2s extra latency to celebrate transition).'
    - action: 'Wrap handleClose in useCallback to silence 4 pre-existing ESLint warnings'
      refs: ['components/features/onboarding-modal/first-run-modal.tsx:439,454,472,529']
      severity: low
      reason: 'handleClose is non-memoized; 4 useCallback hooks that reference it have missing-dep warnings. Pre-existing (predates B.6 per 25.6 v1.0 Debug Log), but a 5-line cleanup in a future story would silence them.'
    - action: 'Mitigate multi-tab interaction (SWR polls independently in each tab)'
      refs: ['components/features/dashboard/hem-page.tsx:157-175']
      severity: low
      reason: 'If user opens /dashboard in 2 tabs, both poll the generation-status endpoint independently. BroadcastChannel API could share state across tabs. Edge case; minor extra network. Accept as-is for v1.'
    - action: 'Consider toast notification when SWR auto-refresh detects completion'
      refs: ['components/features/dashboard/hem-page.tsx:166-175']
      severity: low
      reason: 'Users not looking at the bottom-right corner may miss the FAB visual flip from working pill → Sparkles celebrate. A small toast ("Er laglista är klar!") would be more discoverable. UX polish, not a defect.'
    - action: 'Migrate localStorage seen-flag to DB column if cross-device matters in production'
      refs: ['lib/onboarding/done-generate-shown.ts']
      severity: low
      reason: 'Currently per-device — users on a new device see celebrate again. Was deferred per Owner-ack''d decision 7 (arguably a feature). Revisit if production signals suggest cross-device persistence matters.'
    - action: 'Future stories: anticipate post-smoke polish rounds in AC count'
      refs: ['docs/stories/25.6.re-entry-layers-tutorial-only-mode.md']
      severity: low
      reason: '25.6 was approved with 50 ACs at v0.4. v1.1 polish added 7 net behaviors not in those ACs (dark-mode tokens, smart open-target, FAB disappearing fix, redundant-write fixes, celebrate variant, SWR auto-refresh). All captured in v1.1 Change Log but the original ACs understate delivered surface. Process question: widen AC count to anticipate polish OR accept that Change Log is the canonical post-merge record.'

