status_reason: |
  All 18 ACs functionally satisfied via a clean, additive UI rewire.
  Implementation matches the v0.4 PO revision (modal-card extension instead of a
  new page route): third "Importera" card on `<CreateListChooser>`, new
  `'import'` step on `<ManageListModal>`, optional `initialStep` override for
  the empty-state shortcut, and an extracted `<EmptyLawListState>` for testable
  zero-list copy. 34 new component tests pass (15 chooser + 15 modal + 4
  empty-state); tsc + lint clean. The single AC-vs-implementation deviation —
  `lg:grid-cols-3` instead of `sm:grid-cols-3` for the 3-card layout — was
  pre-approved by PO as NICE-001 with breathing-room rationale, and the
  matching test was updated to assert `lg:grid-cols-3`.
