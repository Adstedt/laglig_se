  ac_trace_details:
    ac_1_layout_breakpoint: |
      AC 1 says "Three cards on viewport ≥ sm: change `grid-cols-1
      sm:grid-cols-2` to `grid-cols-1 sm:grid-cols-3`". Implementation chose
      `grid-cols-1 sm:grid-cols-2 lg:grid-cols-3` (3 cards only at lg)
      based on PO NICE-001 review noting that 640px/sm with three rich
      cards felt cramped. Test "uses 3-column grid (lg breakpoint) when
      import card is shown" was written to match. Documented in dev
      Completion Notes; not a defect, a documented refinement.
    ac_2_step_union: |
      `Step` union extended from `'choose' | 'from-template' | 'blank'` →
      `'choose' | 'from-template' | 'blank' | 'import'`. Existing transitions
      preserved (verified by 14 untouched chooser tests and the existing
      modal's choose→template + choose→blank tests still passing).
    ac_3_onsuccess_callback: |
      `<ImportUploadStep onSuccess={handleImportSuccess} />` mounts unchanged
      from Story 24.2. `handleImportSuccess(importId)` first calls
      `onOpenChange(false)` (close modal) THEN `router.push('/laglistor/skapa/${importId}/granska')`.
      Close-first ordering documented in dev notes — avoids the granska
      page flickering under the open dialog. Verified by integration test
      "successful import closes the modal and routes to /granska".
    ac_4_no_url_state: |
      Modal step is React `useState`. No URL params for modal-internal
      step state. Matches AC 4 verbatim.
    ac_7_empty_state_initialstep: |
      `initialStep?: Step` prop on `ManageListModalProps`. Default behaviour
      preserved when omitted (existing call sites land on `'choose'` or
      `'blank'` exactly as today). Empty-state link wires `initialStep='import'`
      via `handleOpenImport()` in `document-list-page-content.tsx:680-684`.
      Verified by test 'initialStep="import"' opens the modal directly
      on the import step'.
    ac_7_empty_state_extraction: |
      Empty-state extracted to `components/features/document-list/empty-law-list-state.tsx`.
      The dev note rationale ("parent is store-heavy and impractical to
      mount in a unit test") is sound — the 4 dedicated empty-state tests
      verify the copy + both CTAs without spinning up the document-list-store.
      Mounting on the page-content is at the top of the JSX
      (`hasNoLists ? <EmptyLawListState> : <existing-tree>`); `<ManageListModal>`
      stays at the bottom of the JSX so it works in both branches.
    ac_8_cross_surface_deferred: |
      Epic 25 B.1's onboarding-modal import path will converge on the same
      `/laglistor/skapa/[importId]/granska` destination. AC 8 explicitly
      defers the cross-surface smoke test until B.1 ships. 24.6's modal
      path is independently testable today via the 19 new unit tests.
    ac_10_layout_test: |
      AC 10 says "Card layout fits 3 cards at sm breakpoint (smoke check
      on the grid class)". Implementation uses `lg:grid-cols-3` per
      NICE-001; test was updated to assert `lg:grid-cols-3`. AC text says
      `sm` but PO refinement is documented in dev notes.
    ac_18_feature_flag: |
      `IMPORT_PATH_ENABLED = true` constant at top of `create-list-chooser.tsx:16`.
      Default `true`; can be flipped to `false` if 24.2/24.3/24.4 regress.
      The `showImportCard` boolean at line 50 also requires `onSelectImport`
      to be present, so the card is hidden when callers don't wire the
      callback OR when the flag is off — defensible double-gate.

nfr_validation:
  security:
    status: PASS
    notes: |
      Pure UI-rewire — no new server actions, no new auth surface, no schema
      changes. `<ImportUploadStep>` is reused unchanged from Story 24.2; its
      Zod-validated server-action calls are inherited as-is. The only new
      input path is the empty-state link → modal-with-initialStep-override,
      which doesn't touch user input until `<ImportUploadStep>` takes over.
  performance:
    status: PASS
    notes: |
      Modal-internal state (one extra Step value) has no measurable impact.
      Empty-state branch evaluates a derived boolean (`lists.length === 0`)
      and renders a single component — strictly less work than the full
      page-content tree it replaces in the empty case. No new fetches, no
      new SWR caches, no new render paths in the table view.
  reliability:
    status: PASS
    notes: |
      `handleImportSuccess` ordering — close-first then router.push —
      eliminates a known visual artefact (granska flicker under the open
      dialog). The optional `initialStep` prop is conservatively threaded
      through `useEffect` with the correct dependency array
      (`[mode, list, open, hasTemplates, initialStep]`), so reset semantics
      stay correct on modal open/close cycles. `IMPORT_PATH_ENABLED` flag
      provides a fast rollback path if 24.2/24.3/24.4 regress.
  maintainability:
    status: PASS
    notes: |
      Net code-impact reduction was real — ~80 lines (modal-card path) vs
      ~150-200 lines (the page-route path the original AC envisioned). The
      Step union now has 4 values but each is rendered through a
      pattern-match switch (`if (step === 'X')`) that's easy to extend.
      The `<EmptyLawListState>` extraction is the right call — testable in
      isolation, focused single-responsibility, ~45 lines. Existing
      Story 12.10b chooser/modal tests are preserved (no tests removed,
      only extended); existing call sites of `<ManageListModal>` continue
      to work unchanged because `initialStep` is optional.

