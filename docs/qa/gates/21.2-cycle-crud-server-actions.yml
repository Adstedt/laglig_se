nfr_validation:
  security:
    status: PASS
    notes: |
      Every Prisma query is workspace-scoped via `ctx.workspaceId`
      (verified by code inspection + cross-workspace test for getCycleById).
      Zod validation at entry on all 5 actions — no Prisma call on
      invalid input (verified by 5+ tests). Permission gate on every
      action: `tasks:edit` for mutations; explicit OR-check inside
      read callbacks for `activity:view || tasks:edit`. Cross-tenant
      lead-auditor path validated against workspaceMember before any
      write. Not-found and cross-workspace errors collapse to the same
      Swedish string — no existence leakage. No secrets, no new
      dependencies, no new env vars.
  performance:
    status: PASS
    notes: |
      Cursor pagination uses `take + 1` technique (arch §11.7.1 pattern).
      `_count` on items relation avoids N+1. Indexes from Story 21.1
      cover all filter paths: `(workspace_id, status)` for list filter,
      `(law_list_id)` for law-list filter, `(lead_auditor_user_id)` for
      lead-auditor filter. p95 microtest soft-guard on createCycle
      (<500ms threshold, observed <1ms under mocked Prisma). NFR5 (no
      /laglistor regression) verified by IV2 grep — zero consumer of
      the new module on `/laglistor` page load.
  reliability:
    status: PASS
    notes: |
      Structured `{ success, data?, error? }` result shape on every
      action. Outer try/catch on every action returns generic Swedish
      error + console.error on unexpected failures. logActivity +
      revalidatePath called exactly once per successful mutation,
      after the DB write. Non-transactional mutation + log is noted
      as DEBT-002 but matches existing project pattern across all
      `app/actions/*.ts` — not a 21.2 regression. Test coverage
      exhaustively exercises failure branches: permission denied,
      cross-tenant, not-found, already-deleted, status-gate violations.
  maintainability:
    status: PASS
    notes: |
      Implementation follows `law-list-item-requirements.ts` pattern
      verbatim — low cognitive load for next dev. Module-private
      helpers (`assertIsWorkspaceMember`, `loadCycleScopedToWorkspace`)
      extracted during Task 8 refactor-after-green pass (story
      design). JSDoc module header explains scope + in/out-of-scope
      guardrails. TODO(21.10) markers placed at 2 mutation-action
      entries for Story 21.10's assertCycleEditable guard pickup
      (grep target: `TODO(21.10)` → 2 hits). Zero existing files
      modified (additive-only per IV1/IV2). Tests are self-documenting
      with Swedish error strings asserted verbatim (makes drift
      immediately visible in CI).

