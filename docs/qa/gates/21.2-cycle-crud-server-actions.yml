story: '21.2'
story_title: 'Cycle CRUD server actions'
gate: PASS
status_reason: 'All 11 ACs fully covered by 40 unit tests (40/40 green, ~30ms). Full regression suite 4166/4166 pass with zero new lint/type errors. Implementation mirrors app/actions/law-list-item-requirements.ts pattern closely — workspace-scoped Prisma queries everywhere, Zod at every entry, permission OR-check on reads, TODO(21.10) markers placed for Story 21.10 guard wiring. Three low-severity technical-debt items noted (read-side JsonValue cast, non-transactional create+logActivity, generic catch masking) — all are consistent with existing project patterns, not story-specific regressions.'
reviewer: 'Quinn (Test Architect)'
updated: '2026-04-22T13:00:00Z'

waiver: { active: false }

top_issues:
  - id: 'DEBT-001'
    severity: low
    finding: '`getCycleById` casts `row.scope_definition as unknown as ScopeDefinition` — the Prisma JsonValue is trusted on read without runtime validation. Low risk today because Zod gates all writes (no way to persist a malformed shape), but becomes material in Story 21.9 where `scope_definition` is part of the canonical-JSON seal-hash input. A corrupted/legacy Json cell would silently propagate into the hash.'
    suggested_action: 'In Story 21.9, add a read-side `ScopeDefinitionSchema.safeParse(row.scope_definition)` — either globally on the getCycleById read path or at the entry of canonicalize(). If safeParse fails, surface a loud error (cannot seal corrupted data). Not a 21.2 change.'
    suggested_owner: dev
  - id: 'DEBT-002'
    severity: low
    finding: '`createCycle` + `logActivity` execute as two separate Prisma calls, not inside a `$transaction`. If `logActivity` fails, the cycle row is persisted but no audit trail exists. Same applies to `updateCycleMetadata` and `softDeleteCycle`. This is the **existing project-wide pattern** (law-list-item-requirements.ts, legal-document-modal.ts, task-modal.ts all follow the same shape) — not a 21.2 regression.'
    suggested_action: 'Future consistency sweep: either wrap mutation + log in a single `prisma.$transaction` across all server actions, OR accept the trade-off and make it explicit in `docs/architecture/17-coding-standards.md`. Do NOT fix in isolation in 21.2 — it would drift from the rest of `app/actions/`.'
    suggested_owner: sm
  - id: 'DEBT-003'
    severity: low
    finding: 'Outer try/catch in each action swallows real errors (including `WorkspaceAccessError`) into a generic Swedish message like "Kunde inte skapa kontrollen". Makes distinguishing permission-denied vs. DB connection failure difficult in production logs. `console.error(error)` is called but in Vercel serverless that goes to stdout only. Consistent with existing pattern.'
    suggested_action: 'Future: route through a shared error handler that writes structured Sentry breadcrumbs with error code + ctx before returning the user-facing generic message. Applies across all server actions, not just this story.'
    suggested_owner: dev

