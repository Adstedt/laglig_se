# Positive observations worth recording
notes:
  - |
    The Task 8 "refactor-after-green" sequencing in the story design was
    executed as intended — dev implemented Tasks 1-7 with inline patterns,
    wrote tests (Task 9), confirmed 40/40 green, THEN extracted shared
    helpers (Task 8), re-ran tests, confirmed still green. This is the
    ideal refactor workflow and the story design pays off: zero risk of
    a refactor breaking untested behavior. Other stories should consider
    this pattern when extraction is valuable but the path isn't obvious
    upfront.
  - |
    The permission OR-check pattern (`withWorkspace(cb, 'read')` + explicit
    `hasPermission('activity:view') || hasPermission('tasks:edit')` inside)
    is well-tested with all 5 roles + a synthetic `['read']`-only role.
    The synthetic-role test is the defensive coverage — it confirms
    future roles won't accidentally leak read access just by having
    'read'. This is the kind of "what if the permission model grows"
    test that pays off over years.
  - |
    Zero existing files modified. IV2 grep confirmed the new module has
    no consumers outside itself. This is the cleanest possible brownfield
    delivery — the feature lives entirely in its own namespace and can be
    reverted with a single `git rm` with zero blast radius. Exactly what
    CR1-CR4 from the PRD asked for.
  - |
    Swedish error strings are asserted verbatim in tests (e.g., "Kontrollen
    kan bara tas bort i status Planerad"). This means any accidental copy
    drift (typo, rephrase, locale mistake) fails CI immediately — a strong
    guarantee for Swedish-first UX across the whole Epic 21 surface.
  - |
    The p95 microtest is a nice touch: soft guard against accidental N+1s
    or heavy synchronous work in createCycle. 500ms threshold is
    CI-generous; observed locally ~30ms total for 40 tests including
    the 20-sample microtest. Low risk of flakiness.

