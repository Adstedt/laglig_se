nfr_validation:
  security:
    status: PASS
    notes: >
      SSRF mitigations comprehensive: DNS resolution check for private IPs, protocol whitelist,
      redirect limit (2 hops with IP re-check per hop), streaming size limit (100KB), Content-Type
      validation. Rate limiting on public endpoint (10 req/min/IP). LLM prompt injection guard
      with adversarial input warning. Auth required on /api/company/analyze. Known limitation:
      DNS rebinding window — acceptable for threat model.
  performance:
    status: PASS
    notes: >
      Redis caching (30-min TTL) avoids redundant BolagsAPI + LLM calls. maxOutputTokens: 500
      bounds LLM output cost. Streaming reader with abort prevents memory issues on large pages.
      maxDuration: 30 appropriate for LLM round-trip. Cost target ~$0.01-0.02/call met.
  reliability:
    status: PASS
    notes: >
      All external calls wrapped in try/catch. LLM failures are silent with graceful fallback
      (empty flags, null summary). AbortController cleanup on component unmount. Response shape
      validation in hero component prevents crash on malformed data. Error responses (404, 503)
      are NOT cached.
  maintainability:
    status: PASS
    notes: >
      Clean shared utility pattern: company-analyzer.ts reused by public endpoint and onboarding
      fallback; regulatory-area-mapper.ts ready for Story 16.3 reuse. Well-typed interfaces with
      explicit CompanyAnalysisInput/CompanyAnalysis types. Module boundaries clear and testable.

