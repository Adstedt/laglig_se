status_reason: 'Backend-only additive story with strong test coverage (34/34 passing) and thorough AC traceability. Exported pure helper `buildRequirementWhere` is the single source of truth across both actions; 3×3 truth-table parity test guards the Epic 20 primary risk; workspace isolation enforced on every query branch; performance budget replaced from wall-clock to deterministic query-count + payload-size assertions (a reasonable trade-off documented in dev notes).'
