top_issues:
  - id: 'TEST-003'
    severity: low
    finding: 'No composition test for `search` + `mine` filter together. The `where` clause merges `text: {...}` and `OR: [...]` at the same level; Prisma treats top-level as AND and merges correctly, but the composition is unverified by test. Same concern applies to `search` + `needs_evidence`.'
    suggested_action: 'Add 2 tests exercising `buildRequirementWhere(ctx, "mine", "arbetsmiljö")` and `buildRequirementWhere(ctx, "needs_evidence", "arbetsmiljö")`; assert the emitted `where` carries both `text` AND the filter-specific predicates.'
    suggested_owner: dev
  - id: 'TEST-004'
    severity: low
    finding: 'The 3×3 truth-table parity test covers 8 of the 9 possible (krav.responsibleUserId × parent.responsibleUserId) combinations — the `(ME, ME)` case (direct override to self AND parent is self) is missing. This combination is redundant in outcome but would round out the parity guarantee.'
    suggested_action: 'Add one more case `{ kravResponsible: MOCK_USER_ID, parentResponsible: MOCK_USER_ID, expected: true, label: "direct override + parent both me" }` to the `it.each` array.'
    suggested_owner: dev
  - id: 'PERF-001'
    severity: low
    finding: 'AC 18 (P95 ≤ 300ms wall-clock) was deliberately replaced by the dev with AC 19 (≤1 findMany) + AC 20 (<100KB payload) hard-bound deterministic assertions. Defensible — these are tighter than wall-clock would be — but means real-world latency regressions (e.g., from a future Prisma version or silent relation-include drift) won''t be caught at unit-test level.'
    suggested_action: 'When Story 20.3 ships the UI, add a Lighthouse CI check or a real-user `server-timing` header observation on the `/krav` route to close the wall-clock gap. Until then, accept the deterministic proxies as sufficient.'
    suggested_owner: dev
  - id: 'MNT-002'
    severity: low
    finding: 'The `getWorkspaceRequirementCounts` action calls `buildRequirementWhere(ctx, ...)` four times (one per filter), each rebuilding the `workspaceScope` object literal. Trivial perf cost; mentioned only for visibility.'
    suggested_action: 'Optional: compute `workspaceScope` once and thread it into the four branches. Not worth the readability cost unless profiling surfaces it.'
    suggested_owner: dev
  - id: 'TEST-005'
    severity: low
    finding: 'No explicit boundary test for the `search` string length (Zod `max(200)`). Invalid-filter and invalid-cursor Zod rejections have dedicated tests; `sort.field` / `sort.direction` enum and `search` length boundaries do not.'
    suggested_action: 'Optional: add a test for `search = "a".repeat(201)` → Valideringsfel. Zod enum rejection is well-proven elsewhere; not a blocker.'
    suggested_owner: dev

