nfr_validation:
  security:
    status: PASS
    notes: |
      Workspace isolation enforced in every branch of `buildRequirementWhere` via
      `list_item.law_list.workspace_id === ctx.workspaceId`. The `mine` SQL filter
      matches on `ctx.userId` — one user cannot see another's rows even with a
      crafted cursor, because the outer workspace scope is always applied.
      Zod validates all inputs at the boundary (filter enum, UUID cursor, bounded
      int limit, 200-char string cap on search). `'read'` permission is confirmed
      available to all workspace roles in `lib/auth/permissions.ts:71,86,100`.
      Read-only action — no write surface, no PII exposure beyond user FKs. No
      raw SQL, no user-input string interpolation.
  performance:
    status: PASS
    notes: |
      Hard-bound deterministic assertions replace the wall-clock target: exactly
      1 Prisma findMany per getWorkspaceRequirements call (no supplementary count);
      payload < 100KB on a realistic 50-row default page (JSON.stringify byte
      check). Cursor pagination avoids O(N) offset growth. Sibling counts action
      uses Promise.all for 4 parallel counts — total budget still well within
      architecture §22.2.3's ≤10 queries/request ceiling. See PERF-001 for
      wall-clock gap advisory.
  reliability:
    status: PASS
    notes: |
      Never throws — always returns the ActionResult<T> discriminated union.
      Zod invalid-input paths return Swedish 'Valideringsfel' without touching
      Prisma. Unexpected errors caught, logged to console.error, return
      'Kunde inte hämta kravpunkter' / 'Kunde inte hämta kravräkningar'. Empty
      result returns the explicit `{ items: [], nextCursor: null }` shape.
  maintainability:
    status: PASS
    notes: |
      Exported pure helpers (`buildRequirementWhere`, `resolveEffectiveAssignee`)
      keep business logic test-isolated from I/O. Exhaustive `switch` on the
      typed filter enum guarantees build-time failure if a new preset is added
      without handling (TypeScript exhaustiveness). Comprehensive docstring
      covers purpose, call sites, parity guarantee, and Story 20.3 usage
      example — great onboarding for the next contributor. No `any`, no `as`
      casts, no suppressed ESLint rules.

