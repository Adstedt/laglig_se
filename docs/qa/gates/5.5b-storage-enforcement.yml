top_issues:
  - id: 'STORAGE-001'
    severity: 'closed'
    title: 'Path-level integration test gap — gate wiring in uploadFile not directly verified'
    description: |
      The story's Testing section explicitly lists two integration test cases:

        - 'File upload action returns JSON 413 with correct shape on quota exceeded'
        - 'File upload action does NOT call Supabase Storage when quota check throws (no orphan)'

      Neither is implemented. tests/unit/usage/storage-enforcement.test.ts has 15
      tests but they all hit `assertWithinStorageQuota` and `getStorageUsage`
      directly — no test imports `uploadFile` from app/actions/files.ts to verify
      the gate call exists and that Supabase Storage is NOT invoked on a
      blocked upload.

      A dev could remove the `assertWithinStorageQuota` call from uploadFile
      and all 25 5.5b tests + the 68 5.5a/5.4 regression tests would still
      pass. Same exact failure mode as SEAT-004 in 5.5a, which was fixed in
      Story 5.5a v1.3 by adding 5 path tests.

      Recommend adding tests/unit/usage/storage-upload-paths.test.ts that:
        - Imports uploadFile from app/actions/files.ts
        - Mocks prisma + getStorageClient + withWorkspace
        - Builds a FormData fixture with a fake File
        - Verifies on overflow: ActionResult { success: false, code: 'STORAGE_QUOTA_EXCEEDED' }
          AND storageClient.storage.from(...).upload() was NOT called
        - Verifies on success-with-warning: ActionResult { success: true, warning: { ... } }
        - Verifies on plain success: ActionResult { success: true, data, no warning }

      Pattern to follow: tests/unit/usage/seat-enforcement-paths.test.ts (the
      SEAT-004 fix) — uses vi.mock for prisma + stripe + auth, imports the
      route handler / server action under test directly, asserts on the
      ActionResult shape.
    refs:
      - 'tests/unit/usage/storage-enforcement.test.ts'
      - 'app/actions/files.ts:304-321 (the gate insertion point)'
      - 'tests/unit/usage/seat-enforcement-paths.test.ts (SEAT-004 reference fix)'

resolutions:
  - id: 'STORAGE-001'
    fixed_in: 'v1.3 (2026-05-05 fix-pass)'
    fix_summary: |
      New tests/unit/usage/storage-upload-paths.test.ts with 4 path tests
      that import the actual uploadFile server action (not just the
      assertWithinStorageQuota helper). Each test mocks prisma + getStorageClient
      + withWorkspace, builds a FormData fixture with a fake PDF File, and
      verifies meaningful side effects (storageFromMock NOT called on overflow,
      workspaceFile.create NOT called on overflow, etc.).

      The 4 tests:
      1. Overflow → returns code: 'STORAGE_QUOTA_EXCEEDED' + storage write
         NOT called + DB create NOT called. Catches the no-orphan invariant.
      2. Under-cap success → upload + DB create both called, no warning.
      3. Soft-warn at 80% → success: true + warning field populated, upload
         still proceeds (non-blocking warning).
      4. Enterprise 100 GB cap → blocks (NOT bypassed per AC 7).

      Both spec-listed cases from the story Testing section are now covered;
      the additional 2 tests lock in the soft-warn contract and the AC 7
      Enterprise framing.

      Mocking pattern matches seat-enforcement-paths.test.ts (the SEAT-004
      fix). A dev removing the assertWithinStorageQuota call from uploadFile
      would now fail tests 1, 3, and 4. Gate wiring is regression-locked.

