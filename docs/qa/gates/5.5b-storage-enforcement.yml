story: '5.5b'
story_title: 'Storage Enforcement'
gate: PASS
status_reason: |
  STORAGE-001 closed by the dev fix-pass. New 4-test path-tests file
  (storage-upload-paths.test.ts) imports the actual uploadFile server
  action and verifies: (1) overflow returns STORAGE_QUOTA_EXCEEDED with NO
  Supabase write + NO DB row create — the critical no-orphan guarantee;
  (2) success-under-cap proceeds through upload + DB create normally;
  (3) soft-warn-at-80% returns success with structured warning payload;
  (4) Enterprise at 100 GB cap blocks (NOT bypassed, per AC 7).

  Both spec-listed test cases from the story Testing section are now
  covered. The mocking pattern follows seat-enforcement-paths.test.ts (the
  SEAT-004 fix). 97/97 tests pass (29 5.5b + 46 5.5a + 22 billing
  regression). Typecheck clean. Story is production-ready.

  Original status_reason (preserved for history):
  Functional implementation is correct on the happy path. All 10 ACs satisfied at the behavioural level: gate fires BEFORE Supabase Storage write (no orphan-object risk), Enterprise correctly capped at 100 GB (not bypassed), trial_picked_tier resolution works, soft warn payload surfaces on success response, structured `code: 'STORAGE_QUOTA_EXCEEDED'` for client branching. 25/25 new tests pass; 93/93 across all 5.5a + 5.5b + 5.4 work; typecheck clean. Dev applied 5.5a's lessons (structured error code, no external service exposure since no Stripe calls).

  One real concern: path-level integration test gap (STORAGE-001). The story Testing section explicitly lists "File upload action returns JSON 413 with correct shape on quota exceeded" and "File upload action does NOT call Supabase Storage when quota check throws (no orphan)" — neither is actually implemented. The 15 integration tests in storage-enforcement.test.ts cover the `assertWithinStorageQuota` helper directly but no test imports `uploadFile` to verify the gate is wired into the user-facing path. Same pattern as SEAT-004 in 5.5a, which was fixed in v1.3 with 5 dedicated path tests.

  Two future considerations: TOCTOU race in `uploadFile` (bounded impact — max ~25 MB × concurrent uploads = negligible margin cost), and AC 3 shape divergence (error string carries the user-visible info but the structured currentBytes/incomingBytes/limitBytes/tier fields aren't returned — functionally adequate for v1).

