nfr_validation:
  security:
    status: PASS
    notes: |
      No new auth/authz attack surface. Upload action already gated by
      withWorkspace permission boundary; storage gate is additive. No external
      service calls (no Stripe in this story → no outage handling needed,
      simpler than 5.5a). Aggregate query is workspace-scoped (workspace_id
      in WHERE).

  performance:
    status: PASS
    notes: |
      Aggregate query uses existing @@index([workspace_id]) — bounded by
      per-workspace file count. At 10K files (story-spec ceiling) the SUM
      is well under 20ms. Upload path is multi-second user-perceived
      anyway, so the additional <50ms quota check is invisible.

      One DB read added (workspace.findUniqueOrThrow for tier resolution)
      runs in parallel with the aggregate via Promise.all. Total cost: ~10-20ms
      added to the upload path. Acceptable.

  reliability:
    status: PASS
    notes: |
      Gate placement is correct — runs BEFORE the Supabase Storage write
      (verified at app/actions/files.ts:310, with the storage write at
      line 326+). Blocked upload returns early; no orphan object created.

      Soft-warn-at-cap edge case: when currentBytes + incomingBytes ==
      limitBytes exactly, the check passes (uses `>` not `>=`) and the warning
      fires (>= 80% threshold). Reasonable for v1 — upload at exactly cap is
      allowed but flagged. Document as intentional.

      Race condition: two simultaneous uploads can each pass the check
      independently and together exceed cap. Bounded by file size (max 25 MB
      per upload per existing MAX_FILE_SIZE constant). Worst-case overshoot
      at Solo's 1 GB cap with 4 concurrent 25 MB uploads = ~1.1 GB = 10%
      over. Not worth fixing for v1 (margin cost is negligible at storage
      pricing of $0.021/GB).

  maintainability:
    status: PASS
    notes: |
      Code is well-structured. lib/usage/storage.ts has clear separation
      between pure helpers (bytesToGB, gbToBytes, formatBytesSwedish), the
      enforcement assertion, and the read-only snapshot. Inline comments
      reference the schema verification (WorkspaceFile, file_size, is_folder)
      so future readers understand why the column names differ from typical
      conventions. ActionResult interface extension is non-breaking — other
      callers in app/actions/files.ts (uploadFileAndLinkToTask, etc.) ignore
      the new optional fields cleanly.

      One maintainability risk: STORAGE-001 (path test gap) — the gate could
      regress silently. Same maintainability concern as SEAT-004.

future_considerations:
  - 'TOCTOU race between assertWithinStorageQuota and Supabase Storage write — two simultaneous uploads can each pass independently and together exceed cap. Bounded by file size (max 25 MB × concurrent count). At storage pricing of $0.021/GB the overshoot cost is negligible. Defer fix until production observability shows the race firing.'
  - 'AC 3 shape divergence (low priority): error returns { success, error, code } shape. AC 3 spec describes the fuller { error, message, code, currentBytes, incomingBytes, limitBytes, tier } shape. Functionally adequate for v1 (user-visible info is in the error string). If Epic 17 file-browser needs structured fields for advanced UI, extend the ActionResult error branch.'
  - 'Workspace.storage_gb_override column for sales-led Enterprise customers needing more than 100 GB — flagged in AC 7. Separate future story.'
  - 'Storage-meter-on-billing-dashboard widget consumption — getStorageUsage shape ({ usedBytes, limitBytes, percentUsed, tier }) is ready for 5.5c to compose into the unified usage widget.'
  - 'Upload soft-warn UX — the warning payload is plumbed through ActionResult.warning but no UI surface consumes it yet. Epic 17 should pick it up in the file-browser toast layer.'

